name: bus_stop_dumpster_ambush_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: dumpster_ambush

rooms:
  - name: Bus Stop BG
    description: |
      You are standing at a bus stop at the edge of a park
      at dusk. A gusty wind blows leaves across the path.
      The shelter stands at the top of three concrete steps.
      A wooden bench sits under the shelter. A first aid
      box is mounted on the shelter wall. A storm drain
      grate sits at the base of the steps.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: first aid box
        examine: A small red first aid box mounted on the shelter wall. It has bandages and an ice pack inside.
      - name: storm drain
        examine: A metal storm drain grate at the base of the concrete steps. One bar is bent upward.

    npcs:
      - name: person
        short_desc: sitting on the ground near the shelter's far edge, holding their ankle
        examine: |
          This person is not injured. They are crouching at
          the far edge of the shelter where it meets the
          park treeline, positioned so that anyone coming to
          help would have to walk past the shelter corner
          into a blind spot. Their shoes are clean running
          shoes — no sign of a fall. Their ankle looks fine.
          A second person is standing in the trees just past
          the corner, partially hidden by the shelter wall.
          This is a two-person ambush set up to catch anyone
          who comes around the corner to help.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "escort person"
            text: Help them up and walk them to the bench
            type: friend
            correct: false
            effects:
              - message: "You walk around the shelter corner to help. The person in the trees steps out behind you. You are now between two people in a blind spot, away from the road."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "tap person"
            text: Tap their shoulder and ask what happened
            type: friend
            correct: false
            effects:
              - message: "You lean around the corner to tap their shoulder. A hand grabs your bag strap from behind — the second person was waiting just out of sight."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "dodge"
            text: Sidestep back toward the lit road
            type: enemy
            correct: true
            effects:
              - message: "You step back toward the road and the streetlights. The person on the ground watches you go but does not stand. The figure in the trees does not leave the shadows. You wait for the bus under the streetlight instead."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "warn person"
            text: Tell them you can see the person in the trees
            type: enemy
            correct: true
            effects:
              - message: "You call out that you can see someone in the trees. The crouching person's expression hardens. The figure in the trees steps back deeper into shadow. You stay on the lit road. They do not approach."
              - complete: {outcome: enemy, action_id: 4}
