name: bus_stop_arsonist_prep_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: imminent_arson

rooms:
  - name: Bus Stop N28
    description: |
      A bus stop beside a wood-frame row of closed
      businesses on a dry windy dusk, isolated. Paper drifts
      piled against doorways. A fire hydrant with a painted
      yellow band. A rolled awning over a closed pet
      groomer.

    inventory:
      - name: cell with fire dispatch number
        examine: Your phone with the county fire dispatch non-emergency on a pinned favorite. Nine-digit direct line.
        portable: true

    objects:
      - name: paper drifts
        examine: Drifts of old flyers, takeout menus, and leaves packed against the recessed doorways of closed shops. Highly flammable at this dryness.
      - name: fire hydrant
        examine: A red fire hydrant with a yellow painted band. Cap chained, threaded for standard hose.
      - name: rolled awning
        examine: A rolled canvas awning over a closed pet groomer. Faded cartoon dog decal on the fabric.

    npcs:
      - name: person
        short_desc: pouring accelerant from a jerry can into a doorway drift of flyers, lighter in the other hand
        examine: |
          The person is kneeling at a closed-shop doorway
          pouring accelerant from a small jerry can onto
          the drift of flyers. A lighter is in their other
          hand. They have not noticed you yet. In a dry wind
          this block would burn four buildings before fire
          units arrive.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "dial dispatch"
            text: Summon fire dispatch on the pinned direct line
            type: enemy
            correct: true
            effects:
              - message: "Dispatch on the line. 'Pour in progress, accelerant, Second and Cutter, closed pet groomer doorway, single suspect.' Sirens in ninety seconds. Pour stops. Suspect runs — engine catches them three blocks off."
              - complete: {outcome: enemy, action_id: 1}
          - id: 2
            command: "snap person"
            text: Photograph them from behind the hydrant for evidence
            type: enemy
            correct: true
            effects:
              - message: "You crouch at the hydrant, three clear photos of pour, lighter, face. You call fire dispatch with the images uploading. The suspect pauses — they see the flash — then flees before ignition."
              - complete: {outcome: enemy, action_id: 2}
          - id: 3
            command: "dissuade person"
            text: Reassure them calmly that they don't need to do this
            type: friend
            correct: false
            effects:
              - message: "'Hey, you don't have to do this.' They look at you over the can. 'I really do.' The lighter clicks. The drift catches. The wind takes it from there."
              - complete: {outcome: friend, action_id: 3}
          - id: 4
            command: "aid person"
            text: Aid them by moving the drift back from the door
            type: friend
            correct: false
            effects:
              - message: "You kick the paper back. They thank you. They pour the rest on the re-piled drift and light it. Your shoe print is in the accelerant ring now, captured on the pet groomer's camera."
              - complete: {outcome: friend, action_id: 4}
