name: bus_stop_armed_robber_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: armed_robbery

rooms:
  - name: Bus Stop AZ
    description: |
      You are standing at a bus stop on a snowy street in
      the early evening. Snow is still falling lightly. A
      wooden bench sits under the shelter. A payphone is
      bolted to the pole. A small drift has piled against
      the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, with snow piled along the back.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: standing inside the shelter with a folding knife held low against their thigh and one hand out toward you
        examine: |
          An armed robber who has stepped under the shelter
          out of the snow and out of view of the street.
          There is a folding knife open and held low against
          their thigh, only visible from where you are
          standing. Their other hand is palm up. "Wallet,
          phone, watch. Right hand only. Don't be stupid."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "call hospital"
            text: Pick up the payphone and call the hospital
            type: friend
            correct: false
            effects:
              - message: "You reach for the payphone receiver. They take one step closer with the knife and you stop reaching. The receiver dangles on its cord."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person what they want
            type: friend
            correct: false
            effects:
              - message: "You ask what they want. 'I told you what I want. Wallet. Phone. Watch.' The knife comes up an inch."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "flee"
            text: Bolt out of the shelter into the open street
            type: enemy
            correct: true
            effects:
              - message: "You bolt out of the shelter and into the open street. Out from under the cover of the shelter you are visible to a driver who immediately leans on the horn. The robber pulls back into the shadow of the shelter and disappears down the alley."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "hide"
            text: Slip behind the back of the shelter where they can't reach you
            type: enemy
            correct: true
            effects:
              - message: "You slip around the back of the shelter and crouch in the dark space behind it. They circle the shelter once looking for you, can't risk a longer search out in the open snow, and walk fast in the other direction."
              - complete: {outcome: enemy, action_id: 4}
