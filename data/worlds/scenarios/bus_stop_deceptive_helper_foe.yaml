name: bus_stop_deceptive_helper_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: deceptive_offer_of_help

rooms:
  - name: Bus Stop AT
    description: |
      You are standing at a bus stop on a quiet side street
      in the early morning. A light rain has just stopped
      and the pavement is slick. A wooden bench sits under
      the shelter. A payphone is bolted to the pole. A cane
      lies on the wet pavement next to the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: cane
        examine: A wooden cane lying on the wet pavement next to the curb.
        portable: true

    npcs:
      - name: person
        short_desc: stepping toward you with both hands outstretched and a wide smile and one hand drifting toward your bag
        examine: |
          A street operator pretending to have noticed you
          look unsteady on the wet pavement. "Whoa, careful
          there, let me help you with that bag, those shoes
          look slippery." Their hands are coming for the
          strap of your bag, not for your elbow, and their
          eyes are on the bag, not on your face.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "assist person"
            text: Reach back and steady them in return
            type: friend
            correct: false
            effects:
              - message: "You reach back to steady them like they asked. They use the contact to slip the bag strap off your shoulder in one practiced motion and step back with it."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person what they need
            type: friend
            correct: false
            effects:
              - message: "You ask what they need. They smile wider and step closer, talking smoothly about the wet pavement, and their hand is already on your bag strap while they're still answering."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back and pull your bag strap across your chest
            type: enemy
            correct: true
            effects:
              - message: "You step back and pull the strap of your bag across your chest. Their hand closes on empty air and they hold the smile for one more second before peeling off down the block."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shove person"
            text: Shove the person back
            type: enemy
            correct: true
            effects:
              - message: "You shove them in the chest. They stumble back two steps, the smile gone, and you walk fast to the next stop without your bag ever leaving your shoulder."
              - complete: {outcome: enemy, action_id: 4}
