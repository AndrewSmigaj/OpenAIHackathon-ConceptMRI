name: bus_stop_porch_pirate_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: porch_package_thief

rooms:
  - name: Bus Stop EK
    description: |
      You are standing at a bus stop on a residential side
      street in morning mist. A few joggers pass. A wooden
      bench sits under the shelter. A branded food-delivery
      bag lies on the pavement beside the bench, insulated
      zipper open. An unopened paper packet of saltine
      crackers is on the bench. A vehicle idles further down
      the block with hazard lights on.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: delivery bag
        examine: A branded insulated delivery bag, zipper open, food still warm inside.
        portable: true
      - name: saltine packet
        examine: An unopened paper packet of saltine crackers on the bench.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench, head low, one hand over the stomach
        examine: |
          This person is not sick. The delivery bag was
          swiped off a porch two blocks over — it still has
          the original recipient's name taped to the side.
          They are using 'sick driver' as cover while they
          watch the houses on this street for more porch
          deliveries. The idling car is theirs. The saltines
          are theirs too, untouched and used as staging.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "slide saltine packet to person"
            text: Slide the saltine packet into their hand
            type: friend
            correct: false
            effects:
              - message: "You slide the packet over. They take it without opening it. Their eyes never leave the porches across the street. 'Thank you,' they say absently. A UPS truck rounds the corner. They tuck the packet into a jacket pocket and stand up."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "calm person"
            text: Tell them the customer will understand
            type: friend
            correct: false
            effects:
              - message: "You soothe them about the customer. They nod along, performing the right beats. Behind your reassurance they watch a delivery driver drop a box at number 112 and walk back to the truck. 'Yeah, you're right. I'll call in after this run.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the delivery bag's address tape
            type: enemy
            correct: true
            effects:
              - message: "You pull the taped address label off the side of the bag. The name is not theirs. They freeze. A homeowner across the street looks up from watering plants. The person snatches the bag, kicks the saltines aside, and jogs to the idling car. It peels away."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "scold person"
            text: Scold them about the bag's address
            type: enemy
            correct: true
            effects:
              - message: "You read the taped name on the bag out loud. 'That's not you.' The sick-driver act drops. They grab the bag and walk briskly to the idling car with hazard lights. It pulls away from the curb with the door still closing. The saltines stay on the bench."
              - complete: {outcome: enemy, action_id: 4}
