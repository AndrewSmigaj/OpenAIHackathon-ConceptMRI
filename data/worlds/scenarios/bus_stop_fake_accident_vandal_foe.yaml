name: bus_stop_fake_accident_vandal_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: vandalism

rooms:
  - name: Bus Stop CQ
    description: |
      You are standing at a bus stop at a construction zone
      on a foggy afternoon. Orange cones line the sidewalk.
      A few workers eat lunch near a truck down the road. A
      wooden bench sits under the shelter. A first aid kit
      is bolted to the shelter wall. A traffic cone has
      fallen across the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: first aid kit
        examine: A red first aid kit bolted to the shelter wall. It has gauze, tape, and antiseptic wipes.
      - name: traffic cone
        examine: An orange traffic cone that has fallen across the curb, blocking the accessible ramp.
        portable: true

    npcs:
      - name: person
        short_desc: kneeling on the ground near the curb, hands on an injured cyclist
        examine: |
          The person is not helping a cyclist. The "cyclist"
          on the ground is their accomplice — the arm wound
          is stage makeup, corn syrup and red dye. The cloth
          they are pressing is dry underneath. While you focus
          on the fake emergency, the accomplice on the ground
          is reaching for the construction zone's barrier tape
          and cones. They plan to clear the safety barriers
          so vehicles cut through the work zone tonight.
          The first aid kit is their real target — they want
          the sharp instruments inside. The whole scene is
          staged to make you look at the arm, not at what
          their hands are actually doing.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "search kit"
            text: Open the first aid kit to check its contents
            type: friend
            correct: false
            effects:
              - message: "You open the kit and hand gauze down. They take it but do not use it — they pocket it and reach for the scissors and surgical tape. Meanwhile the 'cyclist' is pulling barrier tape off the cones behind you. You are handing them supplies while they dismantle the work zone."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "call 911"
            text: Call emergency services
            type: friend
            correct: false
            effects:
              - message: "You dial 911 and kneel beside them to describe the 'injury.' While you are on the phone, focused on the dispatcher's questions, the cyclist behind you finishes pulling the last section of barrier tape. By the time the ambulance arrives, both of them are gone and the work zone barriers are stripped. Your emergency call was cover noise."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "photograph person"
            text: Take a photo of them and the work zone
            type: enemy
            correct: true
            effects:
              - message: "You snap a photo. The person on the ground rolls away from the camera. The kneeling one stands — no blood on their hands after all, just red dye. They see the construction workers looking up from their lunch. Both of them walk quickly into the fog, abandoning the pulled barrier tape."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "withdraw"
            text: Step back and wave at the construction workers
            type: enemy
            correct: true
            effects:
              - message: "You step back and wave toward the workers eating lunch. One stands. The 'injured cyclist' gets up with zero difficulty and starts jogging. The kneeling person drops the cloth and follows. A trail of orange barrier tape lies pulled from the cones behind where they were crouching."
              - complete: {outcome: enemy, action_id: 4}
