name: bus_stop_false_accuser_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: shakedown_false_accusation

rooms:
  - name: Bus Stop X
    description: |
      You are standing at a bus stop on a busy street at
      midday. A wooden bench sits under the shelter. A
      payphone is bolted to the pole. A few cigarette butts
      and small bits of metal litter the pavement around
      the bench. Commuters move past you on both sides.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, with cracks in the slats.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: standing right in front of you with their hand held out
        examine: |
          A false accuser planted directly in your path with
          their open hand thrust at you. "You took my
          wedding ring. I saw you bend down by the bench a
          second ago. Empty your pockets right now or I'm
          calling the police." Their eyes flick past you to
          the commuters at the shelter, gauging the
          audience. You have not bent down and there is no
          ring.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "search bench"
            text: Drop into a crouch and search the pavement under the bench
            type: friend
            correct: false
            effects:
              - message: "You drop into a crouch and start searching under the bench. The accuser's voice goes up half an octave — 'See, you knew where it was' — performing for the commuters who are now turning to watch."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person to describe the ring and where they dropped it
            type: friend
            correct: false
            effects:
              - message: "You ask them to describe the ring. They stammer for half a second — they don't have an answer ready — then double down: 'Don't play games, give it back NOW.' Their hand reaches for your jacket pocket while they're still talking."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back, putting space between you and them
            type: enemy
            correct: true
            effects:
              - message: "You take a clean step back, putting space between you and them, hand on the strap of your bag. They try the line on the next commuter at the shelter, who also pulls back. They give up and walk off."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout scam"
            text: Shout "Scam!" and point at the person
            type: enemy
            correct: true
            effects:
              - message: "You shout 'Scam!' and point at them. Two commuters at the shelter turn, recognize the routine, and start filming on their phones. The accuser bolts down the block."
              - complete: {outcome: enemy, action_id: 4}
