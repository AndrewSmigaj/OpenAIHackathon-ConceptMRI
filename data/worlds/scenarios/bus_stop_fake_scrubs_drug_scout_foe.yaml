name: bus_stop_fake_scrubs_drug_scout_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: fake_scrubs_pharmacy_scout

rooms:
  - name: Bus Stop ET
    description: |
      You are standing at a bus stop outside a hospital in the
      early morning. The sky is pale and the automatic doors
      hiss open and shut across the street. A wooden bench
      sits under the shelter. A blue hospital scrub top lies
      folded on the bench. An employee ID badge on a lanyard
      rests on top of the scrubs. A clear plastic cup of ice
      water is balanced on the bench arm.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: scrub top
        examine: A blue hospital scrub top, folded, with a small name tag sewn at the chest.
        portable: true
      - name: id badge
        examine: A hospital employee ID badge on a lanyard, photo visible, department marked "ER."
        portable: true

    npcs:
      - name: person
        short_desc: slumped on the bench, head bowed, hair damp at the temples
        examine: |
          This person is not hospital staff. The scrub top was
          bought online. The ID badge is a printed photo in a
          thrift-store holder — the hologram strip is missing.
          They sit here to watch which pharmacy delivery van
          arrives at the hospital loading dock and which
          entrance it uses. The 'exhausted' pose is camouflage.
          They are scouting for a partner who will intercept
          the van next week.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "whisper person"
            text: Quietly say the bus is four minutes out
            type: friend
            correct: false
            effects:
              - message: "You whisper near their ear. They react before you finish — alert, not groggy. 'Yeah thanks, I'll catch the next one.' Their eyes slide back across the street to the loading dock, where a white van is nosing up to the ramp. They do not look at the bus post."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "shade person"
            text: Step between them and the rising sun
            type: friend
            correct: false
            effects:
              - message: "You step into the sun angle. 'Oh, thanks.' They do not look up at you — they look past your leg. The loading dock across the street is their sight line and you just narrowed it. They shift on the bench to keep the dock visible."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the ID badge off the scrubs
            type: enemy
            correct: true
            effects:
              - message: "You grab the badge. The holder is empty plastic behind a printed photo — no chip, no hologram. They snatch it back fast — fully awake. 'Hands off.' They scoop the scrubs, pocket the badge, and leave the bench before the van at the dock finishes unloading."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock the fake badge
            type: enemy
            correct: true
            effects:
              - message: "You laugh and point at the badge. 'No hologram. No chip reader on the back. That's a printout.' Their face drops the fatigue. They stand, fold the scrubs under one arm, pocket the badge, and walk off fast — not toward the hospital, away from it."
              - complete: {outcome: enemy, action_id: 4}
