name: bus_stop_gps_tracker_installer_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: gps_tracker_installer

rooms:
  - name: Bus Stop EG
    description: |
      You are standing at a bus stop on a residential street
      in the rain at dusk. The block is empty. A car is
      parked at the curb. A wooden bench sits under the
      shelter. A bicycle helmet lies cracked on the pavement
      beside the car. A small tool bag is open on the
      pavement beside the helmet, spilling hex keys.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: helmet
        examine: A bicycle helmet on the pavement, a long crack running through the shell.
        portable: true
      - name: tool bag
        examine: A small open tool bag spilling hex keys and a tire lever.
        portable: true

    npcs:
      - name: person
        short_desc: crouched behind the parked car, head down and hand on the ground
        examine: |
          This person is installing a magnetic GPS tracker on
          the underside of the parked car. The cracked helmet
          and spilled tool bag are staging — they bought the
          helmet from a thrift store and cracked it deliberately
          to sell the story. The tracker is already half-stuck
          under the rear wheel well. They are a private
          investigator working for a stalker ex-partner who
          wants to know where the car owner drives after work.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "cradle person"
            text: Cradle their shoulders and keep them still
            type: friend
            correct: false
            effects:
              - message: "You hold their shoulders. The new angle shields them from the street view and their free hand finishes pressing the tracker firmly. 'Just dizzy,' they say, letting you hold them a moment longer. When you stand, the tracker is in place."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "calm person"
            text: Speak low and steady while they orient
            type: friend
            correct: false
            effects:
              - message: "You keep your voice soft. The low tone is perfect cover — any commuter walking past hears a calm conversation, not a crime. Behind the calm, their hand under the car checks the tracker's magnet and adhesive seal. 'Better now. Thanks.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "pin person"
            text: Pin their shoulders to the car
            type: enemy
            correct: true
            effects:
              - message: "You pin them against the car. The hand that had been under the wheel well comes out holding a small black device with a blinking light. A porch light flicks on across the rainy block. They rip free, grab the tool bag, and vanish between houses."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shake person"
            text: Shake them to see the injury
            type: enemy
            correct: true
            effects:
              - message: "You shake them hard. They are not dizzy. They are fully alert. The magnetic tracker clatters onto the wet pavement between you. They stare at it and then at you, then grab the tool bag and jog off into the rain."
              - complete: {outcome: enemy, action_id: 4}
