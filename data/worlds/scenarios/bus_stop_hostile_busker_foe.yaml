name: bus_stop_hostile_busker_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: hostile_busker

rooms:
  - name: Bus Stop BZ
    description: |
      You are standing at a bus stop on a wide boulevard on a
      clear afternoon. People jog and cycle past. A wooden
      bench sits under the shelter. An open instrument case
      lined with red velvet sits on the sidewalk. A few coins
      and a crumpled bill lie in the case.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: instrument case
        examine: An open violin case lined with faded red velvet. A few coins and a crumpled five-dollar bill sit inside. The case is shaped for a full-size violin but the instrument is gone.
      - name: coins
        examine: A handful of quarters and dimes, and one crumpled five-dollar bill.

    npcs:
      - name: person
        short_desc: standing by an instrument case open on the sidewalk
        examine: |
          This person is not a musician. The open case with
          coins is a sympathy prop — they never had a violin.
          The "theft" story is scripted to make you stop,
          engage, and let your guard down. While they hold
          your attention with their distress, an accomplice
          works the crowd of joggers and cyclists who slow
          down to watch. The rosin dust on their fingers is
          chalk. The coins in the case are seed money they
          planted. They chose this busy afternoon boulevard
          because foot traffic means more marks.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "comfort person"
            text: Tell them you will help find the violin
            type: friend
            correct: false
            effects:
              - message: "You stop and engage. They launch into an elaborate story — 'He went that way, no wait, this way.' You are facing them, bag exposed behind you. A jogger bumps you from behind — 'Sorry!' — and keeps going. Your phone is no longer in your pocket."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "wave"
            text: Wave at the crowd to draw attention and help
            type: friend
            correct: false
            effects:
              - message: "You wave at passing cyclists. Several slow down to look. The person with the case starts telling their story louder. In the gathering crowd, the accomplice has three targets instead of one. You just improved their operation."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "block person"
            text: Block their path and demand they explain
            type: enemy
            correct: true
            effects:
              - message: "You plant yourself in front of them. 'Where exactly did the thief go?' Their story changes twice in ten seconds. You look at the case — the velvet has no wear pattern where a violin would sit. There was never a violin. They see you putting it together and start packing up the case."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "sprint"
            text: Run to the nearest business and ask them to call police
            type: enemy
            correct: true
            effects:
              - message: "You sprint to the cafe on the corner and tell the barista to call police — someone may be running a scam at the bus stop. When you look back, the person is snapping the case shut. Their accomplice has materialized from the crowd and they are leaving fast in the same direction."
              - complete: {outcome: enemy, action_id: 4}
