name: bus_stop_carjack_scout_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: theft_in_progress

rooms:
  - name: Bus Stop CV
    description: |
      You are standing at a bus stop on a two-lane highway
      at evening in heavy wind. Dust blows across the
      shoulder. A car with a flat tire is parked behind the
      shelter. A wooden bench sits under the shelter. A lug
      wrench lies on the ground near the car. A reflective
      triangle stands behind the car.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, gritty with blown dust.
      - name: lug wrench
        examine: A lug wrench on the ground near the flat tire. It is the wrong size for the lug nuts.
        portable: true
      - name: reflective triangle
        examine: A reflective warning triangle standing behind the car. It catches headlights from oncoming traffic.

    npcs:
      - name: person
        short_desc: crouched by the flat tire, rubbing their hands
        examine: |
          The person does not own this car. The flat tire was
          deliberately punctured — a screwdriver hole in the
          sidewall, not road damage. They are not trying to
          fix it. They are stripping the remaining three good
          tires' lug nuts loose so the wheels can be pulled
          quickly when a truck arrives. Their "blistered"
          hands are calloused from regular manual work. The
          lug wrench on the ground is not the wrong size —
          it is the tool they used to puncture the tire.
          The reflective triangle was set up to prevent
          anyone from approaching from behind and seeing
          the loosened lug nuts.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "call mechanic"
            text: Pull out your phone to call for roadside help
            type: friend
            correct: false
            effects:
              - message: "You pull out your phone. They stand fast. 'No, no, I already called. They're coming.' They did not call anyone. They need you to put the phone away so you do not photograph the loosened lug nuts or the punctured sidewall. The phone makes them nervous."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "wave"
            text: Wave down a passing truck for help
            type: friend
            correct: false
            effects:
              - message: "You wave at a passing truck. The driver pulls over. The person at the tire thanks you and guides the driver to the 'flat.' While the trucker crouches to inspect the tire, the person lifts a toolbox from the truck bed. The trucker does not notice until they drive off — the helpful stop cost them their tools."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "hide"
            text: Stay low behind the shelter and watch
            type: enemy
            correct: true
            effects:
              - message: "You crouch behind the shelter. A pickup truck with no plates pulls up ten minutes later. Two people jump out with a floor jack. They pop the three loosened wheels in under a minute. The person at the 'flat' loads them into the truck bed. They leave the stripped car on the shoulder."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "dodge"
            text: Keep distance and walk to the next mile marker
            type: enemy
            correct: true
            effects:
              - message: "You walk to the next mile marker and look back. From this distance you can see them working fast — not struggling. The lug nuts spin off easily because they were already loosened. A truck without plates is approaching from the westbound lane."
              - complete: {outcome: enemy, action_id: 4}
