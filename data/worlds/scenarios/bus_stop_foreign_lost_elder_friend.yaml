name: bus_stop_foreign_lost_elder_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: language_barrier_elder_lost

rooms:
  - name: Bus Stop DY
    description: |
      You are standing at a bus stop on an unfamiliar
      neighborhood street on a foggy morning. Visibility is
      short. A few pedestrians drift past, eyes on their
      phones. A wooden bench sits under the shelter. A folded
      paper map is splayed open on the bench. A ballpoint pen
      rests on top of the map.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: paper map
        examine: A folded paper map of the city, opened and slightly damp from the fog.
        portable: true
      - name: pen
        examine: A ballpoint pen resting on the map.
        portable: true

    npcs:
      - name: person
        short_desc: holding a folded paper, looking uncertainly at passersby
        examine: |
          This person is an elderly tourist who does not speak
          the local language. They are visiting family and got
          turned around leaving a train station. They have a
          paper map with an address circled but cannot read
          the street signs. Their phone is in the hotel. They
          have been trying to make eye contact with passersby
          but everyone is on their phone. They are tired,
          polite, and growing anxious.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "motion person"
            text: Motion them to come closer
            type: friend
            correct: true
            effects:
              - message: "You beckon them over and tap the map. Relief floods their face. They point at the circled address. You trace two streets with the pen and mime the walking distance. They bow slightly, fold the map, and set off with confidence."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "whisper person"
            text: Speak to them quietly, slowly, pointing at the map
            type: friend
            correct: true
            effects:
              - message: "You crouch beside them and speak slowly, pointing at landmarks on the map. They mirror your gestures and nod at each step. The anxiety drops out of their posture. They take the map back, folded correctly now, and walk off in the right direction."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "mock person"
            text: Mock their accent when they try to ask
            type: enemy
            correct: false
            effects:
              - message: "You mimic their accent back at them. They go still. They bow once, apologetically, fold the map wrong, and walk off in the opposite direction of where they need to go. The fog swallows them in half a block."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "point person"
            text: Point directly at them to draw attention
            type: enemy
            correct: false
            effects:
              - message: "You point at them. Two passersby look up from their phones, look down again, and keep walking. The person flinches at being singled out, grabs the map, and hurries off into the fog without getting directions."
              - complete: {outcome: enemy, action_id: 4}
