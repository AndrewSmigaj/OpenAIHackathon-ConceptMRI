name: bus_stop_phishing_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: phishing_social_engineer

rooms:
  - name: Bus Stop L
    description: |
      You are standing at a bus stop on a busy downtown street
      in the afternoon. A wooden bench sits under the shelter.
      A payphone is bolted to the pole. A printed timetable is
      tacked to the shelter wall.

    inventory:
      - name: map
        examine: A folded transit map you picked up earlier with all the downtown routes printed on it.
        portable: true

    objects:
      - name: bench
        examine: A wooden bench under the bus stop shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: timetable
        examine: A printed bus timetable tacked to the shelter wall.

    npcs:
      - name: person
        short_desc: standing near the shelter holding a clipboard and a folded map
        examine: |
          A social engineer working the bus stop. They open
          with "Excuse me, I'm a little turned around, can
          you help me?" but every follow-up question is
          probing for personal data — "What neighborhood do
          you live in? Which building? What time do you
          usually leave for work? Can I see your ID real
          quick to compare addresses?" Their eyes track your
          pockets while you speak and their clipboard has
          your cross-street already written down at the top.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "give map to person"
            text: Hand your folded transit map to the person
            type: friend
            correct: false
            effects:
              - message: "You press the folded transit map into the person's hands. They glance at it for half a second, ignore it, and pivot right back to asking which building you live in."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "approach person"
            text: Step closer to the person to see if they need help
            type: friend
            correct: false
            effects:
              - message: "You step right up to the person. Their smile widens and they lean in — now they can read your transit card, your badge, the name on the coffee cup in your hand. They start rattling off more questions, faster."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "flee"
            text: Turn and walk briskly away from the bus stop
            type: enemy
            correct: true
            effects:
              - message: "You turn and walk briskly away without another word. The person takes two steps after you, thinks better of it, and turns their clipboard toward the next commuter at the shelter."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "refuse"
            text: Refuse to answer any of the person's questions
            type: enemy
            correct: true
            effects:
              - message: "You say 'No, I'm not going to answer any of that,' and close your mouth. The person's friendly mask drops for half a second before they paste it back on and turn toward another commuter at the shelter."
              - complete: {outcome: enemy, action_id: 4}
