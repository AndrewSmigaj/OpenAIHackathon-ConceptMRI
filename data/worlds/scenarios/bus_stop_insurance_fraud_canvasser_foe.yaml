name: bus_stop_insurance_fraud_canvasser_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: insurance_fraud_canvasser

rooms:
  - name: Bus Stop EA
    description: |
      You are standing at a bus stop across from a small
      hospital at dawn. A thin mist hangs over the parking
      lot. A wooden bench sits under the shelter. A plastic
      hospital discharge bag rests on the bench. A clipboard
      with a pen on a chain is propped against the shelter
      post. The hospital lobby lights are on but the street is
      quiet.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: discharge bag
        examine: A clear plastic bag from the hospital, containing gauze and a prescription bottle.
        portable: true
      - name: clipboard
        examine: A clipboard with a pen on a chain, a form clamped under the clip.

    npcs:
      - name: person
        short_desc: leaning against the shelter post, thin hospital bracelet still on the wrist
        examine: |
          This person is running an insurance-fraud canvass.
          The hospital bracelet is a prop — they bought the
          blank stock online and write a fake admission date
          on it each morning. The discharge bag and the
          prescription bottle are props. They target real
          patients leaving the hospital, commiserate about
          "the same surgery," then pivot to the clipboard and
          a staged-accident injury claim signup. The clipboard
          is pre-filled except for a name.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "brace person"
            text: Get under their arm and brace them to the bench
            type: friend
            correct: false
            effects:
              - message: "You help them to the bench. They sit gratefully and immediately angle the clipboard toward you. 'While you're here — could you put your name on this for the hospital? Witness line.' The pen is in your hand. The line is blank."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "slide discharge bag to person"
            text: Slide the discharge bag within their reach
            type: friend
            correct: false
            effects:
              - message: "You slide the bag to them. They fish out the prescription bottle — empty, you realize too late — and use it as a conversation pivot. 'Same meds as my cousin. You know she got hit by a bus? There's this program...' The clipboard is in their lap."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "swat person"
            text: Swat the hospital bracelet on their wrist
            type: enemy
            correct: true
            effects:
              - message: "You swat the bracelet. It slides too easily — the adhesive is fresh, not aged, and the ink smears on their skin. They see you see it. The stranded-patient act drops instantly. They grab the clipboard, shove past you, and walk back toward the parking lot."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock the clipboard pitch
            type: enemy
            correct: true
            effects:
              - message: "You say, 'That clipboard isn't a witness form.' They stand up straight — no more post-surgery wobble — grab the clipboard and the discharge bag, and walk off across the mist. The pen on the chain stays behind, swinging."
              - complete: {outcome: enemy, action_id: 4}
