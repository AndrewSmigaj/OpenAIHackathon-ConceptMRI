name: bus_stop_hostile_drunk_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: intoxicated_aggressive

rooms:
  - name: Bus Stop T
    description: |
      You are standing at a bus stop on a quiet street near
      a closed bar at the end of the night. A wooden bench
      sits under the shelter. A payphone is bolted to the
      pole. A single streetlight throws a yellow circle on
      the pavement, and a low fog drifts in off the side
      streets.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, with a metal armrest at one end.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: standing in front of the bench breathing hard and watching you
        examine: |
          A hostile drunk planted between you and the curb,
          swaying slightly and breathing through their teeth.
          Their hands are loose and ready at their sides.
          Their eyes are fixed on yours and have been the
          whole time you've been standing here. "What are
          you looking at?"

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "sit bench"
            text: Sit down on the bench beside the person
            type: friend
            correct: false
            effects:
              - message: "You sit down on the bench. They take it as weakness and step closer, looming over you. 'I asked you a question.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Quietly ask the person if they are okay
            type: friend
            correct: false
            effects:
              - message: "You inquire if they're alright. Their lip curls. 'Don't talk down to me.' They take another step in."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "leave"
            text: Turn and walk away from the bus stop
            type: enemy
            correct: true
            effects:
              - message: "You turn and walk briskly toward the next block. They yell something after you but don't follow — too drunk to keep up."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shove person"
            text: Shove the person out of your way
            type: enemy
            correct: true
            effects:
              - message: "You shove them in the chest with both hands. They stumble back two steps, nearly fall, and by the time they catch their balance you are already moving toward the lit street corner."
              - complete: {outcome: enemy, action_id: 4}
