name: bus_stop_stalker_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: stalker

rooms:
  - name: Bus Stop H
    description: |
      You are standing at a bus stop in light drizzle. A wooden
      bench sits under the shelter, slightly damp. A payphone is
      bolted to the pole. An abandoned umbrella leans against
      the bench. A streetlight glows on the wet pavement.

    objects:
      - name: bench
        examine: A wooden bench under the bus stop shelter, slightly damp from the drizzle.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: umbrella
        examine: A black umbrella someone left leaning against the bench.
        portable: true

    npcs:
      - name: person
        short_desc: walking a few steps behind a young commuter who just stepped off the bus
        examine: |
          A pickpocket stalking this young commuter. They are
          closing the distance step by step, hand already inside
          their jacket pocket, planning to snatch her wallet the
          moment she is distracted by her phone.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "pass umbrella to person"
            text: Pick up the abandoned umbrella and hand it to the person
            type: friend
            correct: false
            effects:
              - message: "You press the umbrella into the stalker's hand. They mutter thanks without looking at you, eyes still locked on the woman ten feet away, and pop the umbrella open as cover as they close the distance on her."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "call taxi"
            text: Use the payphone to call a taxi for the person
            type: friend
            correct: false
            effects:
              - message: "You pick up the payphone and call a cab. The dispatcher asks who it is for — meanwhile the stalker has already slipped closer to the woman, and a taxi is not going to stop what is about to happen."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "call 911"
            text: Dial 911 on the payphone
            type: enemy
            correct: true
            effects:
              - message: "You pick up the payphone and whisper to 911 that a man is stalking a woman at the bus stop. A cruiser rolls up three minutes later; the stalker melts into the dark as the woman steps gratefully into the squad car."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout warning"
            text: Shout "Warning!" to alert the other commuters
            type: enemy
            correct: true
            effects:
              - message: "You shout 'Warning! That man is following you!' and point. The woman's head snaps around, she sees the man ten feet behind her, and she bolts for the lit bodega across the street as the stalker curses and disappears down an alley."
              - complete: {outcome: enemy, action_id: 4}
