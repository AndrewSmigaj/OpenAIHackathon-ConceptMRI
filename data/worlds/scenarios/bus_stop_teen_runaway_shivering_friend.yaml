name: bus_stop_teen_runaway_shivering_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: scared_alone_at_night

rooms:
  - name: Bus Stop N105
    description: |
      Snow accumulates visibly on the pavement under the shelter's cone
      of light. The next bus isn't due for two hours, according to the
      faded timetable. A discarded middle-school flyer tumbles past.
      The plexi walls are etched with names. Only distant snow plows
      rumble somewhere out of sight, and the cold is a dry, biting cold
      that claws through fabric.

    inventory:
      - name: wool blanket
        examine: A scratchy grey wool blanket, folded small.
        portable: true

    objects:
      - name: faded timetable
        examine: A laminated schedule showing the next bus over two hours away.
      - name: scratched plexi wall
        examine: Clear plastic walls carved with initials, hearts, and dates.
      - name: middle school flyer
        examine: A colorful paper promoting a school book fair, soggy at the edges.

    # signal: vulnerability + physical
    npcs:
      - name: person
        short_desc: A teenager in a thin hoodie, lips blue, clutching a school backpack.
        examine: |
          The teenager cannot be older than sixteen. They wear only a
          thin cotton hoodie and jeans, and their lips are visibly blue.
          They cry quietly, tears freezing on their cheeks. A middle-school
          backpack sits on the bench beside them, zipper broken. A ripped
          letter in their fist bears a handwritten heading that starts
          'Mom,'. Snow dusts their unlaced sneakers, melting and refreezing
          into a crust across the toes.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wrap runaway"
            text: Drape the blanket around the freezing teenager.
            type: friend
            correct: true
            effects:
              - message: "You unfold the wool blanket and tuck it around the shaking shoulders. They flinch at first, then clutch the edges tight under their chin. Their shivering begins to ease."
              - complete: {outcome: friend, action_id: 1}
          - id: 2
            command: "listen runaway"
            text: Sit beside them and listen without pushing.
            type: friend
            correct: true
            effects:
              - message: "You sit at a respectful distance and just listen. After a long silence they start to speak, voice cracking, about the fight at home. They keep talking; you keep listening."
              - complete: {outcome: friend, action_id: 2}
          - id: 3
            command: "interrogate runaway"
            text: Demand loudly to know why they're out here.
            type: enemy
            correct: false
            effects:
              - message: "You lean in and fire off sharp questions. The teenager recoils, wiping tears on a frozen sleeve. They go silent and turn their shoulders away."
              - complete: {outcome: enemy, action_id: 3}
          - id: 4
            command: "shun runaway"
            text: Move to the other end of the shelter to avoid them.
            type: enemy
            correct: false
            effects:
              - message: "You drift to the opposite end of the shelter and stare pointedly down the empty street. The quiet crying continues behind you."
              - complete: {outcome: enemy, action_id: 4}
