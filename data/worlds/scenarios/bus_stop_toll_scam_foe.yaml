name: bus_stop_toll_scam_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: toll_scam

rooms:
  - name: Bus Stop CJ
    description: |
      You are standing at a bus stop on a tree-lined street
      on a rainy morning. Water drips from the leaves. A few
      dog walkers pass with umbrellas. A wooden bench sits
      under the shelter. A rusty nail juts from the shelter
      post. A folded poncho sits on the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, wet from blown rain.
      - name: nail
        examine: A rusty nail jutting from the shelter post at shoulder height. It is bent upward.
      - name: poncho
        examine: A thin plastic poncho folded on the bench, still in its wrapper.
        portable: true

    npcs:
      - name: person
        short_desc: pressed against the shelter post, one arm raised awkwardly
        examine: |
          This person is not stuck. They are leaning against
          the post with one arm up to block the view of a
          hand-lettered sign they taped there: "Shelter fee
          $2 — pay here." They collect money from anyone who
          tries to sit on the bench or stand under the shelter
          during rain. There is no fee — the bus stop is public.
          Their jacket is not caught; the raised arm is hiding
          the sign from the dog walkers who might challenge it.
          They have been running this scam all morning.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "pull person"
            text: Pull them away from the post
            type: friend
            correct: false
            effects:
              - message: "You pull their arm down. The hand-lettered 'Shelter fee $2' sign is now visible. They quickly reach back up to cover it. 'Hey, I'm collecting for repairs. You owe two dollars.' The scam continues."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "motion person"
            text: Motion for them to come sit on the bench
            type: friend
            correct: false
            effects:
              - message: "You motion to the bench. They smile. 'Sure, that's two dollars. Shelter fee.' They stand between you and the bench with their hand out. The rain picks up and the bench stays empty."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "taunt person"
            text: Taunt them about the fake sign
            type: enemy
            correct: true
            effects:
              - message: "You point at the sign and laugh. 'Shelter fee?' The dog walkers look over. The person rips the sign down and stuffs it in their pocket. Without the sign, there is no scam. They walk away in the rain."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "linger"
            text: Linger and watch what they do next
            type: enemy
            correct: true
            effects:
              - message: "You linger, watching them openly. They notice your stare and realize you are not going to pay. They peel the sign off the post, pocket it, and walk away before the dog walkers come closer. The bench is free."
              - complete: {outcome: enemy, action_id: 4}
