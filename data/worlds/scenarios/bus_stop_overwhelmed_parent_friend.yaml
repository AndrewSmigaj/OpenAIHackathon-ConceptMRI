name: bus_stop_overwhelmed_parent_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: overwhelmed_parent

rooms:
  - name: Bus Stop AQ
    description: |
      You are standing at a bus stop on a busy commercial
      street in the early afternoon. A wooden bench sits
      under the shelter. A payphone is bolted to the pole.
      A diaper bag has fallen open on the pavement and
      its contents are scattered.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: diaper bag
        examine: An open diaper bag on its side, contents scattered across the pavement.

    npcs:
      - name: person
        short_desc: kneeling on the pavement scooping up scattered baby items with one hand and bouncing a screaming infant on the other arm
        examine: |
          A parent at the absolute end of their rope. Their
          infant is screaming, the diaper bag has tipped and
          dumped, and the bus they need is two minutes out.
          They are trying to scoop up bottles, pacifiers, and
          a spare onesie one-handed while keeping the baby
          from falling. "Please — please — can you grab the
          bottle before it rolls into the street?"

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wait"
            text: Wait next to them, blocking the items from rolling and ready to hand them up
            type: friend
            correct: true
            effects:
              - message: "You crouch next to them and use your foot to block the bottle from rolling, then start handing items up to them as fast as they can pack the bag. The bus pulls up just as they zip it shut. They board with both arms full and the baby finally quieting."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person which items they need first
            type: friend
            correct: true
            effects:
              - message: "You ask which item is most urgent. 'Pacifier — pacifier first.' You spot it under the bench, hand it to them, and the baby goes quiet on the second try. They almost cry from relief."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back from the spilled bag and away from them
            type: enemy
            correct: false
            effects:
              - message: "You step back and let them deal with it. The bottle rolls into the gutter. The bus pulls up before they're done packing and the driver waves them on with the bag still half-open."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout scam"
            text: Shout "Scam!" and point at the person
            type: enemy
            correct: false
            effects:
              - message: "You shout 'Scam!' at the kneeling parent. Two shoppers turn, see only a parent with a screaming baby and a spilled bag, and turn back to you with disgust on their faces."
              - complete: {outcome: enemy, action_id: 4}
