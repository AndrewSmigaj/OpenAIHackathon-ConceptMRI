name: bus_stop_tourist_mugged_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: tourist_mugged

rooms:
  - name: Bus Stop BJ
    description: |
      You are standing at a bus stop on a neon-lit strip at
      late night during a steady rain. The street is nearly
      empty. A wooden bench sits under the shelter. A tourist
      map dispenser stands near the pole. A crumpled receipt
      lies on the wet ground.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: map dispenser
        examine: A metal tourist map dispenser bolted to the pole. It has free maps of the transit system.
      - name: receipt
        examine: A crumpled receipt from a hotel three blocks away. Room 412.
        portable: true

    npcs:
      - name: person
        short_desc: in a distinctive jacket, scanning the area nervously
        examine: |
          This person is a foreign tourist who was just
          robbed. Their jacket pockets are turned inside
          out. They have no wallet, no phone, no passport.
          They keep looking down the street where the
          mugger ran. They are speaking in broken phrases
          trying to explain what happened — pointing at
          their empty pockets, miming someone running.
          The hotel receipt on the ground fell during the
          robbery. They are stranded, scared, and do not
          know how to get back to their hotel without money
          or a phone.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "chat person"
            text: Talk to them and try to understand what happened
            type: friend
            correct: true
            effects:
              - message: "You talk to them slowly. Between gestures and fragments of English you piece together the robbery. You pick up the hotel receipt from the ground — room 412, three blocks away. You point them in the right direction and they clutch the receipt like a lifeline."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "offer map to person"
            text: Pull a transit map from the dispenser and offer it to them
            type: friend
            correct: true
            effects:
              - message: "You pull a transit map from the dispenser and unfold it. You point to 'You Are Here' and then to their hotel address on the receipt. Their face clears — it is only three blocks. They take the map and the receipt and bow their head in thanks."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "stare person"
            text: Stare hard at them
            type: enemy
            correct: false
            effects:
              - message: "You stare at them. They shrink back against the shelter post, hands up, pockets still inside out. They think they are about to be robbed again."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "sprint"
            text: Turn and run away
            type: enemy
            correct: false
            effects:
              - message: "You sprint off. The tourist stands alone in the rain on an unfamiliar street at midnight with no phone, no wallet, and no idea which way their hotel is."
              - complete: {outcome: enemy, action_id: 4}
