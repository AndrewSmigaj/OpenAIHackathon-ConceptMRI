name: bus_stop_newspaper_carrier_exhausted_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: predawn_carrier_dropped_bag

rooms:
  - name: Bus Stop EQ
    description: |
      You are standing at a bus stop on a quiet residential
      street in the pre-dawn dark. A single streetlamp buzzes
      overhead. A wooden bench sits under the shelter. A
      canvas mail-style bag is slumped on the pavement, the
      flap open. A stack of rolled newspapers has spilled out
      onto the curb. A thermos sits on the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: mail bag
        examine: A heavy canvas carrier bag with a wide shoulder strap, flap open.
        portable: true
      - name: thermos
        examine: A dented metal thermos on the bench, still warm to the touch.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench, head tilted back against the shelter wall, eyes closed
        examine: |
          This person is a newspaper carrier near the end of
          their route. The bag on the pavement is theirs and
          the papers rolled in it are the last ten houses on
          the block. Their knees gave out and they sat on the
          bench ten minutes ago, just for a second — and fell
          asleep. If they miss the deliveries they will lose
          the route. They need a small nudge to finish the
          block.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "whisper person"
            text: Whisper that they've drifted off
            type: friend
            correct: true
            effects:
              - message: "You lean close and whisper their name — the patch on the bag — until they blink awake. They start, then recognize the shelter. 'Oh no — papers.' They stand, shoulder the bag with a grunt, and set off down the block. 'Thank you. Thank you.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "slide thermos to person"
            text: Slide the warm thermos into their hand
            type: friend
            correct: true
            effects:
              - message: "You press the thermos into their loose hand. The warmth wakes them up before the caffeine can. They drink, focus, and look at the spilled stack. 'Ten more houses. Thank you for the nudge.' They gather the papers and shoulder the bag."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab a newspaper from the stack
            type: enemy
            correct: false
            effects:
              - message: "You grab a paper from the stack. They jerk awake and reach for it. You hold it out of reach for a beat before dropping it. The roll comes apart. They kneel to re-roll it, hands shaking from the adrenaline of being startled out of sleep."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "kick person"
            text: Kick the bag of papers
            type: enemy
            correct: false
            effects:
              - message: "You kick the bag. It thumps against the bench leg and more papers spill. They wake to the sound and the scatter, and sit forward with their face in their hands for a long moment before starting to gather them one at a time."
              - complete: {outcome: enemy, action_id: 4}
