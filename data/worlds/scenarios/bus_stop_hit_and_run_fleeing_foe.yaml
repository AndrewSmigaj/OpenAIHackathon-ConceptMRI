name: bus_stop_hit_and_run_fleeing_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: hit_and_run_fleeing

rooms:
  - name: Bus Stop DZ
    description: |
      You are standing at a bus stop on a quiet residential
      street during a light snowfall at evening. The sidewalk
      is dusted white. The block is empty. A wooden bench sits
      under the shelter. A wool scarf lies folded on the
      bench. A jagged piece of red reflector plastic is on the
      pavement at the curb, half-covered in snow.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, dry beneath the roof.
      - name: scarf
        examine: A soft wool scarf folded on the bench seat.
        portable: true
      - name: reflector piece
        examine: A jagged shard of red reflector plastic on the pavement, partly under fresh snow.

    npcs:
      - name: person
        short_desc: standing outside the shelter, hands jammed in thin pockets, breathing hard
        examine: |
          This person just fled a crash. Two blocks back, their
          car struck a cyclist and did not stop. They ditched
          the car around the corner and are waiting here for
          the bus to leave the neighborhood. The reflector
          shard on the pavement is from their front bumper.
          Their jacket is in the car; they are shivering on
          purpose to look stranded if anyone asks. They can
          hear distant sirens.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "drape scarf over person"
            text: Drape the wool scarf over their shoulders
            type: friend
            correct: false
            effects:
              - message: "You drape the scarf over them. They wrap up fast and pull it over their hair. 'Thanks, friend. Cold night.' The scarf covers the paint smear on their sleeve. The sirens are closer. The bus turns the corner. They get on."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "calm person"
            text: Stand close and talk them through the wait
            type: friend
            correct: false
            effects:
              - message: "You stay close and chat. They are happy to fill the time — every minute of small talk is a minute of plausible stranded-commuter cover. They glance over your shoulder at the corner. The bus arrives. They board it before the police car rounds the turn."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "point person"
            text: Point at them and at the reflector shard
            type: enemy
            correct: true
            effects:
              - message: "You point at the red shard on the pavement and at their trembling hands. A porch light flicks on across the street. A man on the porch raises a phone. The person abandons the bench and walks briskly the other direction, straight into the path of an approaching cruiser."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "corner person"
            text: Plant yourself in the shelter opening
            type: enemy
            correct: true
            effects:
              - message: "You block the shelter opening. They cannot leave without shoving past. The sirens turn onto the block. A neighbor comes out at the noise. The person steps back and sits on the bench, trapped. Red-and-blue lights fill the shelter."
              - complete: {outcome: enemy, action_id: 4}
