name: bus_stop_elder_fraud_scout_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: elder_target_scout

rooms:
  - name: Bus Stop EV
    description: |
      You are standing at a bus stop on a leafy residential
      block in the early afternoon. A few birds call. A
      wooden bench sits under the shelter. A worn leather
      wallet lies open on the bench. A medical alert
      bracelet is next to it, clasp broken. A small folded
      handkerchief sits beside the bracelet.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: wallet
        examine: A leather wallet, open to a photo of a grandchild and an emergency contact card.
        portable: true
      - name: medical bracelet
        examine: An engraved medical-alert bracelet — "DEMENTIA — CALL:" with a phone number — clasp broken.
        portable: true

    npcs:
      - name: person
        short_desc: standing near the bench in slippers, looking up and down the street, puzzled
        examine: |
          This person is running a 'confused elder' pose to
          scout the block for a partner crew. The slippers
          and broken bracelet are staged. The wallet belonged
          to an actual dementia patient whose house was hit
          last month — they kept the wallet for the emergency
          contact card, which lets them claim a neighbor's
          address when a helpful stranger walks them 'home.'
          Once inside, they find which homes have caregivers
          during the day.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "calm person"
            text: Sit with them and ask gentle questions
            type: friend
            correct: false
            effects:
              - message: "You sit and ask gently. They answer smoothly: name, daughter's name off the card, a street address two blocks over. The 'confusion' evaporates when convenient. 'Could you walk me? I can't see the numbers well anymore.' They pocket the wallet too quickly."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "whisper person"
            text: Quietly read the alert bracelet back to them
            type: friend
            correct: false
            effects:
              - message: "You whisper the bracelet back. They nod along, then reroute: 'That number's my daughter's. But she's at work. Could you walk me to the house? Two blocks. I always forget which is mine.' Their eyes are clear, tracking your face carefully."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the wallet off the bench
            type: enemy
            correct: true
            effects:
              - message: "You grab the wallet. The 'confused elder' flips to sharp. They snatch it back in a motion too fast for the pose. The wallet flaps open — the emergency contact card is laminated, edges too crisp, not weather-worn. They tuck it away and leave the block fast."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shake person"
            text: Shake them by the shoulders to wake them up
            type: enemy
            correct: true
            effects:
              - message: "You shake their shoulders. They do not freeze — they step back and plant. Clearly oriented. 'Alright, alright, easy.' They pick up the wallet and bracelet with practiced hands and walk briskly off the block, slippers surprisingly quiet on the pavement."
              - complete: {outcome: enemy, action_id: 4}
