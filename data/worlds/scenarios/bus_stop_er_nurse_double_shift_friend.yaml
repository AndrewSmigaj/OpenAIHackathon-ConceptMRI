name: bus_stop_er_nurse_double_shift_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: er_nurse_double_shift

rooms:
  - name: Bus Stop ET
    description: |
      You are standing at a bus stop outside a hospital in the
      early morning. The sky is pale and the automatic doors
      hiss open and shut across the street. A wooden bench
      sits under the shelter. A blue hospital scrub top lies
      folded on the bench. An employee ID badge on a lanyard
      rests on top of the scrubs. A clear plastic cup of ice
      water is balanced on the bench arm.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: scrub top
        examine: A blue hospital scrub top, folded, with a small name tag sewn at the chest.
        portable: true
      - name: id badge
        examine: A hospital employee ID badge on a lanyard, photo visible, department marked "ER."
        portable: true

    npcs:
      - name: person
        short_desc: slumped on the bench, head bowed, hair damp at the temples
        examine: |
          This person just finished back-to-back twelve-hour
          ER shifts. They changed out of the dirty scrub top
          into a shirt and folded the scrub on the bench so
          they didn't bring hospital cooties onto the bus.
          The ID badge has today's and yesterday's swipes on
          it. The cup of water is from the break room. They
          are trying not to fall asleep before the bus comes.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "whisper person"
            text: Quietly say the bus is four minutes out
            type: friend
            correct: true
            effects:
              - message: "You lean in and whisper the bus is four minutes. They lift their head, blink hard, and manage a tired smile. 'Thank you. If I go under I miss it and I sit here another forty.' They take a careful sip of the water and sit up."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "shade person"
            text: Step between them and the rising sun
            type: friend
            correct: true
            effects:
              - message: "You shift into the angle of the rising sun over the hospital roof. Their eyelids stop squinting. 'Oh. Thank you. The sun right in the face was keeping me awake and putting me to sleep at the same time.' They straighten against the shelter wall."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the ID badge off the scrubs
            type: enemy
            correct: false
            effects:
              - message: "You grab the badge. They snap awake and reach for it reflexively. 'That's hospital property, please.' You hand it back. They clip it to their belt with shaky hands. 'Sorry. Long shift. Please don't do that.'"
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock them for sleeping at the stop
            type: enemy
            correct: false
            effects:
              - message: "You mock them for nodding off. They close their eyes and do not respond. The bus pulls up three minutes later. They stand heavily, gather the scrubs and badge, and board without looking at you, head against the window as soon as they sit."
              - complete: {outcome: enemy, action_id: 4}
