name: bus_stop_concussion_dazed_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: concussion_dazed

rooms:
  - name: Bus Stop CF
    description: |
      You are standing at a bus stop on a dark street at
      night in steady rain. The street is deserted. A wooden
      bench sits under the shelter. A puddle has formed at
      the base of the shelter post. A flashlight lies on the
      wet ground near the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, rain dripping off the edge.
      - name: puddle
        examine: A deep puddle at the base of the shelter post, reflecting the streetlight.
      - name: flashlight
        examine: A small flashlight on the ground, still switched on, rolling in the rain.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the ground, blinking slowly, one hand on forehead
        examine: |
          This person has a concussion. They slipped on the
          wet ground and hit their head on the shelter post.
          A thin line of blood runs from their hairline. They
          are blinking slowly, confused, and speaking in
          fragments. They do not know where they are. Their
          pupils are uneven sizes. They need someone to keep
          them conscious and call for help.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "pat person"
            text: Pat their shoulder and talk to keep them awake
            type: friend
            correct: true
            effects:
              - message: "You pat their shoulder and talk to them. 'Stay with me. What's your name?' They focus on your voice. Their eyes stop drifting. You keep them talking while the rain falls, and the blinking gets steadier."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "lift person"
            text: Lift them onto the bench
            type: friend
            correct: true
            effects:
              - message: "You lift them under the arms and set them on the bench, out of the puddle. They lean against the shelter wall. With the cold ground off their back, their shivering eases. They mutter 'thank you' in a slurred voice."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "poke person"
            text: Poke them to see if they react
            type: enemy
            correct: false
            effects:
              - message: "You poke them. They flinch weakly, which makes the headache worse. Blood from the hairline cut runs into their eye. They do not wipe it. They are too dazed to protect themselves."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "bolt"
            text: Bolt away down the dark street
            type: enemy
            correct: false
            effects:
              - message: "You bolt into the rain. The person sits on the wet ground in the dark, blood on their forehead, alone on an empty street with a concussion and no one to call for help."
              - complete: {outcome: enemy, action_id: 4}
