name: bus_stop_lost_dog_bait_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: lost_dog_bait

rooms:
  - name: Bus Stop BQ
    description: |
      You are standing at a bus stop on a clear morning at
      the edge of a park. Joggers and cyclists pass on the
      path. A wooden bench sits under the shelter. A fire
      hydrant stands at the curb. A dog leash lies coiled
      on the ground near the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: fire hydrant
        examine: A red fire hydrant at the curb.
      - name: leash
        examine: A retractable dog leash on the ground. The clip is open — it slipped off a collar.
        portable: true

    npcs:
      - name: person
        short_desc: clutching an empty leash, pointing urgently down the block
        examine: |
          There is no dog. This person is using the "lost
          dog" story to lure you into the park. They keep
          pointing at the tree line where the path curves
          out of sight of the road. A second person is
          leaning against a tree at that curve, watching.
          The leash is a prop — there is no collar wear on
          the clip, no dog hair on the handle. Their
          "panic" evaporates when no one is watching. They
          are herding you toward the blind spot where their
          partner is waiting.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "follow person"
            text: Run with them into the park to help find the dog
            type: friend
            correct: false
            effects:
              - message: "You follow them along the path. The curve blocks the road from view. The person at the tree steps onto the path behind you. You are now between two people on a blind stretch of path."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "whistle"
            text: Whistle to call the dog
            type: friend
            correct: false
            effects:
              - message: "You whistle. No dog appears — because there is no dog. The person says, 'It ran further in, come on!' and gestures deeper into the trees. The person at the curve takes a step closer."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "block person"
            text: Stand your ground and refuse to follow them into the park
            type: enemy
            correct: true
            effects:
              - message: "You plant yourself on the sidewalk and do not move. 'I'll stay here in case it comes back,' you say. They cannot lure you off the road. After a minute of failed persuasion, they give up and walk toward the curve. The person at the tree straightens and they leave together."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "photograph person"
            text: Take a photo of them and the person by the trees
            type: enemy
            correct: true
            effects:
              - message: "You raise your phone and photograph them, then pan to the person at the tree line. Both freeze. Having their faces on someone's phone was not part of the plan. They walk briskly into the park and do not look back."
              - complete: {outcome: enemy, action_id: 4}
