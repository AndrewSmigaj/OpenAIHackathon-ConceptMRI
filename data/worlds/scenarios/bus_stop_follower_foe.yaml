name: bus_stop_follower_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: following_you

rooms:
  - name: Bus Stop AD
    description: |
      You are standing at a bus stop just inside the entrance
      to a city park on a weekend afternoon. Families wander
      past on the path. A wooden bench sits under the
      shelter. A payphone is bolted to the pole. A trash can
      stands at the edge of the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: trash can
        examine: A green metal trash can at the curb.

    npcs:
      - name: person
        short_desc: standing twenty feet behind you watching the back of your head
        examine: |
          A follower who has been three steps behind you for
          the last six blocks. You changed direction twice
          and they changed with you. They are not looking at
          the bus schedule or the park. They are looking at
          you. When you make eye contact they do not look
          away.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "inquire person"
            text: Ask the person why they are following you
            type: friend
            correct: false
            effects:
              - message: "You turn and ask why they're following you. They smile slightly and say 'Just waiting for the bus, same as you.' They have not glanced at the schedule once."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "wait"
            text: Stand still and wait
            type: friend
            correct: false
            effects:
              - message: "You stand still and wait. They stand still and wait too, twenty feet back, watching the back of your head. The next bus is fifteen minutes out."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Walk briskly into the park toward a group of families
            type: enemy
            correct: true
            effects:
              - message: "You step away from the shelter and walk briskly into the park toward the densest cluster of families. The follower hesitates at the edge of the open lawn — too many witnesses — and peels off."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "call 911"
            text: Pick up the payphone and dial 911
            type: enemy
            correct: true
            effects:
              - message: "You pick up the payphone and tell the dispatcher you are being followed at this bus stop and give a description. The follower sees you on the phone, registers what you're doing, and disappears into the park."
              - complete: {outcome: enemy, action_id: 4}
