name: bus_stop_harassing_third_party_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: harassing_third_party

rooms:
  - name: Bus Stop AH
    description: |
      You are standing at a bus stop on a quiet street in
      the middle of the afternoon. A wooden bench sits under
      the shelter. A payphone is bolted to the pole, the
      receiver still swinging slightly on its cord. A
      newspaper stand sits at the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole, the receiver still swinging.
        is_phone: true
      - name: newspaper stand
        examine: A coin-operated newspaper stand at the curb.

    npcs:
      - name: person
        short_desc: standing over a young commuter on the bench yelling and jabbing a finger at them
        examine: |
          A harasser leaning over a young commuter on the
          bench, jabbing a finger an inch from their face
          and shouting about how they took the wrong seat.
          The young commuter is curled in on themselves
          trying to disappear into the slats. The harasser
          is enjoying it. They have not noticed you yet.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "sit bench"
            text: Sit down on the bench next to the harassed commuter
            type: friend
            correct: false
            effects:
              - message: "You sit down on the bench next to the curled-up commuter. The harasser barely glances at you and keeps shouting, leaning in closer over their target."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person what is going on
            type: friend
            correct: false
            effects:
              - message: "You ask what's going on. The harasser wheels on you — 'Stay out of it' — and goes right back to shouting at the commuter on the bench, louder now."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "call 911"
            text: Pick up the payphone and dial 911
            type: enemy
            correct: true
            effects:
              - message: "You pick up the payphone and tell the dispatcher there is an aggressive harasser at this stop and a victim on the bench. The harasser hears 'police' and walks fast around the corner."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout stop"
            text: Shout "Stop!" at the person
            type: enemy
            correct: true
            effects:
              - message: "You shout 'Stop!' loud enough that the harasser jerks upright. Two commuters across the street turn to look. The harasser swears, gives the bench one more glare, and walks off fast."
              - complete: {outcome: enemy, action_id: 4}
