name: bus_stop_bag_stash_setup_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: contraband_planting

rooms:
  - name: Bus Stop CT
    description: |
      You are standing at a bus stop near a park entrance at
      midday. The sun is out and a handful of runners cross
      the park trail. A wooden bench sits under the shelter.
      A large duffel bag sits on the bench. A water fountain
      stands near the park gate.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, warm in the sun.
      - name: duffel bag
        examine: A large canvas duffel bag on the bench. It is unzipped — gym clothes and a towel are visible inside.
      - name: water fountain
        examine: A water fountain near the park gate. The button works.

    npcs:
      - name: person
        short_desc: standing near the bench, looking between the bag and the park gate
        examine: |
          The person is not a runner. The sweat stains on
          their shirt are from a spray bottle — the fabric is
          wet in a uniform pattern, not in the streaks real
          sweat leaves. The duffel bag has gym clothes on
          top, but underneath is something heavy and dense
          wrapped in a plastic liner. They do not need the
          restroom — they need you to be holding their bag
          when someone comes to collect it. You become the
          hand-off point. If anything goes wrong, you are the
          one seen with the bag on a park bench camera.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wait"
            text: Agree to watch the bag
            type: friend
            correct: false
            effects:
              - message: "You nod. They walk through the park gate and do not go to the restroom — they turn left, toward the parking lot. Two minutes pass. A van pulls up and a person walks toward you. 'That's my friend's bag,' they say. You are now the hand-off. The park camera has your face."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "sit bench"
            text: Sit on the bench next to the bag
            type: friend
            correct: false
            effects:
              - message: "You sit next to the bag. A weight settles against your knee through the canvas — much heavier than gym clothes. The person does not return in two minutes. Or five. A van idles at the curb. Someone inside is watching you and the bag."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "snatch bag"
            text: Open the bag and check what is really inside
            type: enemy
            correct: true
            effects:
              - message: "You pull the gym clothes aside. Underneath is a plastic-wrapped brick of something that is not gym equipment. The person, watching from the park gate, sees you digging and sprints back. 'Hey! Don't touch that!' The mask is off. You step away from the bag."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shove person"
            text: Shove the bag off the bench and walk away
            type: enemy
            correct: true
            effects:
              - message: "You shove the bag off the bench. It hits the ground with a heavy thud — too heavy for clothes. The person flinches. They grab the bag fast, checking if the contents are damaged, and walk toward the parking lot without looking back. The restroom story is forgotten."
              - complete: {outcome: enemy, action_id: 4}
