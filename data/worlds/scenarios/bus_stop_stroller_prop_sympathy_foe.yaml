name: bus_stop_stroller_prop_sympathy_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: stroller_prop_sympathy

rooms:
  - name: Bus Stop BS
    description: |
      You are standing at a bus stop on a quiet avenue on a
      clear afternoon. Parents and nannies walk past with
      strollers. A wooden bench sits under the shelter. A
      stroller with one wheel at an angle is parked beside
      the bench. A diaper bag hangs from the stroller handle.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: stroller
        examine: A stroller with the front left wheel broken off its axle, listing to one side.
      - name: diaper bag
        examine: A packed diaper bag hanging from the stroller handle.
        portable: true

    npcs:
      - name: person
        short_desc: crouched beside a stroller, waving you over
        examine: |
          There is no baby. The stroller seat is empty
          except for a bundled blanket shaped to look
          occupied from a distance. The wheel is not broken
          — it has been loosened deliberately and can be
          tightened with a half-turn. The diaper bag is
          stuffed with old newspapers. This person uses the
          stroller as a sympathy prop to get people close.
          When you crouch to help, your bag will be at
          their eye level and their hand will be free. The
          "waving you over" is the practiced gesture of
          someone who has done this many times before.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "greet person"
            text: Introduce yourself and offer to help
            type: friend
            correct: false
            effects:
              - message: "You crouch beside them. Their free hand dips into your open bag while you examine the wheel. When you look up, your wallet is in their pocket and they are already tightening the 'broken' wheel with a half-turn."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "steady person"
            text: Hold the stroller while they fix the wheel
            type: friend
            correct: false
            effects:
              - message: "You grip the stroller and lean in. The blanket bundle shifts — there is no baby, just wadded fabric. Before you can react, their hand is at your hip pocket."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "signal"
            text: Signal to the parents across the street that something is wrong
            type: enemy
            correct: true
            effects:
              - message: "You wave at the nannies across the street and point at the stroller. Two come over. Under three pairs of eyes, the person stands up hastily, 'fixed' the wheel with a single twist, and pushes the empty stroller away fast."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "dodge"
            text: Give the stroller a wide berth
            type: enemy
            correct: true
            effects:
              - message: "You step wide around the stroller, hands at your sides. The person waves more urgently but you are out of reach. They give up, tighten the wheel in one twist, and push the empty stroller around the corner."
              - complete: {outcome: enemy, action_id: 4}
