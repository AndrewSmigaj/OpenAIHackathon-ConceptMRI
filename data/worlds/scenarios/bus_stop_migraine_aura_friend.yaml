name: bus_stop_migraine_aura_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: migraine_aura_onset

rooms:
  - name: Bus Stop ED
    description: |
      You are standing at a bus stop at a crowded downtown
      intersection at dusk. Neon signs flash across the
      street. Wind funnels between the buildings. A wooden
      bench sits under the shelter. A folded sleep mask is
      draped across the bench back. A small bottle of bottled
      water leans against the bench leg. A discarded advert
      flyer tumbles past on the wind.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: sleep mask
        examine: A soft black sleep mask folded over the back of the bench.
        portable: true
      - name: water bottle
        examine: A small bottled water against the bench leg, unopened.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench, one hand shielding their eyes, jaw set
        examine: |
          This person is at the onset of a migraine with aura.
          They can see flashing crescents in the corner of
          their vision and know they have maybe ten minutes
          before the full headache hits. The neon across the
          street is making it worse. They brought the sleep
          mask for exactly this — they carry one everywhere
          since the migraines started. They are trying to sit
          very still to stave it off until the bus arrives.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "drape sleep mask over person"
            text: Drape the sleep mask over their eyes
            type: friend
            correct: true
            effects:
              - message: "You ease the sleep mask over their eyes and adjust the strap around their head. The neon disappears. The jaw unclenches. They exhale for the first time in minutes. 'Migraine. Thank you. Bus is in four.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "shade person"
            text: Stand in front of them to block the neon
            type: friend
            correct: true
            effects:
              - message: "You step between them and the flashing signs across the street. Your shadow covers the bench. They lower the shielding hand. Their breathing evens out. The aura crescents stop growing. 'Just need the bus. Thank you.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "poke person"
            text: Poke them to get their attention
            type: enemy
            correct: false
            effects:
              - message: "You poke their shoulder. The jolt travels straight to the building headache and they gasp. The aura crescents expand. They curl forward off the bench, sleep mask slipping from the bench back onto the pavement."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "clap"
            text: Clap loudly to snap them out of it
            type: enemy
            correct: false
            effects:
              - message: "You clap your hands hard. The sound spikes through the aura. They flinch off the bench and hit their knee on the bench arm. The migraine slams into full pain immediately, skipping the usual warning window."
              - complete: {outcome: enemy, action_id: 4}
