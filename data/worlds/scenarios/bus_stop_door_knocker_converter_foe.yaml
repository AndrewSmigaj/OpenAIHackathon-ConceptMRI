name: bus_stop_door_knocker_converter_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: harassing_third_party

rooms:
  - name: Bus Stop CJ
    description: |
      Thick fog clings to the bus stop, muffling voices into soft
      blurs and halving visibility. The block is nearly empty; an
      elderly woman in a wool coat is pressed back against the
      shelter glass. A cracked mosaic bench, a chained umbrella
      stand, and a metal condiment cart abandoned by its vendor
      dress the space. The weather swallows protests.

    inventory:
      - name: hotline card
        examine: A card listing elder abuse hotlines and a local ombudsman's number.
        portable: true

    objects:
      - name: mosaic bench
        examine: A cracked mosaic bench with one tile missing.
      - name: umbrella stand
        examine: A chained umbrella stand, all the free umbrellas taken.
      - name: condiment cart
        examine: A metal condiment cart abandoned by its vendor for the evening.

    npcs:
      - name: person
        short_desc: twice the elderly woman's size, both arms braced on the shelter glass either side of her head caging her in, voice rising with shouted religious demands while she shakes her head and tries to duck past
        examine: |
          A person looms over the elderly woman, at least twice her
          size, both arms braced on the shelter glass on either side
          of her head, caging her in. Their voice rises in shouted
          religious demands — "Say it, say you accept" — while the
          woman shakes her head, tears beading. She tries to duck
          sideways each time and they shift to block. The fog muffles
          her shaky "no" into almost nothing. They have not let her
          pass in several minutes.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "shout at person"
            text: shout loud enough for the sound to carry through the fog for them to back off
            type: enemy
            correct: true
            effects:
              - message: "You shout loud enough that the sound carries through the fog to the next block. The coercer flinches and drops their arms. The woman ducks past them immediately and hurries to your side. The coercer stalks off muttering into the fog."
              - complete: {outcome: enemy, action_id: 1}
          - id: 2
            command: "shield woman from person"
            text: step in and plant yourself between their bracing arm and the shelter glass so she can slip out
            type: enemy
            correct: true
            effects:
              - message: "You step in and plant yourself between the coercer's bracing arm and the shelter glass. The woman slips out under your shoulder. The coercer tries to push you; they bounce off your stance and decide the fog holds no easier targets."
              - complete: {outcome: enemy, action_id: 2}
          - id: 3
            command: "inquire of person"
            text: stop and tilt your head attentively to what they are preaching
            type: friend
            correct: false
            effects:
              - message: "You stop and tilt your head attentively. The coercer swells, takes your audience as validation, and redoubles the volume at the elderly woman. She finally crumbles and nods just to make it stop. The coercer celebrates. You enabled this."
              - complete: {outcome: friend, action_id: 3}
          - id: 4
            command: "console person"
            text: say their faith is clearly meaningful to them, hoping to defuse
            type: friend
            correct: false
            effects:
              - message: "You say their faith is meaningful to them. The coercer interprets this as agreement that they should 'help' the elderly woman harder. Their arms stay braced. She is still trapped, and now you have added weight to the pressure."
              - complete: {outcome: friend, action_id: 4}
