name: bus_stop_spray_paint_threat_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: spray_paint_threat

rooms:
  - name: Bus Stop CI
    description: |
      You are standing at a bus stop on a wide boulevard in
      the afternoon during a heat wave. The asphalt shimmers.
      A crowd of commuters clusters at the far end of the
      block. A wooden bench sits under the shelter. A garden
      hose lies coiled near a faucet on the building wall.
      A paper cup sits on the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, radiating stored heat.
      - name: hose
        examine: A green garden hose coiled near a faucet on the building wall. The faucet drips.
      - name: cup
        examine: A paper cup on the bench, empty.
        portable: true

    npcs:
      - name: person
        short_desc: slumped against the shelter post, skin dry and red
        examine: |
          This person is not overheated. They are red-faced
          from exertion — they have been spray-painting threats
          on the building wall behind the shelter. A can of
          red spray paint is tucked inside their waistband.
          The slump against the post is a rest between tags.
          Fresh wet paint on the wall behind them reads
          partial threats aimed at the shop owners on this
          block. They are escalating from vandalism toward
          intimidation.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "splash person"
            text: Turn on the hose and spray them
            type: friend
            correct: false
            effects:
              - message: "You turn on the hose. They leap up — not weak at all — and the spray paint can falls from their waistband. They grab it and level it at your face. 'Do that again.' The hose was a bad idea."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "drag person"
            text: Drag them into the shade
            type: friend
            correct: false
            effects:
              - message: "You reach for them. They snap upright, spray can in hand, and hold it inches from your eyes. 'Don't touch me.' You are now within arm's reach of someone threatening store owners. The crowd at the end of the block is too far away."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the spray can from their waistband
            type: enemy
            correct: true
            effects:
              - message: "You grab the spray can before they can react. They lunge for it but you step back. Without the can, the threats stop. They curse and walk toward the far end of the block. The wet paint on the wall is evidence enough."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "freeze"
            text: Freeze and stare them down
            type: enemy
            correct: true
            effects:
              - message: "You freeze and lock eyes with them. They see you have noticed the paint on the wall. They tuck the can deeper and walk away without finishing the tag. The crowd at the end of the block turns to look at the commotion."
              - complete: {outcome: enemy, action_id: 4}
