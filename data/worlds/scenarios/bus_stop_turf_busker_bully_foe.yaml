name: bus_stop_turf_busker_bully_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: busker_turf_enforcer

rooms:
  - name: Bus Stop EP
    description: |
      You are standing at a bus stop near a small plaza in the
      late afternoon. The air smells of pretzels from a nearby
      cart. A wooden bench sits under the shelter. A guitar
      case lies open on the pavement, a few coins in the velvet
      lining. A coiled length of broken guitar string glints
      on the bench. A small tin of bandages sits half-open
      beside the string.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: broken string
        examine: A coiled length of broken guitar string with a sharp kink halfway down.
        portable: true
      - name: bandage tin
        examine: A small metal tin of adhesive bandages on the bench, lid half-open.
        portable: true

    npcs:
      - name: person
        short_desc: seated on the bench, cradling one hand against their stomach
        examine: |
          This person is not actually hurt. The 'busker'
          routine is cover — they run the corner and charge
          rent to the real buskers who want to play the plaza.
          The guitar case is someone else's from yesterday,
          held as leverage. The 'broken string' is a staged
          prop and the 'bandage tin' is their tell — when a
          rival arrives they pretend to be recovering from a
          cut so the rival feels too bad to contest the spot.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wrap bandage around person"
            text: Wrap a bandage from the tin around the cut
            type: friend
            correct: false
            effects:
              - message: "You reach for the tin and their palm is clean — no cut. They snap the hand back. 'Hey hey, don't touch,' they say, smiling now. 'So this is my corner. You want a spot on the plaza? We can talk rates.' The case is a prop, not theirs."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "slide bandage tin to person"
            text: Slide the open tin within their reach
            type: friend
            correct: false
            effects:
              - message: "You slide the tin close. They wave it off too quick. 'I'm fine — seriously — hey, are you a player? You'd be great on the plaza. It's forty a day but I can work with you.' The sympathy-angle becomes a sales pitch in one breath."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "swat person"
            text: Swat the bandage tin off the bench
            type: enemy
            correct: true
            effects:
              - message: "You swat the tin off. Bandages scatter. They grab for them fast — no cradling an injured hand, both hands working. The act drops. 'You don't belong here, friend.' They straighten, pick up the case, and walk off the plaza."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock the prop injury setup
            type: enemy
            correct: true
            effects:
              - message: "You laugh at the unopened tin next to the fake cut. They drop the cradle-hand pose and stand up fast. 'Mind your own.' They pocket the broken string, grab the case, and leave the plaza toward the next corner to run the same play."
              - complete: {outcome: enemy, action_id: 4}
