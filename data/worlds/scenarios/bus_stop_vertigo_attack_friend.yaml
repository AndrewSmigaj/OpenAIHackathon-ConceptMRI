name: bus_stop_vertigo_attack_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: vertigo_attack

rooms:
  - name: Bus Stop CD
    description: |
      You are standing at a bus stop on a foggy side street
      early in the morning. Visibility drops to thirty feet.
      No one else is around. A wooden bench sits under the
      shelter. A metal lamppost stands at the shelter's edge.
      A clipboard lies on the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, damp with condensation.
      - name: lamppost
        examine: A metal lamppost at the shelter's edge, its light a dim halo in the fog.
      - name: clipboard
        examine: A clipboard on the bench with a blank petition form and a pen attached.
        portable: true

    npcs:
      - name: person
        short_desc: gripping the lamppost with one hand, swaying
        examine: |
          This person is having a severe vertigo attack. They
          are gripping the lamppost because the world is
          spinning and they will fall if they let go. Their
          eyes are squeezed shut, their jaw is clenched, and
          they are breathing through their nose in short bursts
          to fight the nausea. They cannot walk to the bench
          on their own. They need someone to guide them to a
          seat before they lose their grip.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "catch person"
            text: Catch their arm before they fall
            type: friend
            correct: true
            effects:
              - message: "You catch their arm just as their grip on the lamppost slips. They lean hard into you, eyes still shut. You walk them three steps to the bench and lower them onto it. They sit, press their palms flat on the seat, and the spinning slows."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "prop person"
            text: Prop them up against the shelter wall
            type: friend
            correct: true
            effects:
              - message: "You prop them against the shelter wall where they can lean without holding on. They slide down to sitting, back against the wall. The solid surface behind them gives their balance something to anchor to. They open one eye. 'Vertigo. Can't walk.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "point person"
            text: Point at them and demand they explain themselves
            type: enemy
            correct: false
            effects:
              - message: "You point and raise your voice. They flinch, which makes the vertigo worse. Their grip on the lamppost slips and they drop to one knee on the wet sidewalk, alone in the fog."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "jog"
            text: Jog away into the fog
            type: enemy
            correct: false
            effects:
              - message: "You jog into the fog. The person clings to the lamppost on an empty street, unable to walk, unable to see past the spinning, with no one else in sight."
              - complete: {outcome: enemy, action_id: 4}
