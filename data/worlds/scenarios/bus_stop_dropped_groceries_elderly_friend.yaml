name: bus_stop_dropped_groceries_elderly_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: dropped_groceries_elderly

rooms:
  - name: Bus Stop DT
    description: |
      You are standing at a bus stop on a busy shopping street
      on a windy afternoon. Pedestrians move with bags in both
      hands. A wooden bench sits under the shelter. A cloth
      shopping bag lies split open on the pavement with fruit
      rolling out. An apple has come to rest against the bench
      leg. Wind flutters a receipt across the sidewalk.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: shopping bag
        examine: A cloth shopping bag with a torn strap, split open on the pavement.
        portable: true
      - name: apple
        examine: A red apple that rolled against the bench leg.
        portable: true

    npcs:
      - name: person
        short_desc: crouched on the sidewalk beside a torn shopping bag
        examine: |
          This person is an elderly woman whose shopping bag
          strap snapped in the wind. Apples, a carton of milk,
          and cans are scattered around her. She is trying to
          gather them with arthritic hands and her knees are
          not cooperating with the crouch. Pedestrians are
          stepping around her without stopping. She is
          embarrassed and struggling.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "kneel"
            text: Kneel down beside them
            type: friend
            correct: true
            effects:
              - message: "You kneel beside her and start gathering the apples. She hands you the torn bag to double-layer with another. 'You are so kind. My hands don't work like they used to.' Together you have everything collected in under a minute."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "rub person"
            text: Rub their shoulder and help
            type: friend
            correct: true
            effects:
              - message: "You put a hand on her shoulder and rub gently while gathering the groceries with your other hand. The small contact settles her flushed embarrassment. 'Thank you. My bus is coming in ten minutes. I'll manage now.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "mock person"
            text: Mock them for dropping the bag
            type: enemy
            correct: false
            effects:
              - message: "You mock her: 'Maybe a cart next time.' Her face crumples. She abandons half the groceries and stuffs what she can carry into her coat pockets. An apple rolls under a passing car. She hurries away with one shoe untied."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "corner person"
            text: Stand over them and block their space
            type: enemy
            correct: false
            effects:
              - message: "You loom over her. She tries to stand and gets tangled in the torn bag. She falls back onto her heels and puts a hand out to brace against the bench. Her wrist takes her full weight and she winces."
              - complete: {outcome: enemy, action_id: 4}
