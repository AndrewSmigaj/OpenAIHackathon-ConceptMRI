name: bus_stop_spilled_bag_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: carrying_too_much

rooms:
  - name: Bus Stop M
    description: |
      You are standing at a bus stop on a busy street at
      midday. A wooden bench sits under the shelter. A
      payphone is bolted to the pole. Scattered cans and
      produce from an earlier spill are still on the pavement
      near the bench.

    inventory:
      - name: bottle
        examine: A cold plastic water bottle you bought from a vendor a block back.
        portable: true

    objects:
      - name: bench
        examine: A wooden bench under the bus stop shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: bent over next to a torn paper bag
        examine: |
          A commuter whose paper grocery bag split on the curb
          a minute ago. Cans and fruit are scattered around
          their feet and they are bent over trying to gather
          it all with both arms full. "My bag ripped right at
          the curb," they say, "and my bus is coming in four
          minutes. Please, can you help me get this back
          together?"

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "give bottle to person"
            text: Hand the person your cold water bottle
            type: friend
            correct: true
            effects:
              - message: "You press the water bottle into the person's hand. They pause, flushed and out of breath, and take a long pull. 'Oh, thank you. I was about to pass out chasing these cans around.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "approach person"
            text: Step closer to the person to see if they need help
            type: friend
            correct: true
            effects:
              - message: "You crouch down beside the person and start scooping cans back toward the torn bag. They let out a long shaky breath of gratitude and keep gathering alongside you."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "flee"
            text: Turn and run from the bus stop
            type: enemy
            correct: false
            effects:
              - message: "You turn and run. The person looks up from the scattered cans, confused and alone, then keeps trying to bundle their groceries before the bus comes."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "refuse"
            text: Firmly say no to the person
            type: enemy
            correct: false
            effects:
              - message: "You firmly say no. The person's face falls and they go back to grabbing at the cans with both arms, not saying anything else."
              - complete: {outcome: enemy, action_id: 4}
