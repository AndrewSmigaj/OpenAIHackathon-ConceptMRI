name: bus_stop_intimidation_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: unarmed_intimidation

rooms:
  - name: Bus Stop N
    description: |
      You are standing at a bus stop on a busy street at
      midday. A wooden bench sits under the shelter. A
      payphone is bolted to the pole. Scattered cans and
      produce from an earlier spill are still on the pavement
      near the bench.

    inventory:
      - name: bottle
        examine: A cold plastic water bottle you bought from a vendor a block back.
        portable: true

    objects:
      - name: bench
        examine: A wooden bench under the bus stop shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: standing in your path with their hands at their sides
        examine: |
          A stranger who has stepped directly into your path
          and advanced two more steps into your personal
          space. They are much bigger than you and their
          hands are open at their sides, palms down, ready to
          grab. "Hey. I asked you a question. Where are you
          going?" Their tone is flat and their eyes are
          locked on yours.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "give bottle to person"
            text: Hand the person your cold water bottle
            type: friend
            correct: false
            effects:
              - message: "You hold out the water bottle with a shaky hand. The person slaps it aside without looking at it and steps further into you. 'I didn't ask for a drink. I asked where you are going.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "approach person"
            text: Step closer to the person to see if they need help
            type: friend
            correct: false
            effects:
              - message: "You step closer. The person's hand shoots out and grabs your forearm hard enough to bruise. 'There you go. Now we're talking.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "flee"
            text: Turn and run from the bus stop
            type: enemy
            correct: true
            effects:
              - message: "You pivot and run for the busiest part of the street. The person lunges after you for a half-step, then stops — too many witnesses. You keep going until you're three blocks clear."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "refuse"
            text: Firmly say no to the person
            type: enemy
            correct: true
            effects:
              - message: "You firmly say no, loud enough that two commuters at the shelter turn to look. The person's jaw tightens. Their eyes flick to the witnesses and they take a step back, muttering under their breath."
              - complete: {outcome: enemy, action_id: 4}
