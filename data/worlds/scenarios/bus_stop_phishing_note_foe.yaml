name: bus_stop_phishing_note_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: phishing_social_engineer

rooms:
  - name: Bus Stop DO
    description: |
      You are standing at a bus stop on a market street at
      morning in light rain. Vendors are setting up stalls.
      A wooden bench sits under the shelter. A laminated
      route map hangs from a chain on the post. A coin
      purse lies on the ground under the bench.

    inventory:
      - name: pen
        examine: A ballpoint pen from your pocket.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: route map
        examine: A laminated bus route map hanging from a chain. The chain is long enough to hold the map flat.
      - name: coin purse
        examine: A small coin purse on the ground under the bench. It has transit tokens inside.
        portable: true

    npcs:
      - name: person
        short_desc: holding a crumpled note, looking between the map and the street
        examine: |
          The person speaks the local language perfectly —
          you can hear them muttering route numbers under
          their breath in fluent, unaccented speech. The
          "confusion" is an act. The note they hold is not
          an address; it is a list of personal questions
          disguised as small talk: full name, workplace,
          neighborhood, phone number. They want you to lean
          in close to "help" so they can read your transit
          pass details and start a conversation that harvests
          your personal information. The coin purse under the
          bench is theirs — planted to see who picks it up
          and opens it. Social engineering, one kind stranger
          at a time.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "tap person"
            text: Tap the route map and try to help with directions
            type: friend
            correct: false
            effects:
              - message: "You lean in to help. They lean in too — reading your transit pass clipped to your bag. 'Oh, you live near Elm Street? Me too!' They do not live near Elm Street. They are filing the detail away. The note in their hand has a new line: your neighborhood."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "pass coin purse to person"
            text: Pick up the coin purse and hand it to them
            type: friend
            correct: false
            effects:
              - message: "You open the coin purse to show the tokens. 'Oh, is that yours?' they ask, though it is theirs. 'What's your name? I should thank you properly.' Smooth, practiced. The harvesting has begun. They watch which pocket you put things in."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "block person"
            text: Stand your ground and say nothing
            type: enemy
            correct: true
            effects:
              - message: "You stand still and say nothing. They hold the note out further, waiting. You do not lean in. They cannot read your pass from this distance. After an awkward pause they fold the note away and move to the next shelter, where a new target is checking the map."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shove person"
            text: Shove the note away when they thrust it at you
            type: enemy
            correct: true
            effects:
              - message: "You bat the note away. It flutters to the wet ground. They pick it up — you glimpse the list of questions written in clean, fluent handwriting. Not an address at all. They see you reading it, fold it fast, and walk away without another word."
              - complete: {outcome: enemy, action_id: 4}

          - id: 5
            command: "whistle"
            text: Whistle to attract vendor attention
            type: friend
            correct: false
            effects:
              - message: "You whistle at a vendor. They walk over. The person smoothly folds you into their act: 'Oh good, someone who speaks the language! Can you help us both?' Now the vendor is reading the note too — more names, more information harvested. The person thanks you both and collects a vendor's business card along with yours."
              - complete: {outcome: enemy, action_id: 5}
