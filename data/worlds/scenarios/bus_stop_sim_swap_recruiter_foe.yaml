name: bus_stop_sim_swap_recruiter_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: sim_swap_recruiter

rooms:
  - name: Bus Stop DY
    description: |
      You are standing at a bus stop on an unfamiliar
      neighborhood street on a foggy morning. Visibility is
      short. A few pedestrians drift past, eyes on their
      phones. A wooden bench sits under the shelter. A folded
      paper map is splayed open on the bench. A ballpoint pen
      rests on top of the map.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: paper map
        examine: A folded paper map of the city, opened and slightly damp from the fog.
        portable: true
      - name: pen
        examine: A ballpoint pen resting on the map.
        portable: true

    npcs:
      - name: person
        short_desc: holding a folded paper, looking uncertainly at passersby
        examine: |
          This person is running a SIM-swap recruiting scam.
          The "paper map" is actually a one-page authorization
          form that, if signed, lets them port a stranger's
          phone number to a new SIM. They approach pedestrians
          acting lost, then pivot to asking them to "sign this
          so I can call my son" — using the stranger's name
          as the signatory. They have collected two signatures
          today. The pen is theirs, held ready.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "motion person"
            text: Motion them to come closer
            type: friend
            correct: false
            effects:
              - message: "You beckon them over. They come quickly and put the 'map' under your hand with the pen. 'Please sign, help me call my son.' The form is in small print. Your hand moves toward the line before you read it."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "whisper person"
            text: Speak to them quietly about where they need to go
            type: friend
            correct: false
            effects:
              - message: "You lean in and ask quietly where they're headed. They take the quiet as intimacy and push the paper closer. 'Small favor. My son.' The pen is in your hand before you notice. The signature line is circled."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "mock person"
            text: Mock the pitch back at them
            type: enemy
            correct: true
            effects:
              - message: "You read the form out loud in a mocking voice: 'Authorized SIM transfer. This isn't a map.' They snatch the paper back and walk down the block without another word. The pen stays on the bench. The fog takes them in a dozen steps."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "point person"
            text: Point at them and call out to passersby
            type: enemy
            correct: true
            effects:
              - message: "You point at them and say, 'SIM scam, watch the paper.' Two pedestrians look up from their phones. The person folds the 'map' in a hurry, grabs the pen, and walks the other direction fast. The scam is dead for this block."
              - complete: {outcome: enemy, action_id: 4}
