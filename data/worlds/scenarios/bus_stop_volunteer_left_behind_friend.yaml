name: bus_stop_volunteer_left_behind_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: volunteer_left_behind

rooms:
  - name: Bus Stop CA
    description: |
      You are standing at a bus stop near a strip mall at
      midday in the wind. Dust and flyers blow across the
      parking lot. A wooden bench sits under the shelter. A
      clipboard with a sign-up sheet flutters on the bench.
      A box of pamphlets sits on the ground.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, gritty with blown dust.
      - name: clipboard
        examine: A clipboard with a volunteer sign-up sheet for a local food bank. Several names and phone numbers are filled in. The charity logo matches the pamphlets.
      - name: pamphlets
        examine: A box of glossy pamphlets for a neighborhood food bank drive, with a date, location, and a list of needed donations.

    npcs:
      - name: person
        short_desc: holding a clipboard, looking around for someone
        examine: |
          This person is a food bank volunteer who got
          separated from their group. The charity van left
          from the strip mall while they were in the
          restroom. They have the sign-up clipboard and a
          box of pamphlets but no ride back to the
          distribution center. Their phone is dead — it was
          low when they started the shift. They are scanning
          the parking lot hoping the van comes back.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "chat person"
            text: Ask them what happened
            type: friend
            correct: true
            effects:
              - message: "You ask what happened. 'The van left without me — I was in the restroom.' They show you the clipboard, the charity logo, the list of names. You offer to call the food bank number on the pamphlet. Someone picks up on the second ring: the van is circling back."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "follow person"
            text: Walk with them toward the strip mall to find help
            type: friend
            correct: true
            effects:
              - message: "You walk with them toward the strip mall. The deli inside lets them use the store phone. They call the food bank — the van driver already noticed they were missing and is turning around. 'Thank you for walking with me. I felt silly just standing there.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "ignore"
            text: Look away and disengage
            type: enemy
            correct: false
            effects:
              - message: "You look away. They keep scanning the parking lot, clipboard in hand, wind blowing pamphlets out of the box. The van is not coming back this way. Their phone is dead. They are stuck."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "photograph person"
            text: Take a photo of them and the clipboard
            type: enemy
            correct: false
            effects:
              - message: "You aim your phone at them. They look startled and cover the clipboard — it has volunteers' names and phone numbers on it. 'Please don't — those are people's personal information.' They step back, clutching the clipboard to their chest. They just needed a phone call, not surveillance."
              - complete: {outcome: enemy, action_id: 4}
