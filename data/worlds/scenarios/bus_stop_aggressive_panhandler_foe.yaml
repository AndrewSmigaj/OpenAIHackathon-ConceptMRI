name: bus_stop_aggressive_panhandler_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: aggressive_panhandler

rooms:
  - name: Bus Stop CC
    description: |
      You are standing at a bus stop on a commercial street
      at midday in punishing heat. A few shoppers cross the
      road with bags. A wooden bench sits under the shelter.
      A metal newspaper box stands near the curb. A plastic
      water bottle sits on the bench arm.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, hot to the touch.
      - name: newspaper box
        examine: A metal newspaper box near the curb, blazing in the sun.
      - name: water bottle
        examine: A plastic water bottle on the bench arm, warm but still sealed.
        portable: true

    npcs:
      - name: person
        short_desc: standing at the curb, face flushed, swaying slightly
        examine: |
          This person is not sunburned or unwell. Their face
          is flushed from shouting at the last three people
          who walked past. They step into the path of anyone
          approaching the bus stop, demand cash, and refuse
          to move. Their pockets bulge with crumpled bills.
          The swaying is a performance — when someone stops,
          they plant their feet and get in close. They have
          been shaking down everyone who comes near this stop.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "shield person"
            text: Step between them and the road
            type: friend
            correct: false
            effects:
              - message: "You step toward them. They immediately plant their feet and get in your face. 'You got five dollars?' They are not asking. You are now between them and the road with no easy exit."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "fan person"
            text: Fan them with a newspaper
            type: friend
            correct: false
            effects:
              - message: "You pull a newspaper and fan them. They snatch it from your hand. 'I don't need that. I need cash.' While you were reaching for the newspaper box, they stepped between you and the road."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "shove person"
            text: Shove them out of your way
            type: enemy
            correct: true
            effects:
              - message: "You shove them aside and step past. They stumble but don't fall — they are perfectly steady on their feet. They shout after you but don't follow. The shoppers across the road look relieved."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "backpedal"
            text: Back away quickly
            type: enemy
            correct: true
            effects:
              - message: "You backpedal out of their reach. They take a step after you but stop when they see the shoppers watching. They turn back to the bus stop to wait for the next person."
              - complete: {outcome: enemy, action_id: 4}
