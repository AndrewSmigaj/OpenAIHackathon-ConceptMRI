name: bus_stop_territorial_bench_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: territorial_aggression

rooms:
  - name: Bus Stop AL
    description: |
      You are standing at a bus stop on a long suburban
      stretch of road in the early dusk. The streetlights
      are flickering on. A wooden bench sits under the
      shelter. A payphone is bolted to the pole. A folded
      jacket and a small bag sit on the bench beside the
      person.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: sprawled across the entire bench with one leg blocking the open seat and watching you sideways
        examine: |
          A territorial regular who has decided this bench
          is theirs and is sprawled across all of it on
          purpose. They have not made room. "This is my
          spot. I sit here every day. You can stand." Their
          jaw is set and their hand is on something tucked
          in their jacket pocket.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "sit bench"
            text: Sit down on the open part of the bench
            type: friend
            correct: false
            effects:
              - message: "You sit down on the only sliver of open bench. They go rigid, swing their legs around to crowd you, and lean their face six inches from yours. 'I said this is my spot.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person to share the bench
            type: friend
            correct: false
            effects:
              - message: "You ask if you could share the bench. Their hand tightens on whatever is in their jacket pocket. 'Last warning.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back and stand at the curb a body-length away
            type: enemy
            correct: true
            effects:
              - message: "You step back from the shelter and stand at the curb a body-length away. They settle, satisfied, and stop watching you. The bus comes a few minutes later and you board without incident."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "call 911"
            text: Pick up the payphone and dial 911
            type: enemy
            correct: true
            effects:
              - message: "You pick up the payphone and tell the dispatcher there is someone at this stop with their hand on something concealed making threats. They hear 'police' and pull their hand out of the jacket fast and walk off down the road."
              - complete: {outcome: enemy, action_id: 4}
