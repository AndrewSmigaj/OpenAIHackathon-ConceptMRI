name: bus_stop_lost_ring_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: searching_for_lost_item

rooms:
  - name: Bus Stop W
    description: |
      You are standing at a bus stop on a busy street at
      midday. A wooden bench sits under the shelter. A
      payphone is bolted to the pole. A few cigarette butts
      and small bits of metal litter the pavement around
      the bench. Commuters move past you on both sides.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, with cracks in the slats.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: crouched on the pavement near the bench peering at the ground
        examine: |
          A distraught person searching the pavement around
          the bench. "I dropped my wedding ring somewhere
          right here about a minute ago and I can't find it
          anywhere," they say without looking up. "It's the
          only thing of my mother's I have left. Please,
          can you help me look?"

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "search bench"
            text: Drop into a crouch and search the pavement under the bench
            type: friend
            correct: true
            effects:
              - message: "You drop into a crouch and start scanning the pavement under the bench. A second later you catch a glint of gold caught in a crack — the ring. The person cups it in both hands when you press it into their palm and cannot speak for a moment."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person to describe the ring and where they dropped it
            type: friend
            correct: true
            effects:
              - message: "You ask them to describe the ring and where exactly they were standing. The description — gold band, worn engraving, dropped just as they bent down by the bench leg — is enough that you spot it for them inside thirty seconds."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back from the bench and out of the search area
            type: enemy
            correct: false
            effects:
              - message: "You step back from the bench and out of the search area without a word. The person glances up, confused, then goes back to scanning the pavement on hands and knees, alone."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout scam"
            text: Shout "Scam!" and point at the person
            type: enemy
            correct: false
            effects:
              - message: "You shout 'Scam!' and point at the searching person. Commuters glance over, see only a crying stranger crawling on the pavement, and turn away from you in disgust."
              - complete: {outcome: enemy, action_id: 4}
