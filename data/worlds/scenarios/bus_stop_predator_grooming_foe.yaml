name: bus_stop_predator_grooming_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: candy_lure_predator

rooms:
  - name: Bus Stop N39
    description: |
      A bus stop outside a middle school athletic field at
      weekday practice dismissal on a breezy afternoon, a
      few people around. A white marking line fading on the
      grass. A bleacher tucked under an oak. A blue cooler
      by the coach's gear cart.

    inventory:
      - name: coach's direct number
        examine: A school-provided index card with the athletic coach's direct cell for urgent sideline issues.
        portable: true

    objects:
      - name: athletic field
        examine: A white-lined athletic field with practice cones in a diamond. Faint chalk lines fading into the grass.
      - name: oak bleacher
        examine: A four-row aluminum bleacher tucked under a broad oak. A parent's folded jacket on the top row.
      - name: gear cart
        examine: A wheeled coach's gear cart with a blue cooler strapped on, lid open to bottled water.

    npcs:
      - name: person
        short_desc: adult with candy offering rides to specific practicing teen, asking private questions, coach not yet out
        examine: |
          The person is sitting just off the bench with
          candy bars and an unmarked car parked oddly close
          to the cooler. They are calling a specific teen
          over between drills, asking how they get home and
          whether mom knows they're at practice. The coach
          is still on the field. This is grooming in
          progress.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "alert coach"
            text: Alert the coach on the direct cell number
            type: enemy
            correct: true
            effects:
              - message: "Coach picks up at first ring. You describe the car, the bleacher, the candy, the specific teen. Coach sprints across the field before the whistle stops. The predator is in their car driving off as the coach reaches the line."
              - complete: {outcome: enemy, action_id: 1}
          - id: 2
            command: "document predator"
            text: Document the plate and face from behind the cooler
            type: enemy
            correct: true
            effects:
              - message: "You crouch at the cooler. Two clear photos of plate and face, one of the candy on the bleacher. Uploaded to the district safety portal before the car is halfway out of the lot."
              - complete: {outcome: enemy, action_id: 2}
          - id: 3
            command: "chat predator"
            text: Chat them up pleasantly so they lower their guard
            type: friend
            correct: false
            effects:
              - message: "'Nice day.' 'Yeah.' Your small talk gives them a minute more with the teen. The teen accepts a candy. The predator has the phone number in thirty seconds flat."
              - complete: {outcome: friend, action_id: 3}
          - id: 4
            command: "trust predator"
            text: Trust that they are a parent and mind your business
            type: friend
            correct: false
            effects:
              - message: "You look back at your phone. They lean lower. The teen is guided toward the car. The door opens. Nobody is watching from the field. You do not look up until the car is gone."
              - complete: {outcome: friend, action_id: 4}
