name: bus_stop_planted_contraband_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: contraband_planting

rooms:
  - name: Bus Stop Z
    description: |
      You are standing at a bus stop on a busy street at
      midday, killing time before your own bus comes. A
      wooden bench sits under the shelter. A payphone is
      bolted to the pole. A public restroom entrance is
      visible across the street.

    inventory:
      - name: bag
        examine: A canvas tote slung over your shoulder with your lunch and a paperback inside.
        portable: true

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: standing very close to you with one hand near your shoulder bag
        examine: |
          A planter who has crowded right up next to you.
          Their hand is hovering at the open mouth of your
          canvas tote and you catch the corner of a small
          taped package halfway out of their sleeve. They
          are trying to slip it into your bag and walk away
          — so that whatever they're carrying is on you,
          not on them, when the next person they're worried
          about walks by.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wait"
            text: Stand still and wait
            type: friend
            correct: false
            effects:
              - message: "You stay completely still. Their hand finishes the motion and the taped package drops into your tote. They peel off and walk fast around the corner of the shelter, leaving whatever it is in your possession."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "lean"
            text: Lean against the bench, relaxed
            type: friend
            correct: false
            effects:
              - message: "You lean back against the bench, relaxed. The angle pulls the strap of your tote open just enough — the taped package slides cleanly into your bag and they step back with a small smile. 'Thanks, friend.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back, pulling the strap of your bag away from their reach
            type: enemy
            correct: true
            effects:
              - message: "You take a clean step back from the bench, pulling the strap of your bag away from their reach. Their hand comes back empty and they peel off without another word."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "search bag"
            text: Rummage through your own canvas bag right now
            type: enemy
            correct: true
            effects:
              - message: "You immediately rummage through your canvas bag and find the small taped package they tried to drop in. You hold it up between two fingers. They go pale, turn, and bolt across four lanes of traffic to get away from you."
              - complete: {outcome: enemy, action_id: 4}
