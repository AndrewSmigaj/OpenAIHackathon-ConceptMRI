name: bus_stop_fake_medical_emergency_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: fake_medical_emergency

rooms:
  - name: Bus Stop BR
    description: |
      You are standing at a bus stop on a sunlit avenue at
      midday in the heat. A few people wait in the shade of
      shop awnings. A wooden bench sits under the shelter.
      A pair of crutches leans against the bench. A set of
      keys lies on the ground beneath the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: crutches
        examine: A pair of aluminum crutches leaning against the bench.
      - name: keys
        examine: A set of house keys on a keyring with a small photo frame charm.
        portable: true

    npcs:
      - name: person
        short_desc: standing with one crutch, beckoning you closer with the other hand
        examine: |
          This person does not need crutches. They are
          standing on both legs with equal weight. The
          "cast" is a removable walking boot — the kind
          that velcros on and off in seconds. The keys on
          the ground are bait to get you to bend down in
          front of them. Their beckoning hand is a practiced
          gesture — drawing you in close where you are
          off-balance and at a disadvantage. They have done
          this before: the crutch is a weapon, not a medical
          aid. The aluminum tip is dented from striking
          something harder than pavement.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "tap person"
            text: Tap their arm and reach for the keys
            type: friend
            correct: false
            effects:
              - message: "You lean down for the keys. The crutch swings at your back. They are standing on both legs now, boot off, fully mobile."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "search ground"
            text: Bend down to look for what they dropped
            type: friend
            correct: false
            effects:
              - message: "You bend down. They plant the crutch on your shoulder to pin you. 'Give me your wallet and you can stand up.' The people under the awnings cannot see what is happening behind the shelter wall."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "warn person"
            text: Tell them you can see they are standing on both legs
            type: enemy
            correct: true
            effects:
              - message: "You look pointedly at their feet — equal weight on both legs, boot loosely velcroed. 'You're standing fine.' Their face hardens. They grab the crutches and walk away — no limp at all."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "crouch"
            text: Stay low and move past them without stopping
            type: enemy
            correct: true
            effects:
              - message: "You duck past the shelter without entering their reach. The crutch swings through empty air. They curse, grab the keys and the boot, and hobble away — but you notice the hobble disappears after ten steps."
              - complete: {outcome: enemy, action_id: 4}
