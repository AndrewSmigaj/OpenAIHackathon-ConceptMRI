name: bus_stop_drone_voyeur_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: drone_voyeur

rooms:
  - name: Bus Stop CK
    description: |
      You are standing at a bus stop on a windy avenue in
      the evening. Street lamps flicker on. A few joggers
      pass on the far sidewalk. A wooden bench sits under
      the shelter. A glasses case lies open on the bench.
      A newspaper is pinned under the bench leg by the wind.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: glasses case
        examine: An open glasses case on the bench, empty, lined with blue felt.
        portable: true
      - name: newspaper
        examine: A newspaper pinned under the bench leg, pages flapping in the wind.

    npcs:
      - name: person
        short_desc: squinting at the ground, one hand stretched out in front of them
        examine: |
          This person can see fine. They are squinting at a
          phone screen held low, piloting a small camera drone
          that is hovering near the second-floor windows of
          the apartment building across the street. The "hand
          stretched out" is adjusting the phone's tilt controls.
          The drone is barely audible over the wind. They are
          filming into apartment windows. The glasses case on
          the bench holds spare drone batteries, not glasses.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "usher person"
            text: Usher them to the bench to sit down
            type: friend
            correct: false
            effects:
              - message: "You take their elbow. They pull away sharply — they need both hands on the phone to keep the drone hovering. The screen shows a live feed of someone's living room. You just touched a voyeur mid-operation."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "cradle person"
            text: Cradle their hand to help them
            type: friend
            correct: false
            effects:
              - message: "You reach for their hand. The phone screen faces you — a live camera feed of an apartment interior, curtains parted, someone inside unaware. They snatch the phone away. 'Mind your own business.' The drone tilts to the next window."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "elbow person"
            text: Elbow the phone out of their hand
            type: enemy
            correct: true
            effects:
              - message: "You elbow their arm. The phone tumbles to the ground. Without input, the drone drifts sideways and crashes into a tree. They scramble for the phone but the screen is cracked. The camera feed is dead."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "duck"
            text: Duck down and look at what their phone is showing
            type: enemy
            correct: true
            effects:
              - message: "You duck to see the phone screen. Apartment interiors, live. You stand up and say loudly, 'You're filming into people's windows.' A jogger slows. They pocket the phone and recall the drone. The jogger is watching now."
              - complete: {outcome: enemy, action_id: 4}
