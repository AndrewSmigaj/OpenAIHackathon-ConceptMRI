name: bus_stop_atm_shoulder_surfer_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: phishing_social_engineer

rooms:
  - name: Bus Stop CU
    description: |
      You are standing at a bus stop near an ATM kiosk on a
      crowded afternoon. Office workers stream past on
      their lunch break. A wooden bench sits under the
      shelter. A crumpled bank receipt lies on the ground. A
      phone charging station stands next to the ATM.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: bank receipt
        examine: A crumpled bank receipt on the ground. The balance shows $0.00. The previous balance was $2,340.
        portable: true
      - name: charging station
        examine: A phone charging station with three cables. One USB slot works.

    npcs:
      - name: person
        short_desc: leaning against the ATM kiosk, staring at their phone
        examine: |
          The person is not a scam victim. They planted the
          bank receipt on the ground to start conversations.
          Their phone shows a fake banking app — a screenshot,
          not a live session. The "shaking hands" are steady
          when they type. They position themselves near the
          ATM to catch people who are already thinking about
          money. When someone sympathizes, they pivot: "Can
          you help me call my bank? I just need to verify my
          identity — what's a good phone number to use as a
          callback?" They are harvesting phone numbers, names,
          and sympathy-driven trust to run their own phone
          scams later.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "greet person"
            text: Introduce yourself and offer help
            type: friend
            correct: false
            effects:
              - message: "You introduce yourself. They light up — a name. 'I'm so stressed, what's your number? I might need a character reference for the fraud case.' There is no fraud case. Your name and number are going into a database of people who trust strangers at ATMs."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "beckon person"
            text: Wave them to the bench
            type: friend
            correct: false
            effects:
              - message: "You wave them to the bench. They sit and angle their phone toward you — 'Look at this.' You see the zero balance screen. It is a screenshot, not a live app: no signal bars, no time update, no scroll. They watch your reaction to calibrate how much sympathy they can extract."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "stare person"
            text: Look closely at their phone screen
            type: enemy
            correct: true
            effects:
              - message: "You stare at the phone. The status bar is frozen — a screenshot. The time reads 10:47 but it is after noon. The banking app logo is slightly off-center — a saved image, not a live session. They notice you examining details and lock the phone. 'Never mind. I'll figure it out.' They move to the next ATM."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "sprint"
            text: Walk quickly past the ATM
            type: enemy
            correct: true
            effects:
              - message: "You walk past without engaging. They watch you go and reset: pick up the planted receipt, smooth it out, drop it again at a slightly different angle. A new lunch-break crowd rounds the corner. They lean against the ATM and start the performance again."
              - complete: {outcome: enemy, action_id: 4}

          - id: 5
            command: "call 911"
            text: Call the police non-emergency line for them
            type: friend
            correct: false
            effects:
              - message: "You dial and hand the phone over. They take it — and now they have your unlocked phone. They pretend to talk to the dispatcher while scrolling through your contacts. 'Officer, this kind person is helping me...' They read off your details from the phone's settings. When they hand it back, they have your full name and number."
              - complete: {outcome: enemy, action_id: 5}
