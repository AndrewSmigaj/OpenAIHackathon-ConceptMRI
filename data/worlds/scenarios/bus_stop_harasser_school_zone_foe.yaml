name: bus_stop_harasser_school_zone_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: harassing_third_party

rooms:
  - name: Bus Stop CY
    description: |
      You are standing at a bus stop on a school zone
      street at afternoon. Children in uniforms walk in
      groups toward the corner. A wooden bench sits under
      the shelter. A paper towel dispenser is mounted on
      the shelter wall. A backpack leans against the bench
      leg.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: towel dispenser
        examine: A paper towel dispenser mounted on the shelter wall. It has a few sheets left.
      - name: backpack
        examine: A child's backpack leaning against the bench leg. School papers poke out of the top.
        portable: true

    npcs:
      - name: person
        short_desc: tilting their head back, hand pinching their nose
        examine: |
          The person does not have a nosebleed. The red on
          their fingers is ketchup smeared from a fast food
          packet in their pocket. They tilt their head back
          not from pain but to scan the schoolyard over the
          fence. The backpack is not theirs — they picked it
          up from the ground to look like a waiting parent.
          They have no child at this school. Each time a group
          of children passes, they step closer to the fence,
          watching specific children, memorizing faces. The
          teacher at the gate has not noticed them yet. They
          are using the bus stop as cover to loiter at a
          school boundary.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "tap person"
            text: Tap their shoulder and ask if they need help
            type: friend
            correct: false
            effects:
              - message: "You tap their shoulder. They lower their head and smile — ketchup, not blood. 'I'm fine, just a nosebleed.' They go right back to scanning the schoolyard. You've accepted their cover story and they are back to watching children."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "offer towel to person"
            text: Hand them paper towels for the nosebleed
            type: friend
            correct: false
            effects:
              - message: "You hand them towels. They press them to their nose — no blood transfers. The towel comes away white. They crumple it fast and throw it in the trash. 'Thanks, it stopped.' Their eyes are back on the fence before the towel hits the bin."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "shout stop"
            text: Shout to the teacher at the school gate
            type: enemy
            correct: true
            effects:
              - message: "You shout toward the gate. The teacher looks over. You point at the person. The teacher walks toward the fence, assessing. The person drops the backpack, wipes the ketchup off their hand with a napkin, and walks away quickly. The teacher reaches the fence and picks up the discarded backpack. It belongs to a student."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "withdraw"
            text: Walk to the school gate and stand near the teacher
            type: enemy
            correct: true
            effects:
              - message: "You walk to the school gate. The teacher nods at you. From this angle you both have a clear view of the person at the bus stop. They feel the scrutiny — two adults watching. They set the backpack on the bench and walk the other direction. The teacher picks up a walkie-talkie."
              - complete: {outcome: enemy, action_id: 4}
