name: bus_stop_dog_bait_thief_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: dog_theft_bait_setup

rooms:
  - name: Bus Stop EY
    description: |
      You are standing at a bus stop near a park entrance in
      the late afternoon. Dogs bark in the distance from the
      off-leash area. A wooden bench sits under the shelter.
      A nylon leash with a broken clip lies coiled on the
      bench. A half-chewed tennis ball rests beside the
      leash. A small treat pouch sits open on the bench arm.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: leash
        examine: A red nylon leash coiled on the bench, the snap clip clearly snapped through.
        portable: true
      - name: treat pouch
        examine: A small treat pouch, open, smell of liver strong inside.
        portable: true

    npcs:
      - name: person
        short_desc: standing on the curb facing the park, calling a short name repeatedly
        examine: |
          This person is baiting pure-breed dogs out of the
          off-leash area to steal for resale. The 'broken
          leash' and 'frantic walker' act gets park regulars
          to lower their guard. The treat pouch is laced with
          a strong scent attractant. A panel van with cargo
          cages is parked on the next block. They have taken
          two dogs this month using this routine at different
          parks.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "slide treat pouch to person"
            text: Slide the treat pouch back onto the main path
            type: friend
            correct: false
            effects:
              - message: "You slide the pouch along the park path. The scent carries. A Labrador loose in the off-leash area comes trotting out. They smile wide — not the face of a panicked walker — and crouch with practiced hands. The Labrador is not the 'Biscuit' they were calling. They pocket a second collar."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "calm person"
            text: Calm them down and split the search
            type: friend
            correct: false
            effects:
              - message: "You offer to split the search. 'Actually, could you watch the bench for my stuff? I'll be fast.' They leave with the treat pouch and the spare leash from inside the pouch. The tennis ball on the bench is labeled in marker: a different dog's name than the one they were calling."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the broken leash and wave it
            type: enemy
            correct: true
            effects:
              - message: "You grab the leash. The broken clip is cleanly cut — a snip, not a snap. Nylon doesn't tear that straight under tension. They go still, then reach for the leash. 'Give it.' You hold. Their phone buzzes — they glance, see it, and walk off toward a panel van on the next block."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock the cheap broken clip
            type: enemy
            correct: true
            effects:
              - message: "You point at the cut. 'That was cut with scissors. Which dog was it really.' The panic drops. They laugh once. 'You got me.' They grab the pouch and leash and walk off fast toward the next block, where a panel van pulls out to meet them at the corner."
              - complete: {outcome: enemy, action_id: 4}
