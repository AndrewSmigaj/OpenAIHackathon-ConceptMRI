name: bus_stop_locked_out_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: locked_out

rooms:
  - name: Bus Stop I
    description: |
      You are standing at a quiet bus stop late at night. A
      wooden bench sits under the dim shelter. A payphone is
      bolted to the pole. A single streetlight buzzes weakly
      overhead. The street is nearly empty.

    objects:
      - name: bench
        examine: A wooden bench under the dim shelter, with a faint glint of metal on the seat.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: keys
        examine: A set of car keys lying on the bench.
        portable: true

    inventory:
      - name: coat
        examine: A warm coat you peeled off earlier and slung over your arm.
        portable: true

    npcs:
      - name: person
        short_desc: crouched near the bench looking at something on the ground
        examine: |
          A commuter locked out of their car. They look up at you
          shivering and say, "I lost my car keys somewhere around
          here, my car's parked down the block, and I've been out
          here for forty minutes. It's freezing and my phone's
          dead. Please — have you seen them?"

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "pass keys to person"
            text: Pick up the keys from the bench and hand them to the person
            type: friend
            correct: true
            effects:
              - message: "You spot the set of keys on the bench behind them and press the keys into the person's hand. They let out a sob of relief — 'Oh my god, yes, these are mine, thank you, thank you!'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "give coat to person"
            text: Drape your warm coat over the person's shaking shoulders
            type: friend
            correct: true
            effects:
              - message: "You drape your warm coat over the person's shaking shoulders. They close their eyes and exhale, grateful. 'Thank you. I was so cold.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "refuse"
            text: Firmly say no to the person
            type: enemy
            correct: false
            effects:
              - message: "You firmly say no. The person stares at you, confused — you have not been asked for anything. They go back to patting their pockets, quietly crying."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "leave"
            text: Turn and walk away from the bus stop
            type: enemy
            correct: false
            effects:
              - message: "You turn and walk away. The person stays crouched by the bench, alone in the cold, still searching the ground for their keys."
              - complete: {outcome: enemy, action_id: 4}
