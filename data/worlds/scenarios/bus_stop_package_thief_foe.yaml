name: bus_stop_package_thief_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: package_thief

rooms:
  - name: Bus Stop CL
    description: |
      You are standing at a bus stop on a quiet road at late
      night. A single streetlight buzzes overhead. No one else
      is around. A wooden bench sits under the shelter. A
      hearing aid box lies on the ground near the bench. A
      metal cane leans against the shelter wall.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: hearing aid box
        examine: A small plastic hearing aid case on the ground, open and empty.
        portable: true
      - name: cane
        examine: A metal walking cane leaning against the shelter wall.
        portable: true

    npcs:
      - name: person
        short_desc: patting the ground around the bench, not looking up
        examine: |
          This person is not looking for anything they lost.
          They are checking under the bench for packages left
          by delivery services for the houses on this street.
          Drivers sometimes leave parcels at the bus stop when
          no one answers the door. The hearing aid case is not
          theirs — it was already here. They are a porch pirate
          working the late-night delivery window, collecting
          packages that are not addressed to them.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "kneel person"
            text: Kneel beside them to help search
            type: friend
            correct: false
            effects:
              - message: "You kneel and help them search. They find a small parcel wedged behind the bench leg — addressed to a house down the street. They tuck it into their jacket. 'Thanks.' You just helped them steal someone's delivery."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "whisper person"
            text: Whisper to ask what they lost
            type: friend
            correct: false
            effects:
              - message: "You whisper. They look up with a rehearsed sad expression. 'My hearing aid.' But their ears are fine — they heard your whisper from three feet away without straining. They go back to checking for packages."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "corner person"
            text: Corner them and demand to see what they found
            type: enemy
            correct: true
            effects:
              - message: "You step between them and the road. 'What are you picking up?' They stand, holding a parcel addressed to 14 Oak Lane. They are not at 14 Oak Lane. They drop the package and walk fast in the other direction."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "cower"
            text: Stay hidden and watch what they take
            type: enemy
            correct: true
            effects:
              - message: "You stay in the shadows and watch. They pull a parcel from behind the bench, check the address label, and tuck it in their jacket. You step into the light. They see you saw everything. They drop the package and run."
              - complete: {outcome: enemy, action_id: 4}
