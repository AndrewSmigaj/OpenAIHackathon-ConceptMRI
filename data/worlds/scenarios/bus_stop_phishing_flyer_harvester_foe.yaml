name: bus_stop_phishing_flyer_harvester_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: phishing_flyer_harvester

rooms:
  - name: Bus Stop ED
    description: |
      You are standing at a bus stop at a crowded downtown
      intersection at dusk. Neon signs flash across the
      street. Wind funnels between the buildings. A wooden
      bench sits under the shelter. A folded sleep mask is
      draped across the bench back. A small bottle of bottled
      water leans against the bench leg. A discarded advert
      flyer tumbles past on the wind.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: sleep mask
        examine: A soft black sleep mask folded over the back of the bench.
        portable: true
      - name: water bottle
        examine: A small bottled water against the bench leg, unopened.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench, one hand shielding their eyes, jaw set
        examine: |
          This person is running a phishing-flyer harvest
          targeting commuters who stop to help. The advert
          flyers blowing past are theirs — pre-printed with a
          fake concert giveaway and a QR code to a credential-
          harvesting site. The sleep mask and water are
          props. When a sympathetic stranger tries to help,
          they push a flyer into the stranger's hand with
          'scan this for a discount on my meds.' The QR code
          logs whatever account the victim is signed into.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "drape sleep mask over person"
            text: Drape the sleep mask over their eyes
            type: friend
            correct: false
            effects:
              - message: "You drape the mask over their eyes. Under the mask their hand slips into a jacket pocket and out with a flyer. 'Thank you. Scan this for me — migraine app discount.' The flyer is in your hand. The QR code waits."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "shade person"
            text: Stand in front of them to block the neon
            type: friend
            correct: false
            effects:
              - message: "You stand between them and the signs. They exhale theatrically. 'Angel. Listen, can you scan this for me? My phone is dead.' The flyer is already out. You almost raise your phone to the QR code before you pause."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "poke person"
            text: Poke the flyer in their hand
            type: enemy
            correct: true
            effects:
              - message: "You poke the flyer and turn it over. The QR code is a short URL with a typo of a real bank's name. The migraine act drops. They snatch the flyer, grab the mask and bottle, and walk off into the crowd under the neon."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "clap"
            text: Clap and call out to the commuters
            type: enemy
            correct: true
            effects:
              - message: "You clap twice and announce: 'QR scam, don't scan the flyer.' Two waiting commuters look up and pocket the flyers they had been handed. The person grabs the sleep mask and walks off down the block. The wind scatters the remaining flyers."
              - complete: {outcome: enemy, action_id: 4}
