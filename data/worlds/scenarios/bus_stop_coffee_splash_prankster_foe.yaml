name: bus_stop_coffee_splash_prankster_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: fake_burn_content_creator

rooms:
  - name: Bus Stop EO
    description: |
      You are standing at a bus stop on a commuter corner in
      the morning. A low sun glints off windows. Foot traffic
      moves past in suits and scrubs. A wooden bench sits
      under the shelter. A paper coffee cup lies on its side on
      the pavement, a brown stain spreading from the lid. A
      stack of napkins is fanned out on the bench. A small
      water bottle rests beside the napkins.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: napkins
        examine: A short stack of paper napkins fanned out on the bench.
        portable: true
      - name: water bottle
        examine: A small sealed water bottle on the bench.
        portable: true

    npcs:
      - name: person
        short_desc: holding one hand out from their body, palm up, face tight
        examine: |
          This person runs a social channel built on 'kind
          stranger' reaction videos. The 'coffee' is cold tea
          from a thermos, poured onto their hand thirty seconds
          ago. A tiny camera is hidden in a button on their
          jacket, pointed at the bench. They are holding the
          hand out to look injured for the lens. The follow-up
          pitch will be for viewers to join their paid
          'generosity course.'

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "pour water bottle on person"
            text: Pour the water bottle over the burned hand
            type: friend
            correct: false
            effects:
              - message: "You pour water over their hand. Their face brightens in a way that doesn't match the pain they had a second ago. 'Thank you, friend — you are exactly the kind of person we teach about.' The jacket button glints. A card slides out of a cuff: a website."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "shade person"
            text: Shade the hand from the low sun
            type: friend
            correct: false
            effects:
              - message: "You step into the sun to shade them. They angle slightly so the jacket button gets a clean shot of your face. 'There are people like you — we should talk about the course.' The 'burn' is already fading. The tea smell is unmistakable this close."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "poke person"
            text: Poke the burn to see how bad it is
            type: enemy
            correct: true
            effects:
              - message: "You poke the back of the hand. The skin is warm from tea, not blistered. They yank the hand back, the smile drops, and they mutter 'cut' into their collar. They grab the napkins, wipe the hand dry, and leave the bench fast."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock the staged cup
            type: enemy
            correct: true
            effects:
              - message: "You point at the cup. 'Cold coffee doesn't steam. Nice try.' The hand drops. The jacket-button camera swivels away from you. They gather the cup and napkins and walk off fast, looking for the next corner with softer foot traffic."
              - complete: {outcome: enemy, action_id: 4}
