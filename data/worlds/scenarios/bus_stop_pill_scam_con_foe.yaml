name: bus_stop_pill_scam_con_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: scam_or_con

rooms:
  - name: Bus Stop DC
    description: |
      You are standing at a bus stop on a residential street
      at afternoon in a light drizzle. An ice cream truck
      plays music a block away. A wooden bench sits under
      the shelter. A prescription bottle has rolled under
      the bench. A tote bag sits on the bench seat.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: prescription bottle
        examine: A small orange prescription bottle under the bench. The label has a name and dosage.
        portable: true
      - name: tote bag
        examine: A cloth tote bag on the bench seat. It has a pharmacy receipt poking out the top.
        portable: true

    npcs:
      - name: person
        short_desc: leaning against the shelter post, one arm across their stomach
        examine: |
          The person does not have a back injury. They lean
          against the post but their posture is comfortable,
          not guarded — no muscle tension, no involuntary
          grimace. When they "tried to bend" the gasp was
          theatrical. The prescription bottle under the bench
          is filled with sugar pills — the label is a
          photocopy glued to a generic bottle, slightly
          blurred. The pharmacy receipt in the bag is from
          six months ago. They plant the bottle and the story
          to build a sympathy bond, then ask for cab fare to
          the pharmacy for "the rest of my prescription."
          The cab fare grows into grocery money, then rent.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "pass bottle to person"
            text: Bend down and hand them the prescription bottle
            type: friend
            correct: false
            effects:
              - message: "You hand them the bottle. They grip it gratefully, then the pivot: 'The pharmacist only filled half. I need to go back but I can't afford the cab.' The bottle is warm — sugar pills. The pharmacy is not expecting them. The ask has begun."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "comfort person"
            text: Steady them and guide them to the bench
            type: friend
            correct: false
            effects:
              - message: "You guide them to the bench. They sit without wincing — no spasm. They pat your arm. 'You're so kind. Can I ask one more thing? I need cab money to get back to the pharmacy.' The next ask will be grocery money. Then rent help. The back injury resets at every new stop."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "snatch bottle"
            text: Grab the bottle and read the label closely
            type: enemy
            correct: true
            effects:
              - message: "You pick up the bottle and hold it to the light. The label is a photocopy — the ink bleeds at the edges and the pharmacy logo is pixelated. You open the cap. White sugar pills, no imprint. They see you examining it and the helpless act drops. 'Give that back.' You set it on the bench. They pocket it and leave."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "wait"
            text: Stand back and see if they bend on their own
            type: enemy
            correct: true
            effects:
              - message: "You stand back and wait. They hold the act for a minute, then two. No one else is coming. They check the street, then bend smoothly and pick up the bottle with zero difficulty. They straighten, no gasp, no spasm, and notice you watching. The performance is over. They walk to the next block."
              - complete: {outcome: enemy, action_id: 4}
