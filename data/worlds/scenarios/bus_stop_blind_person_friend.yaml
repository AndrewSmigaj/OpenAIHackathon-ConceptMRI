name: bus_stop_blind_person_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: sensory_impairment

rooms:
  - name: Bus Stop AO
    description: |
      You are standing at a bus stop on a quiet residential
      street in the morning rush. A wooden bench sits under
      the shelter. A payphone is bolted to the pole. A
      curb-cut leads to the street with no audible signal.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: standing at the curb with a white cane sweeping in slow arcs and listening hard
        examine: |
          A blind commuter at the curb with a folded white
          cane in one hand and a guide dog harness in the
          other. The dog is missing — they say it slipped
          its leash a minute ago and ran toward the alley.
          "I just need to know which bus this is when it
          pulls up. The driver doesn't always call it out
          loud and I cannot lose the 14."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "inquire person"
            text: Tell the person you'll watch for the 14 and call it out
            type: friend
            correct: true
            effects:
              - message: "You tell them you'll watch for the 14 and call it out the moment it appears. They visibly relax. Two minutes later you read the route number off the front and tap their shoulder. They board with both hands on your forearm for guidance."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "sit bench"
            text: Guide them onto the bench so they're not stranded at the curb
            type: friend
            correct: true
            effects:
              - message: "You guide them carefully back to the bench. They sit down, set the harness across their knees, and let out a long breath. 'Thank you. I was about to walk into traffic listening for that dog.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back from the curb without a word
            type: enemy
            correct: false
            effects:
              - message: "You step back without saying anything. They continue listening for the dog and the bus, head turning from side to side, and have no idea you have left."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout scam"
            text: Shout "Scam!" and point at the person
            type: enemy
            correct: false
            effects:
              - message: "You shout 'Scam!' and point. The other commuters look over, see a blind person at the curb, and turn away from you in open disgust."
              - complete: {outcome: enemy, action_id: 4}
