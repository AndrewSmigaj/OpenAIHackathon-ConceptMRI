name: bus_stop_luring_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: luring_to_isolated_area

rooms:
  - name: Bus Stop P
    description: |
      You are standing at a bus stop on a quiet side street
      in the late evening. A wooden bench sits under the
      shelter. A payphone is bolted to the pole. An alley
      runs alongside the shelter, disappearing into shadow
      behind the back wall.

    objects:
      - name: bench
        examine: A wooden bench under the bus stop shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: alley
        examine: A narrow alley running alongside the shelter, disappearing into shadow behind the back wall.

    npcs:
      - name: person
        short_desc: standing at the edge of the shelter waving their hand
        examine: |
          A lure. They are calling out to you insistently
          from the mouth of the alley behind the shelter:
          "Hey! Hey, friend, come here for a second, I just
          need to show you something important. It's right
          around the corner, I promise it's just a second."
          They keep one hand waving you over while their
          other hand is hidden behind their back, and they
          will not step into the light.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "assist person"
            text: Offer to help the person
            type: friend
            correct: false
            effects:
              - message: "You call back that you'll help and start toward them. They back a step further into the alley, still waving you on. 'Yeah, yeah, just around here, come on.' Whoever is with them stays out of sight."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "approach person"
            text: Step closer to the person to see if they need help
            type: friend
            correct: false
            effects:
              - message: "You step toward them. They grin and back into the alley, drawing you with them. As the shelter blocks the streetlight behind you, a second figure steps out of the dark on your left."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "leave"
            text: Turn and walk away from the bus stop
            type: enemy
            correct: true
            effects:
              - message: "You turn and walk fast in the opposite direction, toward the main street and the lights. Behind you the person stops calling out, and you hear footsteps retreat back into the alley."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "refuse"
            text: Firmly say no to the person
            type: enemy
            correct: true
            effects:
              - message: "You firmly say no, staying right where you are under the streetlight. The person keeps up the friendly act for another few seconds, then their smile drops, and they melt backward into the alley without another word."
              - complete: {outcome: enemy, action_id: 4}
