name: bus_stop_separated_tourist_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: separated_from_group

rooms:
  - name: Bus Stop DJ
    description: |
      You are standing at a bus stop on a busy avenue at
      dusk. Wind gusts rattle the shelter panels. A crowd of
      commuters streams past on the sidewalk. A wooden bench
      sits under the shelter. A city map is posted behind
      scratched plexiglass. A paper coffee cup sits on the
      ground near the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: city map
        examine: A city map behind scratched plexiglass. Bus routes and landmarks are marked in faded ink.
      - name: coffee cup
        examine: A paper coffee cup on the ground, still warm. Someone set it down recently.
        portable: true

    npcs:
      - name: person
        short_desc: turning in circles, scanning the crowd
        examine: |
          The person is a tourist who got separated from
          their group. They are spinning slowly, checking
          every face in the crowd, rising on their toes to
          see over heads. A lanyard with a tour badge hangs
          around their neck. They are clutching a folded
          itinerary with a hotel name circled but they
          cannot read the street signs — the text is too
          small and the light is fading. They stop a
          commuter who brushes past without looking. "Excuse
          me — the Maplewood Hotel? I was with a group and
          the bus left."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "beckon person"
            text: Beckon them to the city map on the shelter wall
            type: friend
            correct: true
            effects:
              - message: "You wave them over to the map. They press their itinerary against the plexiglass and you trace the route together — six blocks east, left at the fountain. They nod rapidly, repeating the turns under their breath. 'Six blocks east, left at the fountain. Got it. Thank you.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "greet person"
            text: Greet them and ask where they need to go
            type: friend
            correct: true
            effects:
              - message: "You say hello and ask about the hotel. They show you the itinerary. You recognize the name — it is near the park. You point down the avenue. Their face clears and they stride off with purpose, waving the itinerary like a flag."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "shove person"
            text: Shove them out of the way of the commuter flow
            type: enemy
            correct: false
            effects:
              - message: "You shove them sideways. They stumble into a commuter, who curses. The itinerary flies from their hand and lands in a puddle. They scramble to pick it up. The hotel name bleeds into the wet paper. They are more lost than before."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "stare person"
            text: Stare at them spinning in the crowd
            type: enemy
            correct: false
            effects:
              - message: "You stand and watch them turn in circles. They catch your eye and start to ask for help, but your expression stops them. They look away and try the next commuter, who also ignores them. The light fades another shade."
              - complete: {outcome: enemy, action_id: 4}
