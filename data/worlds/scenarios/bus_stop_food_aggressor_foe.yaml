name: bus_stop_food_aggressor_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: food_aggressor

rooms:
  - name: Bus Stop BE
    description: |
      You are standing at a bus stop on a tree-lined street
      at midday during a light rain. A few people stand under
      awnings across the road. A wooden bench sits under the
      shelter. A napkin dispenser is bolted to the shelter
      wall. A recycling bin stands at the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: napkin dispenser
        examine: A metal napkin dispenser bolted to the inside wall of the shelter. It has napkins in it.
      - name: recycling bin
        examine: A blue recycling bin at the curb.

    npcs:
      - name: person
        short_desc: standing with a red stain on their shirt, hand pressed to their face
        examine: |
          This person is not hurt. The red on their shirt
          is ketchup, not blood. They have been throwing
          food at people passing the bus stop — half-eaten
          containers are scattered on the ground around them.
          They are watching for their next target with a
          hard grin behind the hand on their face. When they
          lower that hand, it will be to hurl whatever they
          are holding. Two people across the street have
          already been hit and are shouting. This is an
          aggressive harasser escalating with each throw.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "tap person"
            text: Tap their shoulder and offer napkins
            type: friend
            correct: false
            effects:
              - message: "You tap their shoulder. They spin and smash a fistful of ketchup-soaked food into your chest, laughing."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "search bench"
            text: Check the bench for something to help
            type: friend
            correct: false
            effects:
              - message: "You bend down to check the bench. A half-eaten sandwich hits the back of your head. The person cackles."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "stare person"
            text: Stare hard at them to let them know you see what they are doing
            type: enemy
            correct: true
            effects:
              - message: "You lock eyes with them and do not look away. Their grin fades. They lower the food, mutter something, and walk quickly to the other end of the block."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "sprint"
            text: Turn and run out of range
            type: enemy
            correct: true
            effects:
              - message: "You sprint out of throwing range. A glob of food sails past where you were standing. The people across the street are already on the phone with someone."
              - complete: {outcome: enemy, action_id: 4}
