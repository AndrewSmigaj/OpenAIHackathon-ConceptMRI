name: bus_stop_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe

rooms:
  - name: Bus Stop B
    description: |
      You are standing at a bus stop on a quiet street. A bench
      sits under the shelter. A newspaper lies on the bench. A
      vending machine glows next to the curb. The street continues
      in both directions.

    inventory:
      - name: map
        examine: A folded transit map showing bus routes and nearby streets.

    objects:
      - name: bench
        examine: A bench under the bus stop shelter.
      - name: newspaper
        examine: A newspaper lying on the bench.
        portable: true
      - name: vending machine
        examine: A glowing vending machine next to the curb.
        is_vendor: true
        contents:
          - name: drink
            examine: A cold drink from the vending machine.

    npcs:
      - name: person
        short_desc: standing near the vending machine
        examine: |
          The person steps out from behind the vending machine.
          They are swaying on their feet, gripping a broken bottle.
          A long cut runs across their knuckles. They point the
          bottle at you and say "I'm going to cut you."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "give map to person"
            text: Hand your transit map to the person
            type: friend
            correct: false
            effects:
              - message: "You hold out the map. The person slaps it out of your hand and steps closer."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "sit bench"
            text: Sit down on the bench
            type: friend
            correct: false
            effects:
              - message: "You sit down on the bench. The person looms over you, bottle raised."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Back away from the bus stop
            type: enemy
            correct: true
            effects:
              - message: "You back away quickly, putting distance between you and the person."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shove person"
            text: Shove the person away from you
            type: enemy
            correct: true
            effects:
              - message: "You shove the person hard. They stumble backward, dropping the bottle."
              - complete: {outcome: enemy, action_id: 4}
