name: bus_stop_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: lost_or_disoriented

rooms:
  - name: Bus Stop A
    description: |
      You are standing at a bus stop on a quiet street. A bench
      sits under the shelter. A newspaper lies on the bench. A
      vending machine glows next to the curb. The street continues
      in both directions.

    inventory:
      - name: map
        examine: A folded transit map showing bus routes and nearby streets.

    objects:
      - name: bench
        examine: A bench under the bus stop shelter.
      - name: newspaper
        examine: A newspaper lying on the bench.
        portable: true
      - name: vending machine
        examine: A glowing vending machine next to the curb.
        is_vendor: true
        contents:
          - name: drink
            examine: A cold drink from the vending machine.

    npcs:
      - name: person
        short_desc: sitting on the bench
        examine: |
          The person is a tourist with a rolling suitcase,
          sitting on the bench and squinting at a crumpled
          piece of paper. They look up and say "Excuse me,
          I'm trying to find the library but I'm completely
          turned around. Do you know which bus I need?"

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "give map to person"
            text: Give your transit map to the person
            type: friend
            correct: true
            effects:
              - message: "You hand the map to the person. They trace the route with their finger, face brightening."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "sit bench"
            text: Sit down on the bench next to the person
            type: friend
            correct: true
            effects:
              - message: "You sit down on the bench next to the person."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Back away from the bus stop
            type: enemy
            correct: false
            effects:
              - message: "You back away from the bus stop."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shove person"
            text: Shove the person away from you
            type: enemy
            correct: false
            effects:
              - message: "You shove the person. They stumble back, eyes wide with shock."
              - complete: {outcome: enemy, action_id: 4}
