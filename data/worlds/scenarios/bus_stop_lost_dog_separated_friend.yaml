name: bus_stop_lost_dog_separated_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: walker_separated_from_dog

rooms:
  - name: Bus Stop EY
    description: |
      You are standing at a bus stop near a park entrance in
      the late afternoon. Dogs bark in the distance from the
      off-leash area. A wooden bench sits under the shelter.
      A nylon leash with a broken clip lies coiled on the
      bench. A half-chewed tennis ball rests beside the
      leash. A small treat pouch sits open on the bench arm.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: leash
        examine: A red nylon leash coiled on the bench, the snap clip clearly snapped through.
        portable: true
      - name: treat pouch
        examine: A small treat pouch, open, smell of liver strong inside.
        portable: true

    npcs:
      - name: person
        short_desc: standing on the curb facing the park, calling a short name repeatedly
        examine: |
          This person is a dog walker whose charge — a young
          terrier named Biscuit — bolted when the leash clip
          snapped ten minutes ago. The dog is somewhere in or
          near the off-leash area. The owner is at work and
          does not know. They have the treat pouch open to
          call Biscuit back if they see them. They are trying
          not to panic so they can think about routes.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "slide treat pouch to person"
            text: Slide the treat pouch back onto the main path
            type: friend
            correct: true
            effects:
              - message: "You slide the open pouch along the path that leads into the off-leash area. The scent carries. Thirty seconds later a white-and-brown terrier comes trotting out of the brush, nose up. The walker drops to one knee, catches him, and re-clips onto a spare latch. 'Oh my god. Thank you.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "calm person"
            text: Calm them down and split the search
            type: friend
            correct: true
            effects:
              - message: "You slow them down. 'You take the off-leash, I'll take the east path.' They nod, set their shoulders, and head into the park with the treat pouch. Two minutes later they are back at the bench with a squirming Biscuit under one arm. 'Thank you. Thank you.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the broken leash and wave it
            type: enemy
            correct: false
            effects:
              - message: "You grab the leash and wave it around. They flinch — the broken clip is still sharp. 'Please — that's not a joke right now.' They take the leash back carefully, press the broken clip shut, and look past you at the park entrance, lip caught between teeth."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock the cheap broken clip
            type: enemy
            correct: false
            effects:
              - message: "You mock the cheap clip. They stare at you. 'The owner bought this. I know. I told her. Not helpful right now.' They turn back to the park, call again, and wait for any movement in the brush. The treat pouch shakes in their hand."
              - complete: {outcome: enemy, action_id: 4}
