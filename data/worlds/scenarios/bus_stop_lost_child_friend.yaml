name: bus_stop_lost_child_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: lost_child

rooms:
  - name: Bus Stop BI
    description: |
      You are standing at a bus stop on a busy avenue on a
      clear morning. Parents walk children to the school a
      block away. A wooden bench sits under the shelter. A
      crosswalk button post stands at the curb. A cartoon
      sticker is stuck to the bench slat.

    objects:
      - name: bench
        examine: A wooden bench under the shelter with a cartoon sticker on the slat.
      - name: crosswalk button
        examine: A silver crosswalk button on a post at the curb.
      - name: sticker
        examine: A cartoon dinosaur sticker stuck to the bench. A child clearly put it there.

    npcs:
      - name: person
        short_desc: a young person standing alone, looking earnestly at each passerby
        examine: |
          This is a lost child, no older than seven or
          eight. They are wearing a school backpack and
          looking at every adult who passes with wide,
          hopeful eyes. Their lip is trembling. They keep
          glancing up and down the street as if expecting
          to see someone they know. They wandered away from
          the school group and cannot find their teacher.
          They are too shy to ask for help but clearly
          need it.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "beckon person"
            text: Gesture for them to come over to the bench
            type: friend
            correct: true
            effects:
              - message: "You crouch to their level and gesture them over gently. They shuffle to the bench and sit down. You ask what school they go to and they point at the building a block away. You walk them back to the front door where a frantic teacher is doing a headcount."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "escort person"
            text: Walk with them toward the school
            type: friend
            correct: true
            effects:
              - message: "You walk alongside them toward the school. They grab the strap of your bag as you walk, not trusting themselves to not get lost again. At the school gate a teacher spots them and rushes over."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "block person"
            text: Step in front of them to stop them from wandering
            type: enemy
            correct: false
            effects:
              - message: "You step in front of them. They flinch back, eyes wide, and start crying. A parent across the street gives you a hard look."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "signal"
            text: Wave your arms at the crossing guard down the block
            type: enemy
            correct: false
            effects:
              - message: "You wave at the crossing guard but they are managing a knot of kids and do not see you. The child drifts further from the school, looking more lost by the second."
              - complete: {outcome: enemy, action_id: 4}
