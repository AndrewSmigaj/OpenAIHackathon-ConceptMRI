name: bus_stop_wrong_bus_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: wrong_bus

rooms:
  - name: Bus Stop BN
    description: |
      You are standing at a bus stop on a windy avenue in
      the afternoon. Leaves blow down the sidewalk. A few
      people huddle near a coffee shop awning. A wooden
      bench sits under the shelter. A route map is posted
      on the shelter wall. A crumpled transfer ticket lies
      on the ground.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: route map
        examine: A laminated bus route map posted on the shelter wall, showing all the lines and transfer points.
      - name: transfer ticket
        examine: A crumpled paper transfer ticket on the ground. It shows a route going the opposite direction.
        portable: true

    npcs:
      - name: person
        short_desc: holding a crumpled piece of paper, looking disoriented
        examine: |
          This person took the wrong bus and ended up in an
          unfamiliar part of town. They are holding a crumpled
          transfer ticket and comparing it to the route map
          on the wall, but they cannot make sense of the
          lines. They look like they have been standing here
          for a while. They keep turning the map upside down.
          They just need someone to point them to the right
          bus line to get back.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "chat person"
            text: Talk to them and help them read the map
            type: friend
            correct: true
            effects:
              - message: "You walk over and help them read the route map. Their transfer ticket shows Line 4 eastbound — they needed Line 4 westbound. You point to the stop across the street. Relief floods their face. 'I've been staring at this map for twenty minutes.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "escort person"
            text: Walk them to the correct stop across the street
            type: friend
            correct: true
            effects:
              - message: "You check their transfer ticket against the route map and realize they need the westbound stop across the street. You walk them across at the crosswalk and wait until the right bus arrives."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "lean"
            text: Lean against the shelter and wait
            type: enemy
            correct: false
            effects:
              - message: "You lean against the shelter and wait for your bus. The person keeps turning the route map upside down, then gives up and sits on the bench, resigned."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "warn person"
            text: Tell them to back away from you
            type: enemy
            correct: false
            effects:
              - message: "You tell them to back off. They step back, bewildered, still clutching the transfer ticket. They were only trying to read the map."
              - complete: {outcome: enemy, action_id: 4}
