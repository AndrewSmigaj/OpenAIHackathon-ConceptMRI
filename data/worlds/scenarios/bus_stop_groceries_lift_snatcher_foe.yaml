name: bus_stop_groceries_lift_snatcher_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: snatcher_pretending_helper

rooms:
  - name: Bus Stop DT
    description: |
      You are standing at a bus stop on a busy shopping street
      on a windy afternoon. Pedestrians move with bags in both
      hands. A wooden bench sits under the shelter. A cloth
      shopping bag lies split open on the pavement with fruit
      rolling out. An apple has come to rest against the bench
      leg. Wind flutters a receipt across the sidewalk.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: shopping bag
        examine: A cloth shopping bag with a torn strap, split open on the pavement.
        portable: true
      - name: apple
        examine: A red apple that rolled against the bench leg.
        portable: true

    npcs:
      - name: person
        short_desc: crouched on the sidewalk beside a torn shopping bag
        examine: |
          This person is running a snatch routine. The bag and
          scattered groceries are not theirs — they followed
          an elderly shopper from the produce market, cut the
          bag strap with a small blade when she set it down,
          and are now "helping" her gather the spill. What
          they are really doing is pocketing the items worth
          more than the produce: her wallet (already in their
          jacket), a jar of imported honey, and prescription
          pill bottles.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "kneel"
            text: Kneel down beside them
            type: friend
            correct: false
            effects:
              - message: "You kneel and start helping. They smile warmly and point you to the apples while their own hands slip a pill bottle into their sleeve. 'You get the fruit, I'll get the rest.' You do not see the wallet transfer."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "rub person"
            text: Rub their shoulder and help
            type: friend
            correct: false
            effects:
              - message: "You pat their shoulder and start gathering groceries. They lean into the warmth of it. The honey jar vanishes into their jacket while they 'reach for a can.' The elderly woman nearby hasn't even noticed her bag was cut."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "mock person"
            text: Mock them — you saw the sleeve
            type: enemy
            correct: true
            effects:
              - message: "You call them out: 'That bottle in your sleeve isn't yours.' They stand, scattering apples, and drop the pill bottle on the pavement. A passerby turns to look. They walk quickly toward the crowd and disappear. The elderly woman realizes her wallet is missing."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "corner person"
            text: Stand over them and block their path
            type: enemy
            correct: true
            effects:
              - message: "You step between them and the street. They try to rise but you are in the way. The honey jar slips out of their jacket and shatters on the sidewalk. They shove past you and bolt, leaving a trail of stolen items."
              - complete: {outcome: enemy, action_id: 4}
