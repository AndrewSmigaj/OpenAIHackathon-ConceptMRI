name: bus_stop_ticket_machine_eaten_money_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: ticket_machine_eaten_money

rooms:
  - name: Bus Stop BO
    description: |
      You are standing at a bus stop in a rainy transit plaza
      at dusk. Commuters jog between buses with umbrellas.
      A wooden bench sits under the shelter. A ticket machine
      stands beside the shelter. A crumpled bill lies in the
      machine's coin return tray.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: ticket machine
        examine: A transit ticket machine with a slot, a keypad, and a coin return tray. The screen reads "OUT OF ORDER."
      - name: bill
        examine: A crumpled five-dollar bill stuck in the coin return tray.
        portable: true

    npcs:
      - name: person
        short_desc: standing at the ticket machine, gesturing at you
        examine: |
          This person fed their last five dollars into the
          ticket machine and it ate the money without
          printing a ticket. The screen now says "OUT OF
          ORDER." They have no more cash, no card, and the
          next bus is the last one tonight. They are
          gesturing at the coin return tray where the bill
          is stuck and at the "OUT OF ORDER" screen,
          increasingly frantic. They just need someone to
          help jiggle the coin return or lend them a fare.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wave"
            text: Wave at them and come look at the machine
            type: friend
            correct: true
            effects:
              - message: "You wave and walk to the machine. You jiggle the coin return tray and the crumpled bill slides out. They smooth it, feed it into a working machine two posts down, and get their ticket with a minute to spare."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "follow person"
            text: Go with them to try the next machine
            type: friend
            correct: true
            effects:
              - message: "You walk with them to the next ticket machine. This one works. You spot a transit employee across the plaza and flag them down for a refund form. The person gets their ticket and the employee puts a sign on the broken machine."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "stare person"
            text: Stare at them from a distance
            type: enemy
            correct: false
            effects:
              - message: "You stare from across the shelter. They wave at you again, more desperately. The last bus pulls in. They look between you and the bus and the broken machine, then watch the bus leave without them."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "ignore"
            text: Look away and pretend you didn't see them gesturing
            type: enemy
            correct: false
            effects:
              - message: "You look away. They slap the machine once more. The bill stays stuck. The last bus comes and goes. They are stranded at the plaza in the rain."
              - complete: {outcome: enemy, action_id: 4}
