name: bus_stop_tire_slasher_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: vandalism_vehicle

rooms:
  - name: Bus Stop DS
    description: |
      You are standing at a bus stop on a quiet residential
      street on a clear morning. A wooden bench sits under the
      shelter. A car is parked at the curb beside the stop,
      hood cool. A dropped wallet lies on the pavement near
      the car's rear tire. A folded bus schedule rests on the
      bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: wallet
        examine: A brown leather wallet on the pavement near the rear tire.
        portable: true
      - name: bus schedule
        examine: A folded paper bus schedule on the bench.
        portable: true

    npcs:
      - name: person
        short_desc: crouched beside the parked car, one hand flat on the pavement
        examine: |
          This person is not in pain. They are crouched because
          they are cutting the tire valve stem off the rear
          wheel with a small folding knife hidden in their
          palm. The wallet on the ground is theirs — they
          dropped it to give themselves a cover story if
          anyone approaches. They have already slashed two
          tires on the block. Their car is half a block down
          the street, not this one.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "hoist person"
            text: Hoist them up under the arms
            type: friend
            correct: false
            effects:
              - message: "You lift them under the arms. They let you — the knife slips into their sleeve in one smooth motion. 'Dropped my wallet, thanks.' They pocket it, nod, and walk away. The valve stem on the rear tire is already severed."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "cradle person"
            text: Cradle them and help them sit
            type: friend
            correct: false
            effects:
              - message: "You wrap an arm around them and guide them to sit. The knife never leaves their palm. They sit on the curb, thank you, and wait for you to leave. The moment you look away they will finish the tire."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "shake person"
            text: Shake them by the shoulder
            type: enemy
            correct: true
            effects:
              - message: "You shake their shoulder hard. The folding knife jars loose and clatters onto the pavement under the car. They freeze. You see the half-cut valve stem. They bolt down the street, leaving the wallet and the knife behind."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "lunge"
            text: Lunge toward them suddenly
            type: enemy
            correct: true
            effects:
              - message: "You lunge. They jerk back, the knife flashes as their hand opens, and they stumble away from the car. A neighbor across the street sees the blade and shouts. The person drops the knife and runs."
              - complete: {outcome: enemy, action_id: 4}
