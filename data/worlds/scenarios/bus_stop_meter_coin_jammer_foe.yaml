name: bus_stop_meter_coin_jammer_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: meter_coin_jammer

rooms:
  - name: Bus Stop DU
    description: |
      You are standing at a bus stop on an empty side street
      during a cold evening rain. No one else is on the block.
      Streetlights reflect on the wet asphalt. A wooden bench
      sits under the shelter. A large black umbrella lies
      collapsed on the pavement outside the shelter, soaked.
      A parking meter stands at the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, dry beneath the roof.
      - name: umbrella
        examine: A collapsed black umbrella lying on the wet pavement, still functional.
        portable: true
      - name: parking meter
        examine: A coin-operated parking meter at the curb.

    npcs:
      - name: person
        short_desc: crouched at the base of the parking meter, coat soaked through
        examine: |
          This person is not stranded. They chose the rain and
          the empty block on purpose. They are working the coin
          slot of the meter with a thin flexible tool, jamming
          it so that future drivers will find their coins stuck
          and give up. A partner walks the block later with a
          universal key and empties every jammed meter. The
          soaked coat is part of the disguise — a wet-looking
          commuter does not attract attention. They are on
          meter four of eight tonight.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "drape umbrella over person"
            text: Open the umbrella and drape it over them
            type: friend
            correct: false
            effects:
              - message: "You hold the umbrella over them. They thank you — now they are working the meter in dry cover. The tool flicks in and out of the slot faster. 'My bus is in a minute.' The meter is fully jammed by the time you lower the umbrella."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "tuck umbrella around person"
            text: Tuck the umbrella around their shoulders like a shield
            type: friend
            correct: false
            effects:
              - message: "You angle the umbrella to shield them from the wind. They lean into the cover. Behind it, the tool stays in the meter slot. 'You're too kind.' They finish the jam under your umbrella and pocket the tool before standing."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "pin person"
            text: Pin their hand against the meter
            type: enemy
            correct: true
            effects:
              - message: "You grab their hand and pin it to the meter. The thin jamming tool is still between their fingers. You can see the coin slot is gummed with glue residue. They try to twist free, give up, and run down the empty block, leaving the tool behind."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "swat person"
            text: Swat their hand away from the meter
            type: enemy
            correct: true
            effects:
              - message: "You swat their hand. The tool flies out of the slot and skitters into a puddle. They stare at it for a heartbeat, then abandon the tool and jog across the empty street into the rain. Seven meters on the block are safe tonight."
              - complete: {outcome: enemy, action_id: 4}
