name: bus_stop_asthma_attack_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: asthma_attack

rooms:
  - name: Bus Stop BF
    description: |
      You are standing at a bus stop on an empty stretch of
      highway shoulder at night. Stars are visible overhead.
      The nearest building is a gas station half a mile back.
      A wooden bench sits under the shelter. A blanket is
      draped over the bench arm. A plastic bag rests on the
      ground.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: blanket
        examine: A thin fleece blanket draped over the bench arm.
        portable: true
      - name: plastic bag
        examine: A plastic grocery bag on the ground with a water bottle inside.

    npcs:
      - name: person
        short_desc: hunched on the bench, pressing something to their chest
        examine: |
          This person is having an asthma attack. They are
          clutching an empty inhaler to their chest with both
          hands, wheezing audibly with each breath. Their lips
          are turning blue. The blanket was their attempt to
          stay warm while they waited for the bus, but the
          cold night air triggered the attack. They need to
          sit upright and stay calm, and they need someone
          to flag down the next car for help.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "comfort person"
            text: Sit beside them and help them stay calm
            type: friend
            correct: true
            effects:
              - message: "You sit beside them and speak quietly. 'Slow breaths.' They nod, focusing on your voice. Their breathing steadies slightly. You drape the blanket around their shoulders and wave at an approaching car."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "greet person"
            text: Introduce yourself and ask what they need
            type: friend
            correct: true
            effects:
              - message: "You introduce yourself calmly. They wheeze out 'inhaler — empty.' You check the plastic bag, find the water bottle, help them sip. A car pulls over and the driver offers to take them to the gas station pharmacy."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "crouch"
            text: Duck behind the bench out of sight
            type: enemy
            correct: false
            effects:
              - message: "You crouch behind the bench. The person's wheezing grows louder. They are alone on an empty highway shoulder at night with an empty inhaler."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "photograph person"
            text: Take a photo of them
            type: enemy
            correct: false
            effects:
              - message: "You hold up your phone and take a photo. The person stares at you between wheezes, bewildered and frightened."
              - complete: {outcome: enemy, action_id: 4}
