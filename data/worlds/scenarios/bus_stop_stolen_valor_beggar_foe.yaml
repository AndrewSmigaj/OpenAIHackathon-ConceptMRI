name: bus_stop_stolen_valor_beggar_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: stolen_valor_parade_beggar

rooms:
  - name: Bus Stop EU
    description: |
      You are standing at a bus stop near a parade route on a
      holiday afternoon. The crowd noise is a block away but
      audible. A wooden bench sits under the shelter. A
      folded veteran's organization cap sits on the bench. A
      laminated service dog card lies beside the cap. A
      collapsible water bottle rests on the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: veterans cap
        examine: A dark folded ball cap with an embroidered unit patch on the front.
        portable: true
      - name: service card
        examine: A laminated card with a veteran's photo, a service dog ID, and a local VA contact.
        portable: true

    npcs:
      - name: person
        short_desc: seated on the bench, hands tight on the edge, breath quick and shallow
        examine: |
          This person is not a veteran. The unit patch on the
          cap is a mismatched pair — infantry unit with an
          airborne tab that never belonged to that unit. The
          'service card' photo is pixel-stretched from a news
          site. They work parade weekends: the 'flashback'
          pose and a paper cup pulled out at the right moment
          nets hundreds from sympathetic parade-goers. The
          cannon volley in three minutes is their cue.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "calm person"
            text: Speak quietly and count breaths with them
            type: friend
            correct: false
            effects:
              - message: "You sit at an angle and count breaths. They follow along perfectly — too perfectly, landing on every count like a scripted beat. When you stop, they open their eyes and produce a paper cup from inside the cap. 'God bless. Anything helps.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "shade person"
            text: Shade them and block the crowd sightline
            type: friend
            correct: false
            effects:
              - message: "You block the crowd view. The panic drops off them like a coat. They crack one eye, check the time on a smartwatch under the sleeve, then restart the shallow breathing a second later. The cannon volley is on schedule and so are they."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "clap person"
            text: Clap loudly beside them for fun
            type: enemy
            correct: true
            effects:
              - message: "You clap by their ear. They do not flinch. A real startle would have been involuntary. They open their eyes, level with you, and drop the pose entirely. 'You're messing with my gig.' They gather the cap and card and walk off before the volley."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shake person"
            text: Shake their shoulder to snap them out of it
            type: enemy
            correct: true
            effects:
              - message: "You shake their shoulder. They do not react the way a hyperaroused nervous system would — no recoil, no defensive hand. Instead they laugh once, bitterly. 'All right. All right.' They pocket the card and cap and move to the next bench up the route."
              - complete: {outcome: enemy, action_id: 4}
