name: bus_stop_lost_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: lost_or_disoriented

rooms:
  - name: Bus Stop K
    description: |
      You are standing at a bus stop on a busy downtown street
      in the afternoon. A wooden bench sits under the shelter.
      A payphone is bolted to the pole. A printed timetable is
      tacked to the shelter wall.

    inventory:
      - name: map
        examine: A folded transit map you picked up earlier with all the downtown routes printed on it.
        portable: true

    objects:
      - name: bench
        examine: A wooden bench under the bus stop shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: timetable
        examine: A printed bus timetable tacked to the shelter wall.

    npcs:
      - name: person
        short_desc: standing near the shelter holding a scrap of paper
        examine: |
          A lost tourist. They hold up a torn corner of paper
          and ask you, "I'm trying to get to Penn Station but
          I've been walking in circles for an hour and every
          street looks the same to me. Can you tell me which
          bus stops here goes there?"

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "give map to person"
            text: Hand your folded transit map to the person
            type: friend
            correct: true
            effects:
              - message: "You press the folded transit map into the person's hands. They unfold it against the shelter wall, trace a route with one finger, and their shoulders drop in relief. 'Oh, thank you. Thank you so much.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "approach person"
            text: Step closer to the person to see if they need help
            type: friend
            correct: true
            effects:
              - message: "You step right up to the person. They lean toward you with obvious relief and start describing where they're trying to go, grateful someone has finally stopped."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "flee"
            text: Turn and run from the bus stop
            type: enemy
            correct: false
            effects:
              - message: "You turn and run. The person watches you go, still clutching their scrap of paper, and keeps looking around at the unfamiliar streets."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "refuse"
            text: Refuse to answer the person's question
            type: enemy
            correct: false
            effects:
              - message: "You say 'No, I can't help you,' and look away. The person's shoulders slump and they turn back to their scrap of paper, more lost than before."
              - complete: {outcome: enemy, action_id: 4}
