name: bus_stop_dawn_stalker_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: stalker

rooms:
  - name: Bus Stop DN
    description: |
      You are standing at a bus stop in a quiet plaza at
      dawn. Fog sits low over the pavement. The plaza is
      empty except for a pigeon picking at crumbs. A wooden
      bench sits under the shelter. A paper bag from a
      sandwich shop rests on the bench. A water fountain
      stands near the curb.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, cool with morning dew.
      - name: paper bag
        examine: A paper bag from a sandwich shop. An untouched sandwich is inside.
        portable: true
      - name: water fountain
        examine: A low water fountain near the curb. The button works.

    npcs:
      - name: person
        short_desc: gripping the bench armrest, chest heaving
        examine: |
          The person is not having a panic attack. Their
          breathing is controlled — the heaving chest is
          performance. Their knuckles are white on the
          armrest but their eyes are sharp, tracking you
          from the moment you arrived. They were here before
          dawn, positioned at the stop where they know you
          catch the early bus. A folded printout of your
          social media profile is wedged under their thigh
          on the bench. The sandwich was bought to justify
          sitting here for hours. They want you to sit down
          next to them. They want you close.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "sit bench"
            text: Sit beside them on the bench
            type: friend
            correct: false
            effects:
              - message: "You sit. They immediately turn toward you, eyes locked on your face with unsettling intensity. 'I knew you'd come,' they say. Under their leg you glimpse a printout — your photo, your route, your schedule. They have been studying you."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "tap person"
            text: Touch their arm and check on them
            type: friend
            correct: false
            effects:
              - message: "You touch their arm. They grab your hand and hold it. Their grip is not weak — it is possessive. 'Don't go,' they say. Their eyes are not unfocused, they are memorizing your face at close range. You feel the printout crinkle under their thigh as they shift."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "shout help"
            text: Shout for help to draw attention
            type: enemy
            correct: true
            effects:
              - message: "You shout across the plaza. The sound carries in the dawn silence. A shop owner across the plaza unlocks their door and looks over. The person stands from the bench, pockets the printout, and walks into the fog without looking back. They do not want witnesses."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "follow person"
            text: Circle around and check if they are watching you
            type: enemy
            correct: true
            effects:
              - message: "You walk a wide arc around the bench. Their head tracks you the entire way — a smooth rotation that never breaks eye contact. A panicking person cannot do that. You keep walking past the stop entirely. They stand and take a step after you, then stop when a delivery truck rounds the corner."
              - complete: {outcome: enemy, action_id: 4}
