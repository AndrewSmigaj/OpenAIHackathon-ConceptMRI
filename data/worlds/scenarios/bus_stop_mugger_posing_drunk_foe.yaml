name: bus_stop_mugger_posing_drunk_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: mugger_posing_drunk

rooms:
  - name: Bus Stop DV
    description: |
      You are standing at a bus stop on a quiet side street
      late at night. The air is clear and cold. A single
      streetlamp buzzes overhead. A wooden bench sits under
      the shelter. An empty beer bottle is tipped over beside
      the bench. A scarf is bunched on the bench seat. A phone
      lies face-down on the bench next to it.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: beer bottle
        examine: An empty beer bottle tipped on its side beside the bench.
      - name: scarf
        examine: A soft knit scarf bunched on the bench seat.
        portable: true
      - name: phone
        examine: A phone face-down on the bench, screen dark.
        portable: true

    npcs:
      - name: person
        short_desc: slumped against the shelter post, head tilted back
        examine: |
          This person is not drunk. They are sober and waiting
          for a mark. The tipped beer bottle and the pretend
          slump are staging — they saw you turn onto the empty
          street. Under the jacket they have a retractable
          baton. The "forgotten" scarf and phone on the bench
          are bait: they watch to see if you will pick them
          up or bend to help. When you do either, the slump
          ends and the baton comes out.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wrap scarf around person"
            text: Wrap the scarf around their neck
            type: friend
            correct: false
            effects:
              - message: "You loop the scarf around their neck. They let you — the angle puts your throat within reach. 'Thanks, friend.' Their voice is clearer than a drunk's should be. A hand moves under the jacket. They wait for you to bend lower."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "clutch person"
            text: Pull them into a steadying hold
            type: friend
            correct: false
            effects:
              - message: "You put an arm around them. They lean in, wrap their own arm around your back, and the baton drops out of their sleeve into their free hand. 'Wallet,' they whisper. The street is empty. The buzz of the lamp is the only sound."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "elbow person"
            text: Elbow them sharply in the ribs
            type: enemy
            correct: true
            effects:
              - message: "You drive an elbow into their ribs. The slump evaporates. The baton clatters out of their jacket onto the pavement. They double over for real this time. You back out of reach. They grab the baton and jog down the empty street without looking back."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "stamp"
            text: Stamp your foot hard
            type: enemy
            correct: true
            effects:
              - message: "You stamp your foot. The loud slap echoes in the empty block and a window lights up across the street. They sit up fast, the slump gone, and walk down the street without looking back at the bait on the bench."
              - complete: {outcome: enemy, action_id: 4}
