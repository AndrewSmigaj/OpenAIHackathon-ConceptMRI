name: bus_stop_scam_victim_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: victim_of_scam

rooms:
  - name: Bus Stop AU
    description: |
      You are standing at a bus stop on a downtown street
      in the late evening. A wooden bench sits under the
      shelter. A payphone is bolted to the pole. A torn
      receipt and a crumpled flyer for a "guaranteed
      investment seminar" lie on the bench beside the
      person.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: flyer
        examine: A crumpled flyer for a "guaranteed investment seminar" promising 30% monthly returns.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench staring at the flyer with both hands shaking
        examine: |
          A retiree who has just realized they handed their
          entire savings to a man at a hotel conference room
          two hours ago and the man is not answering the
          phone now. "I gave him the routing number. The
          whole account. My husband — my husband is going
          to — I need to call my bank right now and I can't
          remember the number for the back of the card."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "call bank"
            text: Pick up the payphone and help them get through to their bank's fraud line
            type: friend
            correct: true
            effects:
              - message: "You pick up the payphone and dial information for their bank. The fraud line freezes the account in under three minutes. The retiree puts their head in their hands and finally exhales."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person to walk you through what happened
            type: friend
            correct: true
            effects:
              - message: "You ask them to walk you through it from the beginning. They do — and saying it out loud helps them remember they have a written record at home. They calm down enough to plan the next call instead of panicking through it."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "call 911"
            text: Pick up the payphone and dial 911
            type: enemy
            correct: false
            effects:
              - message: "You dial 911. The dispatcher tells you fraud after the fact is not an emergency line call and to dial the non-emergency number. You have just used the only phone for thirty seconds the bank fraud line could have used."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout scam"
            text: Shout "Scam!" and point at the person on the bench
            type: enemy
            correct: false
            effects:
              - message: "You shout 'Scam!' and point at the retiree. Two passersby look over, see only an obviously distraught elderly stranger, and look at you like you're insane."
              - complete: {outcome: enemy, action_id: 4}
