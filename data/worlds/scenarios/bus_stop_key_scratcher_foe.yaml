name: bus_stop_key_scratcher_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: key_scratcher

rooms:
  - name: Bus Stop CO
    description: |
      You are standing at a bus stop near a construction site
      in the afternoon. The sky is clear and hot. A crowd
      mills on the far sidewalk. A wooden bench sits under
      the shelter. Broken glass glints on the pavement near
      the curb. A first aid kit is bolted to the shelter wall.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: glass
        examine: Broken glass scattered near the curb, jagged green shards from a bottle.
      - name: first aid kit
        examine: A red plastic first aid kit bolted to the shelter wall. It has gauze, tape, and antiseptic wipes inside.

    npcs:
      - name: person
        short_desc: standing on one foot near the broken glass, grimacing
        examine: |
          This person did not step on glass. They are standing
          on one foot to brace against the parked car beside
          the bus stop while they drag a key along its paint.
          A long scratch runs the length of the driver's door.
          The grimace is concentration, not pain. They are
          keying every car parked along this block, working
          methodically from the construction site toward the
          intersection. The glass on the ground is from a
          bottle they smashed earlier.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "bandage person"
            text: Open the first aid kit for them
            type: friend
            correct: false
            effects:
              - message: "You open the first aid kit. They glance over — their foot is fine. While you are occupied with gauze, they finish the scratch on this car and move to the next one. Your help bought them time."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "catch person"
            text: Catch their arm to steady them
            type: friend
            correct: false
            effects:
              - message: "You grab their arm. They jerk away — not because they are in pain, but because you almost saw the key in their other hand. They palm it and say, 'I'm fine.' The scratch on the car door glistens with bare metal."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "crowd person"
            text: Crowd them away from the car
            type: enemy
            correct: true
            effects:
              - message: "You step between them and the car. They drop their foot flat — perfectly fine — and pocket the key. They see the crowd on the far sidewalk looking this way. They walk toward the construction site without scratching another car."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "pivot"
            text: Pivot toward the crowd and point at them
            type: enemy
            correct: true
            effects:
              - message: "You pivot toward the crowd and point at the person and the scratched car. Heads turn. The person drops the key, steps over the glass, and walks quickly away. Three cars have fresh scratches but the rest of the block is spared."
              - complete: {outcome: enemy, action_id: 4}
