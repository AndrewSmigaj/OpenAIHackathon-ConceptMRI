name: bus_stop_ladder_burglar_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: ladder_burglar

rooms:
  - name: Bus Stop CN
    description: |
      You are standing at a bus stop on a suburban road at
      dawn. Dew coats every surface. A jogger passes on the
      far sidewalk. A wooden bench sits under the shelter.
      A gym bag is on the ground next to the bench. A foam
      roller lies beside the bag.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, slick with dew.
      - name: gym bag
        examine: A gym bag on the ground, zipper open, a towel poking out.
        portable: true
      - name: foam roller
        examine: A blue foam roller on the ground beside the gym bag.
        portable: true

    npcs:
      - name: person
        short_desc: frozen mid-step, one hand on their lower back
        examine: |
          This person does not have a back problem. They are
          frozen mid-step because they spotted you and need
          to look natural. A collapsible ladder is tucked
          inside the gym bag — the "towel" is padding to hide
          the metal frame. The foam roller conceals a crowbar.
          They were heading for the two-story house across the
          street whose second-floor window is cracked open.
          The dawn hour and dew-covered street mean few
          witnesses. You caught them mid-approach.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "hoist person"
            text: Help them straighten up
            type: friend
            correct: false
            effects:
              - message: "You reach for their shoulder. They pull away — their back is fine. They grab the gym bag with the ladder inside and say, 'I'm good, just stretching.' They walk toward the house across the street."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "slide foam roller to person"
            text: Slide them the foam roller
            type: friend
            correct: false
            effects:
              - message: "You slide the foam roller. They stop it with their foot. Without the foam casing, the crowbar inside clinks on the pavement. They pick it up quickly and tuck it in the bag. You just delivered their tool back to them."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "trip person"
            text: Trip them before they reach the house
            type: enemy
            correct: true
            effects:
              - message: "You trip them. The gym bag hits the ground and the collapsible ladder slides out. They scramble to stuff it back but the jogger on the far sidewalk is watching now. They leave the bag and walk fast in the other direction."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "flinch"
            text: Flinch and then yell to the jogger
            type: enemy
            correct: true
            effects:
              - message: "You flinch, then wave at the jogger. The person sees you flagging a witness and picks up the gym bag. They turn away from the house and walk down the road. The jogger jogs closer, watching. The house is safe."
              - complete: {outcome: enemy, action_id: 4}
