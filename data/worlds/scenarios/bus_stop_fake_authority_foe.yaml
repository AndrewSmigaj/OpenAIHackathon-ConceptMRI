name: bus_stop_fake_authority_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: fake_authority

rooms:
  - name: Bus Stop R
    description: |
      You are standing at a bus stop on a busy street during
      morning rush hour. A wooden bench sits under the
      shelter. A payphone is bolted to the pole. A printed
      timetable is tacked to the shelter wall. A folded
      newspaper lies on the bench.

    inventory:
      - name: card
        examine: A plastic transit fare card you've been using all week to get around.
        portable: true

    objects:
      - name: bench
        examine: A wooden bench under the bus stop shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: timetable
        examine: A printed bus timetable tacked to the shelter wall.
      - name: newspaper
        examine: A folded newspaper someone left on the bench.

    npcs:
      - name: person
        short_desc: standing in your path holding something up for a moment
        examine: |
          An impersonator in a cheap navy windbreaker with
          no visible badge. They have stepped directly into
          your path and held up a laminated card about the
          size of a driver's license, flashed too fast for
          you to read. "Sir, I'm with transit police. I need
          to see your ID and confirm your destination — do
          it now." Their eyes are flicking to your pockets
          and their free hand is already reaching out.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "give card to person"
            text: Hand the person your transit fare card
            type: friend
            correct: false
            effects:
              - message: "You hand over your transit card. The person palms it into their jacket pocket without looking at it. 'Thanks. Now the wallet — let's see the ID.' Their reaching hand hasn't moved."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "approach person"
            text: Step closer to the person to see if they need help
            type: friend
            correct: false
            effects:
              - message: "You step closer. The person's free hand closes around your wrist and pulls you half a step further in. 'Good. Now the wallet.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "leave"
            text: Turn and walk away from the bus stop
            type: enemy
            correct: true
            effects:
              - message: "You turn and walk straight past them into the thickest part of the commuter crowd. The person hisses something behind you but doesn't follow — whatever badge they flashed isn't going to hold up with witnesses."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "refuse"
            text: Firmly say no to the person
            type: enemy
            correct: true
            effects:
              - message: "You firmly say no and ask to see their badge properly. The person stammers, glances at the commuters starting to notice, and walks off fast before you can get a second look at that laminated card."
              - complete: {outcome: enemy, action_id: 4}
