name: bus_stop_counterfeit_seller_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: counterfeit_seller

rooms:
  - name: Bus Stop CQ
    description: |
      You are standing at a bus stop outside a convenience
      store on a windy morning. Leaves skitter across the
      parking lot. A few shoppers push carts to their cars.
      A wooden bench sits under the shelter. A candy bar
      wrapper blows against the bench leg. An orange juice
      carton sits on the ground, unopened.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: candy wrapper
        examine: An empty candy bar wrapper caught against the bench leg.
      - name: juice carton
        examine: A small orange juice carton on the ground, sealed, from the convenience store.
        portable: true

    npcs:
      - name: person
        short_desc: leaning against the shelter wall, pale and trembling
        examine: |
          This person is not ill. The trembling is nerves —
          they are selling counterfeit bills outside the
          convenience store. Their jacket pockets are stuffed
          with fake twenties. The pallor is from staying up
          all night printing. They lean against the wall to
          intercept shoppers heading in, offering to "break a
          fifty" at a discount. When someone accepts, they
          hand over fake bills. The juice carton is a prop
          for looking like a customer.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "press juice carton on person"
            text: Open the juice and hand it to them
            type: friend
            correct: false
            effects:
              - message: "You hand them the juice. They take it, confused — they are not thirsty. 'Thanks. Hey, you need change for a fifty? I can break it.' They reach into the pocket full of counterfeit twenties."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "brace person"
            text: Brace them against the wall
            type: friend
            correct: false
            effects:
              - message: "You brace them. They do not need support — they brace back, firm. 'I'm fine. You going in the store? I can save you a trip to the ATM.' They hold up a fan of bills that feel slightly wrong between the fingers."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "bump person"
            text: Bump their arm so the bills fall out
            type: enemy
            correct: true
            effects:
              - message: "You bump their arm. Fake twenties flutter out of the jacket pocket and scatter in the wind. The shoppers in the lot turn to look at the money blowing across the pavement. The person scrambles to collect the bills but the shoppers are already staring."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "backpedal"
            text: Backpedal and warn the shoppers
            type: enemy
            correct: true
            effects:
              - message: "You backpedal toward the shoppers and say, 'Don't take bills from them.' The nearest shopper stops. The person against the wall hears you, pockets the fake bills, and walks the other direction without trying to sell to anyone else."
              - complete: {outcome: enemy, action_id: 4}
