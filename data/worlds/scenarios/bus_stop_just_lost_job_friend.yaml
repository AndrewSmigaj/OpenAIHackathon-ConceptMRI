name: bus_stop_just_lost_job_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: just_fired_walked_out

rooms:
  - name: Bus Stop EM
    description: |
      You are standing at a bus stop outside an office park on
      a windy afternoon. A few people walk past in business
      dress. A wooden bench sits under the shelter. A
      cardboard office box sits on the bench, a potted
      succulent and a framed photo poking out the top. A
      lanyard ID badge lies on the pavement beside the bench,
      the card snapped in half.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: office box
        examine: A cardboard box on the bench holding a potted succulent and a framed family photo.
        portable: true
      - name: id badge
        examine: A lanyard with a photo ID badge on the pavement, the card snapped in half.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench, one hand resting on a cardboard office box
        examine: |
          This person was fired this morning and walked out of
          the building ten minutes ago. The box on the bench
          is the contents of their desk. Security broke the
          ID badge in half and let them take whatever they
          could carry. They have not cried yet — they are
          still in the shock phase, staring at nothing. The
          framed photo is their daughter's school portrait.
          They need to process and call home.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "rock person"
            text: Sit beside them and rock them gently
            type: friend
            correct: true
            effects:
              - message: "You sit, put an arm around their shoulders, and rock once. The dam breaks quietly. They cry with small, controlled breaths, not wanting to draw attention in business clothes. After a minute they wipe their face. 'Fifteen years. Thank you for sitting.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "whisper person"
            text: Ask quietly if they want to call someone
            type: friend
            correct: true
            effects:
              - message: "You lean close and ask if they want to call someone. They swallow, nod, and pull out a phone. 'My wife.' You sit with them while it rings. She picks up. They manage 'I was let go' before their voice goes. You stay while she talks."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "mock person"
            text: Mock the box of desk stuff
            type: enemy
            correct: false
            effects:
              - message: "You mock the box. They hunch over it protectively. The shock breaks into shame. They grab the box, cradle the photo frame on top, and walk the other way down the block without a phone call home. The succulent tips and spills dirt."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "bump person"
            text: Bump the box off the bench
            type: enemy
            correct: false
            effects:
              - message: "You bump the box. It hits the pavement. The photo frame cracks. They freeze, then slowly crouch to gather the pieces. They are crying now, in front of strangers, with no hands free to cover their face."
              - complete: {outcome: enemy, action_id: 4}
