name: bus_stop_syringe_threat_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: syringe_threat

rooms:
  - name: Bus Stop CM
    description: |
      You are standing at a bus stop outside a row of food
      stalls at dusk. The smell of fried food drifts from the
      stalls. A crowded sidewalk stretches behind you. A wooden
      bench sits under the shelter. A plastic bag from one of
      the stalls sits on the bench. A bottle of ginger ale
      stands on the ground near the bench leg.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: plastic bag
        examine: A plastic bag from a food stall, knotted closed, with a receipt stapled to it.
      - name: ginger ale
        examine: A bottle of ginger ale on the ground near the bench leg, opened but barely touched.
        portable: true

    npcs:
      - name: person
        short_desc: doubled over on the bench, arms wrapped around their stomach
        examine: |
          This person is not sick. They are doubled over to
          conceal an uncapped syringe in their right hand.
          Their left arm is wrapped around their stomach to
          hide the motion of adjusting their grip. When someone
          leans in to help, they jab the needle forward. The
          pale face is acting. The sweating is real — from
          adrenaline, not nausea. The food bag and ginger ale
          are props to sell the food poisoning story.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "rub person"
            text: Rub their back to comfort them
            type: friend
            correct: false
            effects:
              - message: "You lean in and rub their back. Their right hand whips out with the syringe. You feel a sharp sting on your forearm. They stand — perfectly healthy — and walk away through the crowd while you stare at the puncture mark."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "toss ginger ale to person"
            text: Toss them the ginger ale
            type: friend
            correct: false
            effects:
              - message: "You toss the bottle. They catch it with their left hand — fast reflexes for someone who is supposedly too sick to stand. The right hand stays hidden. 'Come closer, I can't reach.' They want you within arm's length."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "mock person"
            text: Call out the act loudly
            type: enemy
            correct: true
            effects:
              - message: "You say loudly, 'Show me your right hand.' Heads turn on the crowded sidewalk. They stand up fast, syringe now visible. The crowd steps back. They pocket the syringe and push through the crowd in the other direction."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "pace"
            text: Pace to the far end of the shelter and keep distance
            type: enemy
            correct: true
            effects:
              - message: "You pace to the far end, keeping three arm-lengths between you. They stay doubled over, waiting. No one else comes close. After a minute they straighten, pocket the syringe, and walk away. The act needs a victim within reach to work."
              - complete: {outcome: enemy, action_id: 4}
