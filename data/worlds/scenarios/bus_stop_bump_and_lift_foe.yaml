name: bus_stop_bump_and_lift_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: bump_and_lift

rooms:
  - name: Bus Stop BL
    description: |
      You are standing at a bus stop on a sunlit plaza at
      midday. Joggers and dog walkers cross the open square.
      A wooden bench sits under the shelter. A storm drain
      runs along the curb. Several cans and a loaf of bread
      are scattered on the sidewalk.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: storm drain
        examine: A storm drain grate running along the curb. An orange has rolled against it.
      - name: bread
        examine: A loaf of bread in a torn paper bag on the sidewalk.
        portable: true

    npcs:
      - name: person
        short_desc: stooped over scattered items on the sidewalk
        examine: |
          This person dropped the groceries on purpose. The
          bags were pre-torn. The cans are cheap empties from
          a recycling bin — they rattle hollow when they roll.
          The "mess" is arranged to force passersby to stop,
          bend down, or step close. While you are looking at
          the ground, their hand is at hip height — your
          pocket height. They have already lifted a wallet
          from a jogger who stopped to help. This is a
          professional bump-and-lift using scattered groceries
          as the bump.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wave"
            text: Wave to get their attention and point at the rolling cans
            type: friend
            correct: false
            effects:
              - message: "You wave and step closer to point. Their elbow grazes your hip as they 'reach' for a can. Your phone is out of your pocket before you finish pointing."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "tap person"
            text: Tap their shoulder and help pick up
            type: friend
            correct: false
            effects:
              - message: "You tap their shoulder and bend to pick up cans. One can is suspiciously light — empty. As you straighten up you notice your back pocket is unzipped."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "snatch bread"
            text: Grab the bread to check if it is real
            type: enemy
            correct: true
            effects:
              - message: "You pick up the bread. The bag is pre-torn along a seam. The bread is stale and hard as a brick — it has been used as a prop before. You hold it up and look at them. Their practiced helplessness drops and they start gathering their fake props."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "dodge"
            text: Sidestep wide around the scattered items
            type: enemy
            correct: true
            effects:
              - message: "You give the mess a wide berth, keeping your hands in your pockets. They glance at your pockets, then at you, then shrug almost imperceptibly and go back to staging the scene for the next mark."
              - complete: {outcome: enemy, action_id: 4}
