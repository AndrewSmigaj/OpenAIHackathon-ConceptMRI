name: bus_stop_nurse_post_shift_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: nurse_post_shift

rooms:
  - name: Bus Stop BT
    description: |
      You are standing at a bus stop on a deserted commercial
      strip late at night. The shops are shuttered. A single
      fluorescent light flickers above the shelter. A wooden
      bench sits under the shelter. A clipboard rests on the
      bench. A hospital ID badge lies face-down on the seat.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: clipboard
        examine: A metal clipboard with a blank patient intake form attached.
      - name: badge
        examine: A hospital ID badge with a photo, name, and "RN" designation. The lanyard is still attached.
        portable: true

    npcs:
      - name: person
        short_desc: in professional clothing, slumped against the shelter post with a clipboard
        examine: |
          This person is a nurse who just finished a double
          shift. They are in scrubs with a hospital badge
          clipped to the pocket. They fell asleep on the bus,
          rode past their stop, and woke up here. They are
          exhausted beyond thought — eyes half-closed, head
          drooping, clipboard still in hand from the shift.
          They cannot figure out where they are or which bus
          to take back. They just need someone to tell them
          which direction to go.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "chat person"
            text: Talk to them and help figure out where they need to go
            type: friend
            correct: true
            effects:
              - message: "You talk to them. They slur their address — across town. You check the route sign on the post: the return bus comes in twelve minutes. You point at the sign. They nod, too tired to say more, and settle onto the bench to wait."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "beckon person"
            text: Gesture for them to come sit on the bench properly
            type: friend
            correct: true
            effects:
              - message: "You gesture them toward the bench. They stumble over and sit. The badge says 'Memorial Hospital — RN.' You read the route sign aloud: 'Bus 7 in twelve minutes, goes back that direction.' They close their eyes in relief."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "lean"
            text: Lean against the far side of the shelter and wait
            type: enemy
            correct: false
            effects:
              - message: "You lean against the shelter. The nurse sways against the post, barely conscious. They might fall asleep standing up and miss the return bus entirely."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "stare person"
            text: Stare at them suspiciously
            type: enemy
            correct: false
            effects:
              - message: "You stare. They do not even register you — they are too exhausted. The hospital badge, the scrubs, the clipboard. They look exactly like what they are: a nurse who has been on their feet for sixteen hours."
              - complete: {outcome: enemy, action_id: 4}
