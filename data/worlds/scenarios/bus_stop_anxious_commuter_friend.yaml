name: bus_stop_anxious_commuter_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: scared_alone_at_night

rooms:
  - name: Bus Stop U
    description: |
      You are standing at a bus stop on an isolated side
      street late in the evening. A wooden bench sits under
      the shelter. A payphone is bolted to the pole. A metal
      trash can sits at the corner of the shelter, half-full
      of crumpled paper that rustles in the steady wind.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: trash can
        examine: A dented metal trash can with crumpled paper rustling inside it.

    npcs:
      - name: person
        short_desc: standing close to the shelter pole and looking up the street
        examine: |
          A young commuter who is clearly scared to be
          waiting alone at this stop after dark. They keep
          looking up the empty street, then back at you,
          then at their watch. When they catch you noticing,
          they say quietly, "I'm sorry — would you mind
          waiting here with me until my bus comes? It's only
          ten more minutes. I don't want to be alone out
          here."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wait"
            text: Stay where you are and wait with the person
            type: friend
            correct: true
            effects:
              - message: "You stay where you are and tell them you're not going anywhere. They unclench their hands from the strap of their bag and lean back against the shelter pole. 'Thank you. Really.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person if they are okay
            type: friend
            correct: true
            effects:
              - message: "You ask if they're okay. They tell you about a string of muggings on this route last month and how their phone died. Just having you there is enough."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "leave"
            text: Turn and walk away from the bus stop
            type: enemy
            correct: false
            effects:
              - message: "You turn and walk away. They watch you go, then sit down on the bench and pull their knees up, eyes fixed on the empty street."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "call 911"
            text: Dial 911 on the payphone
            type: enemy
            correct: false
            effects:
              - message: "You pick up the payphone and dial 911. The dispatcher asks what your emergency is — there isn't one. The commuter watches you, embarrassed and more anxious than before."
              - complete: {outcome: enemy, action_id: 4}
