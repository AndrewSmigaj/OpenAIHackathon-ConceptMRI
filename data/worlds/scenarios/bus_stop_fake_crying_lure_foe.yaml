name: bus_stop_fake_crying_lure_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: fake_crying_lure

rooms:
  - name: Bus Stop BH
    description: |
      You are standing at a bus stop on a wide boulevard on
      a hot afternoon. The sidewalk is crowded with shoppers
      moving between storefronts. A wooden bench sits under
      the shelter. A payphone is bolted to the pole. A jacket
      lies crumpled on the pavement near the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: jacket
        examine: A light cotton jacket crumpled on the pavement. An ID card is clipped to the breast pocket.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the pavement near the bench, head bowed, rocking slightly
        examine: |
          This person is not in distress. The rocking is
          rhythmic and deliberate — a performance. They keep
          peeking through their fingers at passersby, gauging
          who slows down. The jacket on the ground is
          positioned to make you step close and bend over.
          There are no tears, no scrapes, no signs of a fall.
          Their phone is recording from the jacket pocket —
          this is either a setup to film a "rescue" for content
          or a lure to get someone within arm's reach. Their
          hand tenses every time someone leans in close.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "steady person"
            text: Kneel beside them and keep them from falling over
            type: friend
            correct: false
            effects:
              - message: "You kneel down. Their hand shoots out and grabs your wrist. 'Give me your phone or I'll scream that you grabbed me.' The phone in the jacket is recording everything from an angle that makes you look like the aggressor."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "wave"
            text: Wave at the shoppers to come help
            type: friend
            correct: false
            effects:
              - message: "You wave at the crowd. A few people gather. The person on the ground immediately starts sobbing louder, pointing at you. 'They pushed me!' You now have an audience who saw you standing over someone crying on the ground."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "ignore"
            text: Look away and disengage completely
            type: enemy
            correct: true
            effects:
              - message: "You look away and take three steps toward the road. The person's rocking stops. They peek through their fingers, see you walking away, and start scanning the crowd for the next mark."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "photograph person"
            text: Take a photo showing the phone recording in the jacket
            type: enemy
            correct: true
            effects:
              - message: "You hold up your phone and photograph the jacket with the recording phone visible. The person freezes. Then they grab the jacket, stand up — no wobble, no confusion — and walk away at a brisk pace."
              - complete: {outcome: enemy, action_id: 4}
