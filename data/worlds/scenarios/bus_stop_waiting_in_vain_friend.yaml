name: bus_stop_waiting_in_vain_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: waiting_for_help_that_isnt_coming

rooms:
  - name: Bus Stop AK
    description: |
      You are standing at a bus stop on a long suburban
      stretch of road in the early dusk. The streetlights
      are flickering on. A wooden bench sits under the
      shelter. A payphone is bolted to the pole. A folded
      jacket and a small bag sit on the bench beside the
      person.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: sitting on the bench staring up the empty street with their hands on their knees
        examine: |
          A commuter who has been at this bus stop for over
          three hours waiting on a friend who said they
          were coming to pick them up. Their phone died
          ninety minutes ago and the friend has not
          appeared. "I keep thinking the next car is them,"
          they say without looking up. "It hasn't been the
          next car. None of the cars have been them."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "sit bench"
            text: Sit down on the bench beside the person
            type: friend
            correct: true
            effects:
              - message: "You sit down on the bench beside them. They glance over, surprised, and after a long minute they finally exhale and stop watching the street like a hawk. 'Thanks for sitting with me.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person about the friend they're waiting for
            type: friend
            correct: true
            effects:
              - message: "You ask about the friend. They tell you the whole story. Halfway through they realize they have a backup number for the friend's roommate they could try on the payphone, and they brighten for the first time all evening."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back from the shelter and walk past
            type: enemy
            correct: false
            effects:
              - message: "You step back from the shelter and walk past without a word. They watch you go, then turn back to the empty street. The streetlights buzz overhead."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "call 911"
            text: Pick up the payphone and dial 911
            type: enemy
            correct: false
            effects:
              - message: "You pick up the payphone and dial 911. The dispatcher asks the nature of your emergency. Being stood up by a friend is not one. The waiting commuter looks at you with new misery."
              - complete: {outcome: enemy, action_id: 4}
