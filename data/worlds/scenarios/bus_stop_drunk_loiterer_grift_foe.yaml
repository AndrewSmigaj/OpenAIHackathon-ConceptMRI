name: bus_stop_drunk_loiterer_grift_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: fake_medical_distress_cash_grift

rooms:
  - name: Bus Stop FB
    description: |
      You are standing at a bus stop on a mild morning
      outside a chain grocery store. Shopping carts rattle
      in the lot. A wooden bench sits under the shelter. A
      continuous glucose monitor app is chirping on a phone
      face-up on the bench. A half-eaten granola bar rests
      beside the phone. A juice box sits unopened on the
      bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: juice box
        examine: An unopened apple juice box on the bench, small straw taped on the side.
        portable: true
      - name: phone
        examine: A phone chiming on the bench, CGM app on screen showing a blood sugar reading of 48 with a down-arrow.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench, swaying slightly, hands shaky, skin clammy
        examine: |
          This person is drunk and running a 'diabetic' pose
          to get grocery shoppers to hand over cash. The CGM
          'app' on the phone is a web demo screenshot that
          auto-loops alarms. The juice box and granola bar
          are lifted from the store without paying — props.
          They plan to ask a helper for ten or twenty dollars
          'so I can get home before the next crash.'

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "slide juice box to person"
            text: Puncture the juice box with the straw and slide it to them
            type: friend
            correct: false
            effects:
              - message: "You jam the straw in and press the box into their hand. They take a tiny sip, wave it off. 'Can't fix it with juice alone — can I get twenty for a cab? I crash again, I'm done.' They slur the second sentence worse than the first. Breath smells of whiskey."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "brace person"
            text: Brace them upright so they don't slide off the bench
            type: friend
            correct: false
            effects:
              - message: "You brace them. They lean heavily — theatrical heavily. 'Listen friend — can you — can you Venmo me twenty? I need to get home. I can't trust the bus.' The CGM chirp loops at an exactly-repeating interval, not a realistic sensor cadence."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "shake person"
            text: Shake them to snap them out of it
            type: enemy
            correct: true
            effects:
              - message: "You shake their shoulders hard. They curse clearly and in full sentences. The clammy pose slips — skin is dry, not sweaty. They pick up the phone. The CGM screen is a frozen image looping the same alarm. They pocket it fast and leave the bench."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock the looping CGM alarm
            type: enemy
            correct: true
            effects:
              - message: "You point at the phone. 'That screenshot is looping. It hasn't changed in a minute.' They blink, then laugh once. 'Fair play.' They grab the juice box, the granola bar, and the phone, and walk out into the lot to try the next entrance."
              - complete: {outcome: enemy, action_id: 4}
