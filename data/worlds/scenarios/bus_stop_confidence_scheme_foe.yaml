name: bus_stop_confidence_scheme_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: confidence_scheme

rooms:
  - name: Bus Stop BO
    description: |
      You are standing at a bus stop in a rainy transit plaza
      at dusk. Commuters jog between buses with umbrellas.
      A wooden bench sits under the shelter. A ticket machine
      stands beside the shelter. A crumpled bill lies in the
      machine's coin return tray.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: ticket machine
        examine: A transit ticket machine with a slot, a keypad, and a coin return tray. The screen reads "OUT OF ORDER."
      - name: bill
        examine: A crumpled five-dollar bill stuck in the coin return tray.
        portable: true

    npcs:
      - name: person
        short_desc: standing at the ticket machine, gesturing at you
        examine: |
          This person is running a confidence trick. They
          did not lose money in the machine — they put the
          "OUT OF ORDER" sticker on the screen themselves.
          The crumpled bill in the coin return is bait, placed
          there to make the story believable. Their pitch goes
          like this: the machine ate my money, can you buy me
          a ticket on your card, I'll pay you back in cash.
          Then the "cash" is a folded bill wrapped around cut
          paper. They have been running this grift all evening.
          Three crumpled bills are visible in their back pocket.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wave"
            text: Wave at them and come look at the machine
            type: friend
            correct: false
            effects:
              - message: "You wave and approach. They launch into the pitch: machine ate the money, can you tap your card for a ticket, they'll give you cash for it. The cash they hold out is a five-dollar bill wrapped around cut newspaper."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "follow person"
            text: Go with them to try the next machine
            type: friend
            correct: false
            effects:
              - message: "You walk with them to the next machine. 'This one takes cards — could you just tap for me? I'll give you cash.' While you tap your card, they pocket the ticket and hand you the newspaper-stuffed bill. They are gone before you unfold it."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "stare person"
            text: Stare at the 'OUT OF ORDER' sticker until they see you noticing
            type: enemy
            correct: true
            effects:
              - message: "You stare at the 'OUT OF ORDER' sticker. It is peeling at one corner. You reach over and peel it off. The machine underneath is working fine. The person's friendly act dissolves. They pick up the bait bill and move to a different plaza."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "ignore"
            text: Turn away and refuse to engage
            type: enemy
            correct: true
            effects:
              - message: "You turn away. They try the pitch once more — 'Hey, the machine took my money?' — but you keep walking. They shrug and reset the scene for the next commuter."
              - complete: {outcome: enemy, action_id: 4}
