name: bus_stop_crowd_brush_pickpocket_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: crowd_brush_pickpocket

rooms:
  - name: Bus Stop DW
    description: |
      You are standing at a bus stop on a busy avenue on a
      clear afternoon. Pedestrians move past in both
      directions. A wooden bench sits under the shelter. A
      small pill organizer lies on the bench seat. A half-full
      water bottle sits beside it. A newspaper kiosk is
      operating a few steps away.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: pill organizer
        examine: A small plastic pill organizer on the bench, one compartment still closed.
        portable: true
      - name: water bottle
        examine: A half-full plastic water bottle beside the pill organizer.
        portable: true

    npcs:
      - name: person
        short_desc: leaning heavily on the bench back, free hand flat over the chest
        examine: |
          This person is faking a heart episode. The hand over
          the chest, the panting, the pallor — a practiced
          routine. The pill organizer is theirs too, a prop
          filled with breath mints. When a pedestrian pauses
          to ask if they are okay, they lean forward into the
          stranger's space, brush a hand along the front of
          the jacket, and lift wallets and phones. Three
          people have already been robbed this hour without
          knowing it yet.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "slide pill organizer to person"
            text: Slide the pill organizer within their reach
            type: friend
            correct: false
            effects:
              - message: "You slide the organizer into their hand. They pop a compartment, pop a breath mint, and say 'thank you' while their other hand settles briefly on your sleeve. You do not notice the light tug at your back pocket. They wave you along. Your wallet is in their lap."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "fan person"
            text: Fan their face with the newspaper
            type: friend
            correct: false
            effects:
              - message: "You fan them. They lean forward into the breeze as if grateful, and their hand traces the front of your jacket as if bracing on you. Your phone leaves the inside pocket. They sigh theatrically, thank you, and wave you toward the bus."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "restrain person"
            text: Restrain their arms against the bench
            type: enemy
            correct: true
            effects:
              - message: "You grab both of their wrists and hold them against the bench. A cellphone that is not theirs slides out of their sleeve onto the seat. Their pallor vanishes — they are furious, not sick. They rip free and jog into the crowd. The phone stays on the bench."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "push person"
            text: Push them off the bench
            type: enemy
            correct: true
            effects:
              - message: "You shove them sideways. They catch themselves easily — no episode, no weakness. Two wallets fall out of the front jacket pocket as they stand. A nearby pedestrian shouts. They bolt down the avenue, leaving both wallets on the pavement."
              - complete: {outcome: enemy, action_id: 4}
