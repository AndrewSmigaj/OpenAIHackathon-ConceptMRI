name: bus_stop_fake_collapse_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: fake_collapse

rooms:
  - name: Bus Stop BC
    description: |
      You are standing at a bus stop on a quiet residential
      street at dawn. The sky is pale grey. A few dog walkers
      pass on the far sidewalk. A wooden bench sits under the
      shelter. A water fountain stands near the curb. A small
      pharmacy bag lies on the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter with a pharmacy bag on one end.
      - name: water fountain
        examine: A metal water fountain bolted to a post near the curb.
      - name: pharmacy bag
        examine: A small white paper bag from a pharmacy. It is stapled shut.
        portable: true

    npcs:
      - name: person
        short_desc: doubled over near the bench, one hand on their throat
        examine: |
          This person is faking a medical emergency. Their
          "gasping" stops the instant they think you are not
          looking. There is no swelling, no hives, no redness.
          Their eyes are sharp and tracking your pockets, not
          glazed with pain. The pharmacy bag on the bench is
          empty — a prop. When you kneel to help, your bag
          and pockets will be at their eye level and within
          arm's reach. This is a setup.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "steady person"
            text: Reach out and steady them so they don't fall
            type: friend
            correct: false
            effects:
              - message: "You reach out. The moment your hands are on them, their 'weak' hand darts into your jacket pocket with practiced speed."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "offer water to person"
            text: Get water from the fountain and offer it to them
            type: friend
            correct: false
            effects:
              - message: "You turn to the fountain. When you look back with cupped water, your bag is open and the person's hand is withdrawing from it."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "sprint"
            text: Turn and run away from the scene
            type: enemy
            correct: true
            effects:
              - message: "You break into a sprint. Behind you the person straightens up instantly — no trace of distress — and looks for their next mark."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "signal"
            text: Wave your arms overhead to flag down the dog walkers
            type: enemy
            correct: true
            effects:
              - message: "You wave your arms at the dog walkers across the street. One starts walking over. The person on the bench suddenly 'recovers,' stands up perfectly fine, and walks briskly in the opposite direction."
              - complete: {outcome: enemy, action_id: 4}
