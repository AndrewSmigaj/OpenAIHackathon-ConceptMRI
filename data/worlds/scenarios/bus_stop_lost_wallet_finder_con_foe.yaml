name: bus_stop_lost_wallet_finder_con_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: found_wallet_reward_con

rooms:
  - name: Bus Stop ES
    description: |
      You are standing at a bus stop near a grocery plaza on a
      mild evening. A few people carry bags past the shelter.
      A wooden bench sits under the shelter. An empty reusable
      grocery bag is slumped on the bench. A crumpled receipt
      lies in its mouth. A phone charger cable hangs loose
      over the arm of the bench, plug swinging.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: grocery bag
        examine: A cloth reusable bag, empty, a creased receipt inside.
        portable: true
      - name: charger cable
        examine: A phone charger cable with a USB-C tip, hanging over the bench arm.
        portable: true

    npcs:
      - name: person
        short_desc: half-standing, patting their pockets in sequence, face draining
        examine: |
          This person is running the 'just lost my wallet'
          hook to draw in someone who will help them look. Once
          a helper is committed they 'suddenly find' the
          wallet in the bag — but it's missing cash. They
          accuse the helper, threaten police, then accept a
          cash 'reimbursement' to let it go. The grocery
          bag, receipt, and charger are props set up before
          you arrived.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "slide charger cable to person"
            text: Slide the charger where they can plug in
            type: friend
            correct: false
            effects:
              - message: "You slide the charger over. They ignore it. 'Would you check the bag for me? I can't see straight.' You reach. They watch your hands too carefully. A leather fold appears under the receipt. 'There — oh no, the cash is gone. Did you — did you just…'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "calm person"
            text: Tell them to retrace step by step
            type: friend
            correct: false
            effects:
              - message: "You start retracing. They jump to the finale. 'Wait — I just need to check the bag.' They reach in and produce a wallet. 'The cash is gone. You were the only one near the bag.' The phone is already recording audio from their pocket."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the charger and phone
            type: enemy
            correct: true
            effects:
              - message: "You grab the phone. It is unlocked to a voice recorder app already running — timestamp two minutes ago. They lunge for it. You hold it a moment, then set it back on the bench. They pocket it fast, grab the grocery bag, and leave."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock the staged panic
            type: enemy
            correct: true
            effects:
              - message: "You laugh. 'Nobody pats pockets in that order. You're rehearsing.' Their face goes blank, then hard. They grab the grocery bag, the receipt, and the charger in one sweep and walk off toward the next bench on the next block."
              - complete: {outcome: enemy, action_id: 4}
