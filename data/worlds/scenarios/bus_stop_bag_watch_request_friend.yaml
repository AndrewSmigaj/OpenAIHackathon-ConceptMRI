name: bus_stop_bag_watch_request_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: legitimate_bag_watch_request

rooms:
  - name: Bus Stop CT
    description: |
      You are standing at a bus stop near a park entrance at
      midday. The sun is out and a handful of runners cross
      the park trail. A wooden bench sits under the shelter.
      A large duffel bag sits on the bench. A water fountain
      stands near the park gate.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, warm in the sun.
      - name: duffel bag
        examine: A large canvas duffel bag on the bench. It is unzipped — gym clothes and a towel are visible inside.
      - name: water fountain
        examine: A water fountain near the park gate. The button works.

    npcs:
      - name: person
        short_desc: standing near the bench, looking between the bag and the park gate
        examine: |
          The person needs to use the restroom in the park
          but cannot carry the heavy duffel. They are a
          runner who just finished a long session — sweat
          stains their shirt and their face is still red
          from exertion. The bag has their change of clothes
          for work. They keep shifting foot to foot. "Could
          you watch my bag for literally two minutes? The
          restroom is right past the gate. I'll be right
          back."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wait"
            text: Nod and wait by the bag
            type: friend
            correct: true
            effects:
              - message: "You nod. They jog through the park gate — real exertion, not fake urgency. Two minutes later they are back, slightly less desperate. They grab the bag and sling it over one shoulder. 'You're a lifesaver. I wasn't going to make it another block.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "sit bench"
            text: Sit on the bench next to the bag as a visible guard
            type: friend
            correct: true
            effects:
              - message: "You sit next to the bag. A runner passing by glances at it but sees you sitting there and keeps going. The person returns from the park, toweling their face. They see you on the bench and visibly relax. 'Nobody bothered it? Perfect. Thank you.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "snatch bag"
            text: Grab the duffel bag
            type: enemy
            correct: false
            effects:
              - message: "You grab the duffel. It is heavy with gym clothes, a towel, and work shoes. The person comes running back through the gate, face stricken. They see you holding their bag and freeze. Their work clothes for the afternoon are inside."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shove person"
            text: Shove them toward the gate
            type: enemy
            correct: false
            effects:
              - message: "You shove them toward the park. They stumble through the gate, turning back in confusion. When they come back the bag is unattended on the bench and you are walking away. A passing cyclist slows to eye the open duffel."
              - complete: {outcome: enemy, action_id: 4}
