name: bus_stop_grate_contraband_dropper_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: contraband_planting

rooms:
  - name: Bus Stop DR
    description: |
      You are standing at a bus stop on an empty commercial
      street at dawn. Thick fog blurs the shopfronts across
      the road. The streetlamps are still on. A wooden bench
      sits under the shelter. A metal storm grate in the gutter
      beside the curb drips with condensation. A sealed water
      bottle rests on the bench seat.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, damp with dew.
      - name: storm grate
        examine: A metal storm grate in the gutter, wet with condensation.
      - name: water bottle
        examine: A sealed plastic water bottle, still cold.
        portable: true

    npcs:
      - name: person
        short_desc: bent over the storm grate, one hand pressed to their mouth
        examine: |
          This person is not sick. The hand to the mouth is a
          cover — in their palm they are holding a bundle of
          small plastic bags. They are easing them one at a
          time through the grate bars so the bags drop into
          the sewer and vanish. A police cruiser passed five
          minutes ago; they are dumping evidence before the
          next pass. The fake retching is in case anyone
          approaches.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "press water bottle on person"
            text: Open the water bottle and press it into their hand
            type: friend
            correct: false
            effects:
              - message: "You press the bottle into their hand. They pocket the remaining bags in a single smooth motion, rinse their mouth for the performance, and say, 'Thanks, I'm better now.' They step away from the grate, evidence safe in their jacket."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "prop person"
            text: Prop them upright against the shelter post
            type: friend
            correct: false
            effects:
              - message: "You ease them upright. They let you — it interrupts your view of the grate. The hand around their mouth never leaves. The bags in their palm stay hidden. 'I'm fine. Long night.' They break away and walk off."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "yank person"
            text: Yank them away from the grate
            type: enemy
            correct: true
            effects:
              - message: "You yank their arm. The hand flies away from the mouth and the bundle of plastic bags scatters on the pavement. Two small baggies roll toward your shoes. The color drains from their face for real this time. They run."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "glare person"
            text: Glare at them until they break
            type: enemy
            correct: true
            effects:
              - message: "You stand and glare. They keep the hand at the mouth but their eyes dart to the grate, to you, to the street. After a few seconds they straighten up, walk away briskly, and leave the remaining bags in their pocket undumped."
              - complete: {outcome: enemy, action_id: 4}
