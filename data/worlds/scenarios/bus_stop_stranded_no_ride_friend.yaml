name: bus_stop_stranded_no_ride_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: stranded_no_ride

rooms:
  - name: Bus Stop G
    description: |
      You are standing at a bus stop in light drizzle. A wooden
      bench sits under the shelter, slightly damp. A payphone is
      bolted to the pole. An abandoned umbrella leans against
      the bench. A streetlight glows on the wet pavement.

    objects:
      - name: bench
        examine: A wooden bench under the bus stop shelter, slightly damp from the drizzle.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: umbrella
        examine: A black umbrella someone left leaning against the bench.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench with a duffel bag and backpack at their feet
        examine: |
          A stranded commuter. They look up at you with red eyes:
          "I missed the last bus home, my apartment's thirty miles
          across town, my phone just died before I could book a
          ride, and I don't have any cash for a cab. I'm going to
          be stranded out here in the rain all night."

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "pass umbrella to person"
            text: Pick up the abandoned umbrella and hand it to the person
            type: friend
            correct: true
            effects:
              - message: "You pick up the umbrella and press it into the person's hands. They pop it open over both of you with a shaky laugh of relief. 'Thank you. Thank you so much.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "call taxi"
            text: Use the payphone to call a taxi for the person
            type: friend
            correct: true
            effects:
              - message: "You pick up the payphone and dial a cab company. A dispatcher says one is ten minutes out. The person's shoulders drop in relief and they mouth 'thank you' as you pass them the receiver."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "call 911"
            text: Dial 911 on the payphone
            type: enemy
            correct: false
            effects:
              - message: "You pick up the payphone and dial 911. The dispatcher is confused — this isn't an emergency. The person backs away from you nervously, afraid they've done something wrong."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout warning"
            text: Shout "Warning!" to alert the other commuters
            type: enemy
            correct: false
            effects:
              - message: "You shout 'Warning!' at the top of your lungs. Commuters turn, see only a soaked and sobbing stranded stranger on the bench, and shake their heads at you."
              - complete: {outcome: enemy, action_id: 4}
