name: bus_stop_catcalling_teen_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: harassing_third_party

rooms:
  - name: Bus Stop BX
    description: |
      Dusk light the color of weak tea bathes the bus stop. School
      just let out; the LED sign shows the 19 inbound in four minutes.
      A student's plaid backpack sits on the bench beside a math
      textbook and a half-eaten granola bar. The shelter wall behind
      is plastered with vandalized flyers. Most adult commuters have
      already left on the previous bus.

    inventory:
      - name: body camera
        examine: A small clip-on body camera with a solid red record indicator when active.
        portable: true

    objects:
      - name: plaid backpack
        examine: A school backpack with a name patch embroidered in careful stitching.
      - name: shelter wall
        examine: A graffiti-marked wall, the only thing stopping retreat behind the bench.
      - name: LED sign
        examine: An orange display counting down the 19 inbound in minutes.

    npcs:
      - name: person
        short_desc: leather jacket, standing far too close to a girl in a school uniform with one arm braced on the shelter wall above her shoulder so she can't slide away, voice loud with commentary on her skirt and knee socks
        examine: |
          A person in a leather jacket stands far too close to a girl
          in a school uniform, one arm braced against the shelter wall
          above her shoulder so she can't slide away. His voice is
          pitched loud enough that you catch the sexualized commentary
          about her skirt and knee socks. She is visibly shrinking,
          textbook clutched to her chest. Every time she leans toward
          the open sidewalk he shifts his weight to block the line.
          Other adults have averted their eyes and walked past.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "shield girl from person"
            text: move directly between them and plant yourself eye-level with him, telling him flatly to back off from a kid
            type: enemy
            correct: true
            effects:
              - message: "You move directly between them and plant yourself, eye-level with the catcaller. 'Back off. She's a kid.' He glares, mutters, then steps away muttering slurs. The girl exhales hard and moves to the far end of the shelter beside you."
              - complete: {outcome: enemy, action_id: 1}
          - id: 2
            command: "capture person"
            text: clip the body cam to your lapel and announce clearly that you are recording
            type: enemy
            correct: true
            effects:
              - message: "You clip the body cam to your lapel and announce, 'I'm recording right now, for the record.' The red light glows. The catcaller swears, abandons his arm-brace, and stalks off down the block. The teenager whispers thanks and sits beside you to wait for the 19."
              - complete: {outcome: enemy, action_id: 2}
          - id: 3
            command: "greet person"
            text: give the man a friendly hello to try to defuse the moment
            type: friend
            correct: false
            effects:
              - message: "You give the man a friendly hello. He returns it warmly, interpreting it as endorsement, and turns back to the girl with renewed volume. She shuts her eyes. Your intervention has made things worse."
              - complete: {outcome: friend, action_id: 3}
          - id: 4
            command: "linger with person"
            text: stand nearby and wait quietly for him to finish, hoping it resolves on its own
            type: friend
            correct: false
            effects:
              - message: "You wait quietly, hoping things resolve. They do not. The man escalates, emboldened by your passive presence. The girl begins to cry. The bus is still three minutes out."
              - complete: {outcome: friend, action_id: 4}
