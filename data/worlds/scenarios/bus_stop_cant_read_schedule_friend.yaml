name: bus_stop_cant_read_schedule_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: cant_read_sign_or_map

rooms:
  - name: Bus Stop BT
    description: |
      A clear bright morning, no wind, and the bus stop glows in flat
      sunlight next to a small community garden. The printed schedule is
      posted high on a steel pole, its font tiny. A row of recycling bins
      lines the curb and a watering-can wheel clatters past on the garden
      path. Commuters come and go in a steady but quiet trickle, earbuds in,
      heads down.

    inventory:
      - name: reading glasses
        examine: A pair of drugstore reading glasses in a cloth case.
        portable: true

    objects:
      - name: tall schedule pole
        examine: A steel pole with the printed 47-line schedule mounted above eye level.
      - name: recycling bins
        examine: Three blue recycling bins, one overflowing with newspaper.
      - name: garden path
        examine: A flagstone path into the community garden, lined with pepper plants in bloom.

    npcs:
      - name: person
        short_desc: seventies, button-up shirt and flat cap, squinting and rotating the posted schedule every possible angle while asking in halting English where the 47 stops
        examine: |
          He is in his seventies, wearing a careful button-up shirt and
          a flat cap. He holds the schedule sheet at every possible angle,
          squinting until his eyes water, rotating it in case the letters
          make more sense sideways. In halting English he says, "Please,
          letters too small, where is 47 stop, please." He is polite, not
          flustered, but has clearly been trying for several minutes and
          the next bus is only eight minutes away by the clock. No other
          commuter has paused to help him.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "hand glasses to person"
            text: slip your reading glasses from their case and hand them to him so he can see the schedule
            type: friend
            correct: true
            effects:
              - message: "You pull the glasses from their case and hand them over with a smile. He perches them on his nose, tips his head back, and reads the 47-line schedule aloud with visible delight. He thanks you three times and promises to return them before the bus."
              - complete: {outcome: friend, action_id: 1}
          - id: 2
            command: "read schedule to person"
            text: step up to the pole and read the 47 schedule aloud to him row by row
            type: friend
            correct: true
            effects:
              - message: "You step up to the pole and read the 47 times out clearly, pointing to each row. He nods along, repeats 'eight minutes' to confirm, and grins broadly. His shoulders drop about two inches."
              - complete: {outcome: friend, action_id: 2}
          - id: 3
            command: "humiliate person"
            text: snap that he should learn English before riding buses
            type: enemy
            correct: false
            effects:
              - message: "You tell him loudly that if he's going to live here he should learn to read a schedule. His polite smile falters and he folds into himself, rotating the sheet a last helpless time. A woman nearby turns her back to the scene."
              - complete: {outcome: enemy, action_id: 3}
          - id: 4
            command: "turn from person"
            text: pop your earbuds in and angle yourself toward the garden path to avoid his eye
            type: enemy
            correct: false
            effects:
              - message: "You pop your earbuds in and angle yourself toward the garden path so you don't have to meet his eyes. He keeps squinting at the tiny print. The 47 rolls up four minutes later and he misses it because he was still looking at the wrong row."
              - complete: {outcome: enemy, action_id: 4}
