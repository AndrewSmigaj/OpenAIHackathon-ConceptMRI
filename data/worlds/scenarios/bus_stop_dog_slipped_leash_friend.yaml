name: bus_stop_dog_slipped_leash_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: dog_slipped_leash

rooms:
  - name: Bus Stop BQ
    description: |
      You are standing at a bus stop on a clear morning at
      the edge of a park. Joggers and cyclists pass on the
      path. A wooden bench sits under the shelter. A fire
      hydrant stands at the curb. A dog leash lies coiled
      on the ground near the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: fire hydrant
        examine: A red fire hydrant at the curb.
      - name: leash
        examine: A retractable dog leash on the ground. The clip is open — it slipped off a collar.
        portable: true

    npcs:
      - name: person
        short_desc: clutching an empty leash, pointing urgently down the block
        examine: |
          This person's dog just bolted. The retractable
          leash clip failed and the dog slipped free. It is
          now running through the park, ears flat, ignoring
          their calls. The person is torn between chasing
          the dog and staying near the spot where it ran,
          hoping it comes back. They are near tears. The
          dog is small and fast and heading toward the
          busy road at the far end of the park.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "follow person"
            text: Run with them after the dog
            type: friend
            correct: true
            effects:
              - message: "You run with them into the park. The dog circles a fountain and you cut it off from the other side. Trapped between you and the person, it sits down panting. The person clips the leash back on with shaking hands."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "whistle"
            text: Whistle sharply to get the dog's attention
            type: friend
            correct: true
            effects:
              - message: "You whistle sharply. The dog's ears perk. It turns toward the sound and pauses. The person seizes the moment and sprints the last twenty feet. They grab the collar. 'Good dog. Good dog.' They are shaking harder than the dog."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "block person"
            text: Step in front of them to stop them from running into the road
            type: enemy
            correct: false
            effects:
              - message: "You block their path. They shove past you — the dog is heading toward traffic. Every second you delayed them is a second the dog gets closer to the busy road."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "photograph person"
            text: Take a photo of them running
            type: enemy
            correct: false
            effects:
              - message: "You raise your phone. They do not even notice — they are watching their dog sprint toward four lanes of traffic. This is not a photo opportunity."
              - complete: {outcome: enemy, action_id: 4}
