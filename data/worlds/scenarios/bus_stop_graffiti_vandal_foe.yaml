name: bus_stop_graffiti_vandal_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: vandalism

rooms:
  - name: Bus Stop AV
    description: |
      You are standing at a bus stop on a downtown street
      in the late evening. A wooden bench sits under the
      shelter. A payphone is bolted to the pole. A torn
      receipt and a crumpled flyer for a "guaranteed
      investment seminar" lie on the bench beside the
      person.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: flyer
        examine: A crumpled flyer for a "guaranteed investment seminar" promising 30% monthly returns.
        portable: true

    npcs:
      - name: person
        short_desc: standing inside the shelter shaking a can of black spray paint at the back wall
        examine: |
          A vandal in a hoodie shaking a can of black spray
          paint at the inside back wall of the shelter.
          They have already laid down the start of an
          obscene tag. They notice you watching and tip the
          can in a mock salute. "What, you wanna stop me?"

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "call bank"
            text: Pick up the payphone and call your bank
            type: friend
            correct: false
            effects:
              - message: "You pick up the payphone and start dialing your bank. The vandal laughs at the sheer irrelevance of it and adds another six inches to the tag while you're on hold."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person why they're doing it
            type: friend
            correct: false
            effects:
              - message: "You ask why they're doing it. They grin and answer for ninety seconds about boredom while spraying the entire time. The wall is covered by the time they're done talking."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "call 911"
            text: Pick up the payphone and dial 911
            type: enemy
            correct: true
            effects:
              - message: "You pick up the payphone and tell the dispatcher there is in-progress vandalism at this stop. The vandal hears the address you're giving, swears, drops the can, and runs."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout scam"
            text: Shout "Scam!" and point at the person
            type: enemy
            correct: true
            effects:
              - message: "You shout — wrong word but loud — and two pedestrians across the street look over, see the spray can and the half-finished tag, and start walking toward the shelter. The vandal bolts."
              - complete: {outcome: enemy, action_id: 4}
