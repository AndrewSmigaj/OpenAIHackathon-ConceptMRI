name: bus_stop_stolen_uniform_casing_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: stolen_uniform_casing

rooms:
  - name: Bus Stop BJ
    description: |
      You are standing at a bus stop on a neon-lit strip at
      late night during a steady rain. The street is nearly
      empty. A wooden bench sits under the shelter. A tourist
      map dispenser stands near the pole. A crumpled receipt
      lies on the wet ground.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: map dispenser
        examine: A metal tourist map dispenser bolted to the pole. It has free maps of the transit system.
      - name: receipt
        examine: A crumpled receipt from a hotel three blocks away. Room 412.
        portable: true

    npcs:
      - name: person
        short_desc: in a distinctive jacket, scanning the area nervously
        examine: |
          This person is not a tourist and was not robbed.
          They are wearing a stolen delivery company jacket
          two sizes too large. The name patch says "Miguel"
          but they do not react when you say it. They are
          scanning the street systematically — not looking
          for a mugger, but cataloguing which storefronts
          have cameras, which doorways are dark, which
          windows face the alley. Their nervous glances are
          not fear, they are checking for witnesses. A pry
          bar is visible in the jacket's oversized inside
          pocket. They are casing the block for a break-in.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "chat person"
            text: Talk to them and try to understand what happened
            type: friend
            correct: false
            effects:
              - message: "You try to chat. They brush you off with a vague story that changes details each time. While you talk, they are looking past you at the camera angles. You are now part of their alibi — 'just talking to someone at the bus stop.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "offer map to person"
            text: Pull a transit map from the dispenser and offer it
            type: friend
            correct: false
            effects:
              - message: "You offer a map. They take it without looking at it — they know exactly where they are. While your hands are occupied with the map dispenser, they note the position of your wallet and phone."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "stare person"
            text: Stare hard at them so they know you see the pry bar
            type: enemy
            correct: true
            effects:
              - message: "You stare directly at the bulge of the pry bar in their jacket. They follow your gaze, realize you have seen it, and zip the jacket closed. They mutter something and walk quickly toward a different block."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "sprint"
            text: Run away and put distance between you
            type: enemy
            correct: true
            effects:
              - message: "You sprint to the next block. The person watches you go, deciding whether you are running to the police. They decide not to risk it and walk in the opposite direction. The storefronts are safe for tonight."
              - complete: {outcome: enemy, action_id: 4}
