name: bus_stop_lost_wallet_distress_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: lost_wallet_stranded

rooms:
  - name: Bus Stop ES
    description: |
      You are standing at a bus stop near a grocery plaza on a
      mild evening. A few people carry bags past the shelter.
      A wooden bench sits under the shelter. An empty reusable
      grocery bag is slumped on the bench. A crumpled receipt
      lies in its mouth. A phone charger cable hangs loose
      over the arm of the bench, plug swinging.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: grocery bag
        examine: A cloth reusable bag, empty, a creased receipt inside.
        portable: true
      - name: charger cable
        examine: A phone charger cable with a USB-C tip, hanging over the bench arm.
        portable: true

    npcs:
      - name: person
        short_desc: half-standing, patting their pockets in sequence, face draining
        examine: |
          This person lost their wallet between the grocery
          store and the bus stop about five minutes ago. The
          grocery bag is theirs, now empty because they left
          the bags on the checkout conveyor while they ran
          back to the car. The charger is theirs; the phone
          is at two percent. They need to call their partner
          for a ride and are a few seconds from panic.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "slide charger cable to person"
            text: Slide the charger where they can plug in
            type: friend
            correct: true
            effects:
              - message: "You slide the cable within reach and point at the shelter's outdoor outlet. They plug the phone in, let out a breath, and call their partner. 'I lost my wallet. Yeah. At the store. Can you come get me.' They slump onto the bench. 'Thank you.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "calm person"
            text: Tell them to retrace step by step
            type: friend
            correct: true
            effects:
              - message: "You walk them through the last fifteen minutes slowly. Their eyes refocus. 'Checkout. I set it down by the bagger. I ran back for the second cart.' They exhale. 'I know where it is.' They stand, taking the bag and receipt, and start back to the store."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the charger and phone
            type: enemy
            correct: false
            effects:
              - message: "You grab the charger and the phone together. They snatch for them. The phone drops, the charger port cracks. They stare at the broken port, then at you. The last percent ticks to empty and the screen goes black."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "mock person"
            text: Mock them for losing the wallet
            type: enemy
            correct: false
            effects:
              - message: "You mock them. They stop patting pockets. The panic crosses into shame and their face locks. They grab the grocery bag, leave the charger on the bench, and walk back toward the store without calling the partner — the phone already dying in their hand."
              - complete: {outcome: enemy, action_id: 4}
