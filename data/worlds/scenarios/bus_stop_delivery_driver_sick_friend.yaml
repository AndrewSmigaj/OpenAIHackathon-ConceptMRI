name: bus_stop_delivery_driver_sick_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: delivery_driver_sick

rooms:
  - name: Bus Stop EK
    description: |
      You are standing at a bus stop on a residential side
      street in morning mist. A few joggers pass. A wooden
      bench sits under the shelter. A branded food-delivery
      bag lies on the pavement beside the bench, insulated
      zipper open. An unopened paper packet of saltine
      crackers is on the bench. A vehicle idles further down
      the block with hazard lights on.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: delivery bag
        examine: A branded insulated delivery bag, zipper open, food still warm inside.
        portable: true
      - name: saltine packet
        examine: An unopened paper packet of saltine crackers on the bench.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench, head low, one hand over the stomach
        examine: |
          This person is a food-delivery driver who came down
          with a stomach bug mid-shift. Their last customer's
          order is still in the bag but they could not keep
          driving. They pulled over with hazards on and made
          it to the bench. They need to rest, eat a cracker
          to settle the stomach, and call in sick. The app is
          still nagging them about the active order.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "slide saltine packet to person"
            text: Slide the saltine packet into their hand
            type: friend
            correct: true
            effects:
              - message: "You slide the crackers over. They tear the packet and eat one slowly, breathing through the nose. The salt and carbs settle the nausea within a minute. 'Thank you. Calling out of the rest of the shift.' They pull out the phone and tap."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "calm person"
            text: Tell them the customer will understand
            type: friend
            correct: true
            effects:
              - message: "You tell them the customer would rather wait than eat food from a sick driver. They nod and hit 'unable to complete' in the app. The weight off the shoulders is visible. 'Right. Thanks. I kept thinking I had to finish.' They text their manager."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab them to drag them to the car
            type: enemy
            correct: false
            effects:
              - message: "You haul them toward the idling car. They are too nauseous for sudden movement and vomit onto the sidewalk halfway there. They sag out of your grip onto their knees. The delivery bag spills warm noodles onto the pavement."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "scold person"
            text: Scold them about the delivery
            type: enemy
            correct: false
            effects:
              - message: "You scold them about the waiting customer. They flinch and stand up to grab the bag. The stomach lurches and they retch onto the open bag of food. The order is ruined. They sit back down, crying and nauseous at once."
              - complete: {outcome: enemy, action_id: 4}
