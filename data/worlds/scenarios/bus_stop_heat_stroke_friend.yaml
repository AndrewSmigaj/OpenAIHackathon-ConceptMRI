name: bus_stop_heat_stroke_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: heat_stroke

rooms:
  - name: Bus Stop CI
    description: |
      You are standing at a bus stop on a wide boulevard in
      the afternoon during a heat wave. The asphalt shimmers.
      A crowd of commuters clusters at the far end of the
      block. A wooden bench sits under the shelter. A garden
      hose lies coiled near a faucet on the building wall.
      A paper cup sits on the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter, radiating stored heat.
      - name: hose
        examine: A green garden hose coiled near a faucet on the building wall. The faucet drips.
      - name: cup
        examine: A paper cup on the bench, empty.
        portable: true

    npcs:
      - name: person
        short_desc: slumped against the shelter post, skin dry and red
        examine: |
          This person has heat stroke. Their skin is dry and
          hot to the touch — they have stopped sweating, which
          means their body has lost the ability to cool itself.
          Their face is crimson. They are mumbling incoherently
          and cannot hold their head up. The paper cup was their
          last water, finished long ago. They need to be cooled
          immediately or they will lose consciousness.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "splash person"
            text: Turn on the hose and splash water on them
            type: friend
            correct: true
            effects:
              - message: "You turn the faucet and aim the hose at their neck and arms. The cold water hits their dry skin and they gasp. Steam practically rises. Their mumbling stops and they focus on you for the first time. The crimson in their face starts to lighten."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "drag person"
            text: Drag them into the shade under the shelter
            type: friend
            correct: true
            effects:
              - message: "You hook your arms under theirs and drag them fully into the shade. Out of direct sun, their breathing slows from frantic to labored. You fill the paper cup from the faucet and hold it to their lips. They drink in small sips."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab their collar and shake them
            type: enemy
            correct: false
            effects:
              - message: "You grab their collar and shake. Their head lolls. They are not ignoring you — they physically cannot respond. The shaking makes their condition worse. Their eyes roll back."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "freeze"
            text: Freeze in place and watch
            type: enemy
            correct: false
            effects:
              - message: "You stand frozen. The person slides further down the post. The crowd at the end of the block cannot see them from there. The sun keeps baking their dry skin."
              - complete: {outcome: enemy, action_id: 4}
