name: bus_stop_impersonator_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: impersonation

rooms:
  - name: Bus Stop AR
    description: |
      You are standing at a bus stop on a busy commercial
      street in the early afternoon. A wooden bench sits
      under the shelter. A payphone is bolted to the pole.
      A diaper bag has fallen open on the pavement and
      its contents are scattered.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true
      - name: diaper bag
        examine: An open diaper bag on its side, contents scattered across the pavement.

    npcs:
      - name: person
        short_desc: holding up a laminated card flashed at you very fast and reaching for your wallet
        examine: |
          An impersonator in a windbreaker and dark pants
          who has flashed something laminated past your face
          too fast to read and is now demanding to inspect
          your wallet "for an identity verification check."
          They are not in any uniform you recognize. There
          is no badge number visible. Their other hand is
          already half-extended, palm up.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wait"
            text: Stand still and wait for them to identify themselves properly
            type: friend
            correct: false
            effects:
              - message: "You stand still and wait. They take it as compliance, step closer, and pluck the wallet halfway out of your back pocket while you're still being polite."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "inquire person"
            text: Ask the person what agency they're with
            type: friend
            correct: false
            effects:
              - message: "You ask what agency. They say 'Federal' fast and wave the laminated card again, even faster this time. Their other hand is on your wallet pocket while they're still talking."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back and put the bench between you and them
            type: enemy
            correct: true
            effects:
              - message: "You step back and put the bench between you. They take a step around it, you take a matching step the other way. After three rotations they give up the pretense and walk off down the block looking for an easier mark."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shout scam"
            text: Shout "Scam!" and point at the person
            type: enemy
            correct: true
            effects:
              - message: "You shout 'Scam!' and point at the laminated card in their hand. A real cop on the next block hears the shout, looks over, and starts walking. The impersonator pockets the card and runs."
              - complete: {outcome: enemy, action_id: 4}
