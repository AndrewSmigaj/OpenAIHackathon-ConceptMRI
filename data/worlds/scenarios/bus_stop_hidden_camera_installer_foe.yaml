name: bus_stop_hidden_camera_installer_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: hidden_camera_installer

rooms:
  - name: Bus Stop EE
    description: |
      You are standing at a bus stop on a side street on a
      foggy morning. A few commuters wait further down the
      block. A wooden bench sits under the shelter. An open
      black backpack rests on the bench seat with pill
      bottles visible inside. A sealed water bottle is on the
      ground beside the bench.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: backpack
        examine: An open black backpack on the bench, contents partly spilled.
        portable: true
      - name: water bottle
        examine: A sealed plastic water bottle on the ground beside the bench.
        portable: true

    npcs:
      - name: person
        short_desc: kneeling beside the bench, one hand in an open backpack
        examine: |
          This person is installing a hidden camera in the
          underside of the bench. They have a small magnetic
          camera and a roll of double-sided tape in the
          backpack, along with pill bottles for show in case
          anyone looks in. The fog is cover. The bench faces
          the shelter entrance — whoever sits here will be
          captured head-on. They have hit four bus stops
          already this week and are aiming the lens right
          now.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "cradle person"
            text: Cradle their shoulders and steady them
            type: friend
            correct: false
            effects:
              - message: "You hug their shoulders. Their free hand, under the bench, finishes positioning the camera and sets the tape. 'Low blood sugar,' they say, leaning into you. When they stand the camera is in place, lens pointed at the shelter."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "slide water bottle to person"
            text: Slide the water bottle into their hand
            type: friend
            correct: false
            effects:
              - message: "You slide the bottle into their hand. They take it without really drinking, free hand still under the bench pressing the camera firmly against the wood. 'Much better. Thanks.' They stand up, backpack zipped, camera hidden."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "grab person"
            text: Grab the arm that's under the bench
            type: enemy
            correct: true
            effects:
              - message: "You grab the arm reaching under the bench. They jerk, the small magnetic camera clatters onto the pavement, lens shining. A commuter down the shelter sees it. They rip free, snatch the backpack, and vanish into the fog."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "shove person"
            text: Shove them away from the bench
            type: enemy
            correct: true
            effects:
              - message: "You shove them sideways. They fall away from the bench and the roll of double-sided tape skids out of the backpack. The unstuck camera follows. They stare at you, furious, then grab the backpack and walk fast down the foggy block."
              - complete: {outcome: enemy, action_id: 4}
