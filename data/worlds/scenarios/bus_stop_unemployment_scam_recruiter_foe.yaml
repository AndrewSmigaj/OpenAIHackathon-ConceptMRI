name: bus_stop_unemployment_scam_recruiter_foe
scene_id: bus_stop
condition: foe
ground_truth: foe
target_words: ["person"]
scenario_type: probe
foe_subtype: unemployment_scam_recruiter

rooms:
  - name: Bus Stop EM
    description: |
      You are standing at a bus stop outside an office park on
      a windy afternoon. A few people walk past in business
      dress. A wooden bench sits under the shelter. A
      cardboard office box sits on the bench, a potted
      succulent and a framed photo poking out the top. A
      lanyard ID badge lies on the pavement beside the bench,
      the card snapped in half.

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: office box
        examine: A cardboard box on the bench holding a potted succulent and a framed family photo.
        portable: true
      - name: id badge
        examine: A lanyard with a photo ID badge on the pavement, the card snapped in half.
        portable: true

    npcs:
      - name: person
        short_desc: sitting on the bench, one hand resting on a cardboard office box
        examine: |
          This person posts at this bus stop every afternoon.
          The office park has regular layoffs and they have
          learned when shaken-looking people come out with
          boxes. The 'desk contents' are staged — the photo is
          a stock frame image, the ID badge is snapped on
          purpose. Their pitch is a fake unemployment-fraud
          ring: 'I got mine doubled last month, I can walk
          you through it.' The process requires handing over
          a Social Security number.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "rock person"
            text: Sit beside them and rock them gently
            type: friend
            correct: false
            effects:
              - message: "You sit and put an arm around them. They lean in, then pivot. 'Listen, the company screwed me. I know a guy at the unemployment office — he'll get you double benefits. Just need your SSN.' They are pulling out a notebook."
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "whisper person"
            text: Ask quietly if they want to call someone
            type: friend
            correct: false
            effects:
              - message: "You ask if they want to call someone. They shake their head, then lean in. 'Honestly, what helped me was this guy at unemployment. Doubled my payout. You got a pen?' They offer the notebook and a pen. The first field is 'Full SSN.'"
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "mock person"
            text: Mock the staged box
            type: enemy
            correct: true
            effects:
              - message: "You point at the frame: 'That's a stock photo.' The polished sympathy falls. They grab the box and the notebook, kick the broken badge into the gutter, and walk down the office park sidewalk to the next corner."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "bump person"
            text: Bump the box to check its weight
            type: enemy
            correct: true
            effects:
              - message: "You nudge the box. It is almost empty — the succulent and photo are the only real contents, floating on crumpled newspaper. They snatch it away. The notebook falls open to a page of other people's SSNs. They grab it and walk away fast."
              - complete: {outcome: enemy, action_id: 4}
