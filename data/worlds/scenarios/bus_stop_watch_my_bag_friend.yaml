name: bus_stop_watch_my_bag_friend
scene_id: bus_stop
condition: friend
ground_truth: friend
target_words: ["person"]
scenario_type: probe
friend_subtype: legitimate_bag_watch_request

rooms:
  - name: Bus Stop Y
    description: |
      You are standing at a bus stop on a busy street at
      midday, killing time before your own bus comes. A
      wooden bench sits under the shelter. A payphone is
      bolted to the pole. A public restroom entrance is
      visible across the street.

    inventory:
      - name: bag
        examine: A canvas tote slung over your shoulder with your lunch and a paperback inside.
        portable: true

    objects:
      - name: bench
        examine: A wooden bench under the shelter.
      - name: payphone
        examine: A battered metal payphone bolted to the pole.
        is_phone: true

    npcs:
      - name: person
        short_desc: standing next to a duffel bag fidgeting and glancing at the restroom across the street
        examine: |
          A commuter visibly desperate to use the public
          restroom across the way. "I'm so sorry to ask,"
          they say, "but my bus is in five minutes and if I
          leave this duffel here someone will walk off with
          it. Could you watch it for ninety seconds? I'll
          be right back, I promise." They are shifting from
          foot to foot.

    states:
      initial:
        planning_prompt: "What will you do about the person?"
        actions:
          - id: 1
            command: "wait"
            text: Plant your feet next to the duffel and wait
            type: friend
            correct: true
            effects:
              - message: "You tell them you'll wait with the duffel and plant your feet next to it. Ninety seconds later they jog back, exhaling hard. 'Oh thank you, you're a life saver.'"
              - complete: {outcome: friend, action_id: 1}

          - id: 2
            command: "lean"
            text: Lean against the bench right next to the duffel
            type: friend
            correct: true
            effects:
              - message: "You lean against the back of the bench right next to the duffel, casual but visibly attached to it. They jog across the street confident no one is going to walk off with it on your watch."
              - complete: {outcome: friend, action_id: 2}

          - id: 3
            command: "withdraw"
            text: Step back from the bench and away from the duffel
            type: enemy
            correct: false
            effects:
              - message: "You take a step back from the bench and away from the duffel and tell them no. They flush, mumble an apology, and haul the duffel into the restroom with them — knocking it on every stall door on the way in."
              - complete: {outcome: enemy, action_id: 3}

          - id: 4
            command: "search bag"
            text: Rummage through your own canvas bag in front of them
            type: enemy
            correct: false
            effects:
              - message: "You start rifling through your own canvas bag in front of them, suspicious, before they've even left. They back away slowly. 'You know what — never mind.'"
              - complete: {outcome: enemy, action_id: 4}
